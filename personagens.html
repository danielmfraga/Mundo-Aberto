<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personagens · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --holo3:  #7b2fff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Cantos ── */
    .corner {
      position: fixed;
      width: 36px; height: 36px;
      pointer-events: none;
      z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--orange);
      box-shadow: var(--glow-o);
    }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* ── Layout geral ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 60px 80px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 52px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.45);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
    }
    .back-btn:hover { color: var(--holo); }
    .back-arrow {
      font-size: 18px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 8px;
      color: rgba(0,255,231,0.4);
      text-transform: uppercase;
    }

    .header-spacer { width: 120px; } /* balanceia o back-btn */

    /* ── Grid de personagens ── */
    .roster {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: flex-start;
    }

    /* ── Card de personagem ── */
    .char-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .char-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      touch-action: manipulation;
    }

    .char-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,255,231,0.18);
      border-radius: 8px;
      background: rgba(0,255,231,0.02);
      transition: background 0.3s, border-color 0.3s;
    }
    .char-btn:hover .char-panel {
      background: rgba(0,255,231,0.05);
      border-color: rgba(0,255,231,0.4);
    }

    .char-led-wrap {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 5;
      white-space: nowrap;
    }
    .char-led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      animation: ledBlink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes ledBlink {
      0%,100% { opacity: 1;   box-shadow: 0 0 8px var(--holo), 0 0 16px var(--holo); }
      50%      { opacity: 0.3; box-shadow: 0 0 4px var(--holo); }
    }
    .char-led-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.55);
      text-transform: uppercase;
    }

    .char-projection {
      position: relative;
      width: 160px; height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .holo-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.3);
      animation: ringRotate linear infinite;
    }
    .ring1 { width: 88%; height: 88%; animation-duration: 12s; border-color: rgba(0,255,231,0.2); }
    .ring2 { width: 96%; height: 50%; border-color: rgba(0,136,255,0.35); animation-duration: 8s; animation-direction: reverse; }
    .ring3 { width: 70%; height: 70%; border-style: dashed; border-color: rgba(123,47,255,0.35); animation-duration: 20s; }
    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .ring2 { animation-name: ringRotate2; }
    @keyframes ringRotate2 {
      from { transform: rotateX(75deg) rotate(0deg); }
      to   { transform: rotateX(75deg) rotate(360deg); }
    }

    .char-core {
      position: relative;
      z-index: 2;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,231,0.08);
      background: rgba(0,255,231,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .char-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    @keyframes scanMove {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }
    .char-btn:hover .char-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }

    /* Imagem do personagem dentro do holograma */
    .char-core img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: hue-rotate(180deg) saturate(1.5) brightness(0.9);
      mix-blend-mode: screen;
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .char-icon {
      font-size: 22px;
      opacity: 0.45;
      animation: iconPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes iconPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .char-beam {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 44px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 8px var(--holo);
      animation: beamPulse 3s ease-in-out infinite;
    }
    @keyframes beamPulse {
      0%,100% { opacity: 0.8; height: 44px; }
      50%      { opacity: 0.3; height: 34px; }
    }

    .data-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .char-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(0,255,231,0.45);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .char-group:hover .char-name {
      color: var(--holo);
      text-shadow: 0 0 10px #00ffe7aa;
    }

    /* ── Botão + (novo personagem) ── */
    .new-char-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .new-char-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      border: 1px dashed rgba(0,255,231,0.2);
      border-radius: 8px;
      background: transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    .new-char-btn:hover {
      border-color: rgba(0,255,231,0.5);
      background: rgba(0,255,231,0.03);
    }

    .plus-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      position: relative;
    }
    /* braço horizontal */
    .plus-icon::before {
      content: '';
      position: absolute;
      width: 100%; height: 1px;
      background: rgba(0,255,231,0.4);
      box-shadow: 0 0 8px rgba(0,255,231,0.3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    /* braço vertical */
    .plus-icon::after {
      content: '';
      position: absolute;
      width: 1px; height: 100%;
      background: rgba(0,255,231,0.4);
      box-shadow: 0 0 8px rgba(0,255,231,0.3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .new-char-btn:hover .plus-icon::before,
    .new-char-btn:hover .plus-icon::after {
      background: var(--holo);
      box-shadow: 0 0 14px rgba(0,255,231,0.6);
    }

    /* Quadradinhos nos cantos do + */
    .plus-corner {
      position: absolute;
      width: 6px; height: 6px;
      border: 1px solid rgba(0,255,231,0.35);
      transition: border-color 0.3s;
    }
    .plus-corner.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .plus-corner.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .plus-corner.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .plus-corner.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    .new-char-btn:hover .plus-corner { border-color: var(--holo); }

    .new-char-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(0,255,231,0.3);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
    }
    .new-char-btn:hover ~ .new-char-label,
    .new-char-group:hover .new-char-label {
      color: var(--holo);
    }
  
    /* ── Botão deletar personagem ── */
    .char-delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(255,85,102,0.4);
      color: rgba(255,85,102,0.6);
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    .char-group {
      position: relative;
    }
    .char-group:hover .char-delete-btn {
      opacity: 1;
    }
    .char-delete-btn:hover {
      color: #ff5566;
      border-color: #ff5566;
      box-shadow: 0 0 10px rgba(255,85,102,0.4);
    }

    /* ── Kebab button ── */
    .char-kebab-btn {
      position: absolute;
      bottom: -8px; right: -8px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(0,255,231,0.25);
      color: rgba(0,255,231,0.5);
      font-size: 13px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    .char-group:hover .char-kebab-btn { opacity: 1; }
    @media (hover: none) { .char-kebab-btn { opacity: 0.3; } }
    .char-kebab-btn:hover {
      color: var(--holo);
      border-color: rgba(0,255,231,0.6);
      box-shadow: 0 0 10px rgba(0,255,231,0.3);
    }
    .mestre-mode .char-kebab-btn { display: none; }

    /* ── Animação de transmissão (mover/duplicar) ── */
    @keyframes charTransmitOut {
      0%   { opacity: 1;   transform: scale(1)    translateY(0);     filter: brightness(1)   blur(0px); }
      20%  { opacity: 1;   transform: scale(1.06) translateY(-6px);  filter: brightness(2.5) blur(0px); }
      60%  { opacity: 0.5; transform: scale(0.65) translateY(-24px); filter: brightness(5)   blur(2px); }
      100% { opacity: 0;   transform: scale(0.15) translateY(-55px); filter: brightness(9)   blur(8px); }
    }
    @keyframes charDupeFlash {
      0%   { outline-color: var(--holo); outline-offset: 2px; }
      50%  { outline-color: var(--holo); outline-offset: 8px; box-shadow: 0 0 30px rgba(0,255,231,0.6); }
      100% { outline-color: transparent; outline-offset: 2px; box-shadow: none; }
    }
    .char-group.transmit-out {
      animation: charTransmitOut 0.65s cubic-bezier(0.55,0,1,1) forwards;
      pointer-events: none;
    }
    .char-group.dupe-flash {
      outline: 2px solid var(--holo);
      animation: charDupeFlash 0.9s ease forwards;
    }

    /* ── Context menu ── */
    .ctx-menu {
      position: fixed;
      background: rgba(4,8,16,0.97);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 6px;
      padding: 4px 0;
      z-index: 1000;
      min-width: 200px;
      box-shadow: 0 0 20px rgba(0,255,231,0.08), 0 8px 32px rgba(0,0,0,0.85);
      display: none;
    }
    .ctx-menu.open { display: block; animation: ctxFadeIn 0.12s ease; }
    @keyframes ctxFadeIn {
      from { opacity: 0; transform: scale(0.95) translateY(-4px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }
    .ctx-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 3px;
      color: rgba(0,255,231,0.25);
      padding: 8px 16px 2px;
      text-transform: uppercase;
      user-select: none;
    }
    .ctx-item {
      padding: 10px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px;
      color: rgba(0,255,231,0.65);
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      text-transform: uppercase;
      transition: background 0.1s, color 0.1s;
      user-select: none; white-space: nowrap;
    }
    .ctx-item:hover { background: rgba(0,255,231,0.07); color: var(--holo); }
    .ctx-icon { font-size: 13px; opacity: 0.8; width: 16px; text-align: center; flex-shrink: 0; }
    .ctx-divider { border-top: 1px solid rgba(0,255,231,0.1); margin: 3px 0; }

    /* ── Toast ── */
    .ctx-toast {
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: rgba(4,8,16,0.95);
      border: 1px solid rgba(0,255,231,0.3);
      border-radius: 4px;
      padding: 10px 22px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px;
      color: var(--holo);
      z-index: 600;
      pointer-events: none;
      white-space: nowrap;
      animation: toastIn 0.2s ease, toastOut 0.4s ease 2s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

    /* ── Portal Buraco Negro (NPCs) ── */
    .portal-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }

    .portal-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid rgba(123,47,255,0.18);
      background: rgba(123,47,255,0.02);
      transition: border-color 0.3s, background 0.3s;
      overflow: hidden;
    }
    .portal-btn:hover {
      border-color: rgba(123,47,255,0.45);
      background: rgba(123,47,255,0.05);
    }

    /* anéis orbitais do buraco negro */
    .bh-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(123,47,255,0.35);
      animation: bhRotate linear infinite;
    }
    .bh-ring-1 { width: 140px; height: 140px; animation-duration: 18s; border-color: rgba(123,47,255,0.25); }
    .bh-ring-2 { width: 110px; height: 44px;  animation-duration: 10s; border-color: rgba(123,47,255,0.45); animation-name: bhRotateFlat; }
    .bh-ring-3 { width: 86px;  height: 86px;  animation-duration: 26s; border-style: dashed; border-color: rgba(160,80,255,0.3); animation-direction: reverse; }
    .bh-ring-4 { width: 160px; height: 60px;  animation-duration: 14s; border-color: rgba(100,40,200,0.3); animation-name: bhRotateFlat2; }

    @keyframes bhRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes bhRotateFlat {
      from { transform: rotateX(72deg) rotate(0deg); }
      to   { transform: rotateX(72deg) rotate(360deg); }
    }
    @keyframes bhRotateFlat2 {
      from { transform: rotateX(65deg) rotate(180deg); }
      to   { transform: rotateX(65deg) rotate(-180deg); }
    }

    /* núcleo escuro */
    .bh-core {
      position: relative;
      z-index: 2;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle, #000 40%, rgba(60,10,120,0.6) 70%, transparent 100%);
      box-shadow: 0 0 20px rgba(123,47,255,0.5), 0 0 50px rgba(123,47,255,0.2), inset 0 0 20px rgba(0,0,0,0.9);
      border: 1px solid rgba(123,47,255,0.4);
    }
    .portal-btn:hover .bh-core {
      box-shadow: 0 0 30px rgba(123,47,255,0.8), 0 0 70px rgba(123,47,255,0.35), inset 0 0 20px rgba(0,0,0,0.9);
    }

    /* scan interno */
    .bh-core::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(123,47,255,0.05) 3px, rgba(123,47,255,0.05) 4px
      );
      animation: scanMove 6s linear infinite;
    }

    /* partículas orbitando */
    .bh-particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #a050ff;
      box-shadow: 0 0 6px #a050ff;
      left: 50%; top: 50%;
      margin: -1.5px 0 0 -1.5px;
    }
    .bh-p1 { animation: bhOrbit1 7s   linear infinite; }
    .bh-p2 { animation: bhOrbit2 4.5s linear infinite; }
    .bh-p3 { animation: bhOrbit3 11s  linear infinite; }
    @keyframes bhOrbit1 {
      from { transform: rotate(0deg)   translateX(62px); }
      to   { transform: rotate(360deg) translateX(62px); }
    }
    @keyframes bhOrbit2 {
      from { transform: rotate(120deg) translateX(46px); }
      to   { transform: rotate(480deg) translateX(46px); }
    }
    @keyframes bhOrbit3 {
      from { transform: rotate(240deg) translateX(78px); }
      to   { transform: rotate(600deg) translateX(78px); }
    }

    .portal-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 6px;
      color: rgba(123,47,255,0.55);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
    }
    .portal-btn:hover ~ .portal-name,
    .portal-group:hover .portal-name {
      color: #a050ff;
      text-shadow: 0 0 10px rgba(123,47,255,0.6);
    }

    /* ── Portais personalizados (cor dinâmica via --scr: R,G,B) ── */
    .sp-portal-group {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      position: relative; animation: fadeUp 0.5s ease both;
    }
    .sp-portal-btn {
      position: relative; width: 200px; height: 200px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; border-radius: 8px;
      border: 1px solid rgba(var(--scr),.2); background: rgba(var(--scr),.02);
      transition: border-color .3s, background .3s; overflow: hidden;
      touch-action: manipulation;
    }
    .sp-portal-btn:hover { border-color: rgba(var(--scr),.45); background: rgba(var(--scr),.05); }
    .sp-ring { position: absolute; border-radius: 50%; border: 1px solid; animation: bhRotate linear infinite; }
    .sp-ring-1 { width:140px; height:140px; border-color:rgba(var(--scr),.25); animation-duration:18s; }
    .sp-ring-2 { width:110px; height:44px;  border-color:rgba(var(--scr),.45); animation-duration:10s; animation-name:bhRotateFlat; }
    .sp-ring-3 { width:86px;  height:86px;  border-color:rgba(var(--scr),.3);  animation-duration:26s; border-style:dashed; animation-direction:reverse; }
    .sp-ring-4 { width:160px; height:60px;  border-color:rgba(var(--scr),.2);  animation-duration:14s; animation-name:bhRotateFlat2; }
    .sp-core {
      position: relative; z-index: 2; width: 72px; height: 72px; border-radius: 50%;
      background: radial-gradient(circle, #000 35%, rgba(var(--scr),.4) 70%, transparent 100%);
      box-shadow: 0 0 20px rgba(var(--scr),.5), 0 0 50px rgba(var(--scr),.2), inset 0 0 20px rgba(0,0,0,.9);
      border: 1px solid rgba(var(--scr),.4);
    }
    .sp-portal-btn:hover .sp-core {
      box-shadow: 0 0 30px rgba(var(--scr),.8), 0 0 70px rgba(var(--scr),.35), inset 0 0 20px rgba(0,0,0,.9);
    }
    .sp-core::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(var(--scr),.05) 3px, rgba(var(--scr),.05) 4px);
      animation: scanMove 6s linear infinite;
    }
    .sp-portal-name {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; letter-spacing: 4px;
      color: rgba(var(--scr),.5); text-transform: uppercase; text-align: center;
      transition: color .3s, text-shadow .3s; max-width: 200px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sp-portal-btn:hover ~ .sp-portal-name,
    .sp-portal-group:hover .sp-portal-name {
      color: rgba(var(--scr),.9); text-shadow: 0 0 10px rgba(var(--scr),.4);
    }
    .sp-del-btn {
      position: absolute; top: -8px; right: -8px; width: 24px; height: 24px;
      border-radius: 50%; background: rgba(4,8,16,.9);
      border: 1px solid rgba(255,85,102,.4); color: rgba(255,85,102,.6);
      font-size: 10px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; opacity: 0;
      transition: opacity .2s, color .2s, border-color .2s, box-shadow .2s; z-index: 10;
    }
    .sp-portal-group:hover .sp-del-btn { opacity: 1; }
    .sp-del-btn:hover { color: #ff5566; border-color: #ff5566; box-shadow: 0 0 10px rgba(255,85,102,.4); }

    /* ── Botão novo espaço ── */
    .new-space-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .new-space-btn {
      position: relative; width: 200px; height: 200px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 1px dashed rgba(0,255,231,.38); border-radius: 8px;
      background: rgba(0,255,231,.018);
      box-shadow: 0 0 16px rgba(0,255,231,.07), inset 0 0 28px rgba(0,255,231,.04);
      transition: border-color .3s, background .3s, box-shadow .3s;
      touch-action: manipulation;
    }
    .new-space-btn:hover {
      border-color: rgba(0,255,231,.65);
      background: rgba(0,255,231,.045);
      box-shadow: 0 0 24px rgba(0,255,231,.24), 0 0 50px rgba(0,255,231,.08), inset 0 0 28px rgba(0,255,231,.08);
    }
    .orbit-icon { position: relative; width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; }
    .orbit-ring { position: absolute; border-radius: 50%; border: 1px dashed rgba(0,255,231,.42); transition: border-color .3s; }
    .orbit-ring-1 { width: 100%; height: 100%; }
    .orbit-ring-2 { width: 100%; height: 38%; transform: rotateX(70deg); border-color: rgba(0,255,231,.3); }
    .orbit-plus { position: relative; }
    .orbit-plus::before, .orbit-plus::after {
      content: ''; position: absolute; background: rgba(0,255,231,.55); transition: background .3s, box-shadow .3s;
    }
    .orbit-plus::before { width: 14px; height: 1px; left: 50%; top: 50%; transform: translate(-50%,-50%); }
    .orbit-plus::after  { width: 1px; height: 14px; left: 50%; top: 50%; transform: translate(-50%,-50%); }
    .new-space-btn:hover .orbit-ring   { border-color: rgba(0,255,231,.55); }
    .new-space-btn:hover .orbit-ring-2 { border-color: rgba(0,255,231,.4); }
    .new-space-btn:hover .orbit-plus::before,
    .new-space-btn:hover .orbit-plus::after { background: var(--holo); box-shadow: 0 0 8px rgba(0,255,231,.5); }
    .new-space-label {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; letter-spacing: 4px;
      color: rgba(0,255,231,.42); text-transform: uppercase; text-align: center;
      transition: color .3s, text-shadow .3s;
      text-shadow: 0 0 8px rgba(0,255,231,.2);
    }
    .new-space-btn:hover ~ .new-space-label,
    .new-space-group:hover .new-space-label {
      color: rgba(0,255,231,.75);
      text-shadow: 0 0 12px rgba(0,255,231,.45);
    }

    /* ── Botão combinado: Novo Espaço (↖) + Novo Personagem (↘) ── */
    .combo-group {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      animation: fadeUp 0.5s ease both;
    }
    .combo-card {
      position: relative; width: 200px; height: 200px;
      border: 1px dashed rgba(0,255,231,.38); border-radius: 8px; overflow: hidden;
      background: rgba(0,255,231,.018);
      box-shadow: 0 0 16px rgba(0,255,231,.07), inset 0 0 28px rgba(0,255,231,.04);
    }
    /* Linha diagonal tracejada: top-right → bottom-left */
    .combo-card::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 141.4%; height: 1px; /* √2 × largura, escala no mobile */
      background: repeating-linear-gradient(
        to right,
        rgba(0,255,231,.28) 0px, rgba(0,255,231,.28) 5px,
        transparent 5px, transparent 11px
      );
      box-shadow: 0 0 4px rgba(0,255,231,.12);
      transform: translate(-50%,-50%) rotate(135deg);
      pointer-events: none; z-index: 6;
    }
    .combo-half {
      position: absolute; inset: 0; display: flex;
      cursor: pointer; border: none; background: transparent;
      text-decoration: none; transition: background .25s; z-index: 2;
      touch-action: manipulation;
    }
    .combo-space {
      clip-path: polygon(0 0, 100% 0, 0 100%);
      align-items: flex-start; justify-content: flex-start;
      padding: 24px 0 0 24px;
    }
    .combo-char {
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      align-items: flex-end; justify-content: flex-end;
      padding: 0 24px 24px 0;
    }
    .combo-space:hover { background: rgba(0,255,231,.08); }
    .combo-char:hover  { background: rgba(0,255,231,.08); }
    .combo-icon-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; pointer-events: none;
    }
    .combo-sub-label {
      font-family: 'Share Tech Mono', monospace; font-size: 6.5px;
      font-weight: 700;
      letter-spacing: 1.5px; color: rgba(0,255,231,.42);
      text-transform: uppercase; white-space: normal;
      text-align: center; line-height: 1.5;
      transition: color .2s;
    }
    .combo-space:hover .combo-sub-label,
    .combo-char:hover  .combo-sub-label { color: rgba(0,255,231,.85); }

    /* ── Mini Buraco Negro (metade Espaço) ── */
    .combo-mini-bh {
      position: relative; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .combo-bh-r1 {
      position: absolute; width: 100%; height: 100%; border-radius: 50%;
      border: 1px solid rgba(0,255,231,.28);
      animation: bhRotate 14s linear infinite;
    }
    .combo-bh-r2 {
      position: absolute; width: 100%; height: 38%; border-radius: 50%;
      border: 1px solid rgba(0,255,231,.4);
      animation: bhRotateFlat 9s linear infinite;
    }
    .combo-bh-r3 {
      position: absolute; width: 68%; height: 68%; border-radius: 50%;
      border: 1px dashed rgba(0,136,255,.22);
      animation: bhRotate 22s linear infinite reverse;
    }
    .combo-bh-core {
      width: 20px; height: 20px; border-radius: 50%; z-index: 2;
      background: radial-gradient(circle, #000 38%, rgba(0,255,231,.12) 80%, transparent);
      border: 1px solid rgba(0,255,231,.38);
      box-shadow: 0 0 8px rgba(0,255,231,.25), inset 0 0 8px rgba(0,0,0,.95);
    }
    .combo-space:hover .combo-bh-r1 { border-color: rgba(0,255,231,.55); }
    .combo-space:hover .combo-bh-r2 { border-color: rgba(0,255,231,.68); }
    .combo-space:hover .combo-bh-r3 { border-color: rgba(0,136,255,.42); }
    .combo-space:hover .combo-bh-core {
      border-color: rgba(0,255,231,.65);
      box-shadow: 0 0 14px rgba(0,255,231,.45), inset 0 0 8px rgba(0,0,0,.95);
    }

    /* ── Mini Holograma (metade Personagem) ── */
    .combo-mini-holo {
      position: relative; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .combo-holo-ring {
      position: absolute; width: 88%; height: 88%; border-radius: 50%;
      border: 1px solid rgba(0,255,231,.25);
      animation: ringRotate 12s linear infinite;
    }
    .combo-holo-core {
      width: 30px; height: 30px; border-radius: 50%; z-index: 2;
      border: 1.5px solid rgba(0,255,231,.38);
      box-shadow: 0 0 8px rgba(0,255,231,.22), inset 0 0 10px rgba(0,255,231,.04);
      background: rgba(0,255,231,.02);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .combo-holo-core::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,231,.07) 2px, rgba(0,255,231,.07) 3px
      );
      animation: scanMove 4s linear infinite;
    }
    .combo-holo-icon {
      font-size: 13px; opacity: 0.4; position: relative; z-index: 1;
      animation: iconPulse 3s ease-in-out infinite;
    }
    .combo-holo-beam {
      position: absolute; bottom: -5px; left: 50%;
      transform: translateX(-50%);
      width: 1px; height: 18px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 4px rgba(0,255,231,.6);
      animation: beamPulse 3s ease-in-out infinite;
    }
    .combo-char:hover .combo-holo-ring { border-color: rgba(0,255,231,.52); }
    .combo-char:hover .combo-holo-core {
      border-color: rgba(0,255,231,.65);
      box-shadow: 0 0 14px rgba(0,255,231,.42), inset 0 0 10px rgba(0,255,231,.08);
    }
    .combo-char:hover .combo-holo-icon { opacity: 0.78; }

    /* ── Modal criar espaço ── */
    .__sp-ov {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      z-index: 99999; display: flex; align-items: center; justify-content: center;
    }
    .__sp-box {
      background: #040810; border: 1px solid rgba(0,255,231,.22); border-radius: 4px;
      padding: 36px 40px; max-width: 320px; width: 90%; text-align: center;
      font-family: 'Share Tech Mono', monospace; box-shadow: 0 0 40px rgba(0,255,231,.06);
    }
    .__sp-box h2 { color: rgba(0,255,231,.7); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; }
    .__sp-input {
      width: 100%; background: rgba(0,255,231,.04); border: 1px solid rgba(0,255,231,.2);
      border-radius: 2px; padding: 10px 14px; color: #cfe9f0;
      font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 1px;
      text-transform: uppercase; outline: none; margin-bottom: 20px; transition: border-color .2s;
    }
    .__sp-input:focus { border-color: rgba(0,255,231,.5); }
    .__sp-input::placeholder { color: rgba(0,255,231,.2); text-transform: none; }
    .__sp-btns { display: flex; gap: 12px; justify-content: center; }
    .__sp-btns button {
      background: transparent; font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      padding: 8px 20px; cursor: pointer; border-radius: 2px; transition: all .18s;
    }
    .__sp-ok { border: 1px solid rgba(0,255,231,.4); color: rgba(0,255,231,.7); }
    .__sp-ok:hover { border-color: #00ffe7; color: #00ffe7; box-shadow: 0 0 12px rgba(0,255,231,.3); }
    .__sp-cx { border: 1px solid rgba(207,233,240,.15); color: rgba(207,233,240,.3); }
    .__sp-cx:hover { border-color: rgba(207,233,240,.35); color: rgba(207,233,240,.5); }

    /* ── Botão Mestre ── */
    .mestre-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--orange);
      text-transform: uppercase;
      background: rgba(255,107,26,0.08);
      border: 1px solid rgba(255,107,26,0.55);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      white-space: nowrap;
      text-align: center;
    }
    .mestre-btn:hover {
      background: rgba(255,107,26,0.15);
      border-color: var(--orange);
      box-shadow: 0 0 12px rgba(255,107,26,0.4);
    }
    .mestre-btn.active {
      color: var(--orange);
      border-color: var(--orange);
      background: rgba(255,107,26,0.08);
      box-shadow: var(--glow-o);
    }

    /* ── Modo Mestre ── */
    .mestre-mode .char-group .char-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      border: 2px dashed rgba(255,107,26,0.35);
      z-index: 20;
      transition: border-color 0.2s, box-shadow 0.2s;
      pointer-events: none;
    }
    .mestre-mode .char-group:hover .char-btn::after {
      border-color: rgba(255,107,26,0.65);
      box-shadow: inset 0 0 16px rgba(255,107,26,0.08);
    }
    .mestre-mode .char-group.selected .char-btn::after {
      border: 2px solid var(--orange);
      box-shadow: inset 0 0 20px rgba(255,107,26,0.15), 0 0 15px rgba(255,107,26,0.35);
    }
    .mestre-mode .char-delete-btn { display: none; }

    /* ── Modo Mestre: portais menores, sem botão de criação/deleção ── */
    .mestre-mode .sp-portal-btn,
    .mestre-mode .portal-btn {
      width: 100px;
      height: 100px;
    }
    .mestre-mode .sp-portal-group .sp-core,
    .mestre-mode .portal-group .bh-core {
      width: 36px; height: 36px;
    }
    .mestre-mode .sp-portal-name,
    .mestre-mode .portal-name {
      font-size: 7px; letter-spacing: 2px;
    }
    .mestre-mode .combo-group { display: none !important; }
    .mestre-mode .sp-del-btn  { display: none !important; }

    .mestre-sel-badge {
      display: none;
      position: absolute;
      top: -10px;
      left: -10px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--orange);
      color: var(--dark);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      align-items: center;
      justify-content: center;
      z-index: 30;
      box-shadow: 0 0 10px rgba(255,107,26,0.7);
    }
    .mestre-mode .char-group.selected .mestre-sel-badge { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }

    /* ── Barra do Mestre ── */
    .mestre-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 40px;
      background: linear-gradient(to top, rgba(4,8,16,0.98), rgba(4,8,16,0.88));
      border-top: 1px solid rgba(255,107,26,0.3);
      z-index: 200;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .mestre-bar.visible { display: flex; }
    .mestre-bar-info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,107,26,0.65);
      text-transform: uppercase;
    }
    .mestre-bar-count {
      font-size: 22px;
      color: var(--orange);
      text-shadow: var(--glow-o);
      margin: 0 4px;
    }
    .mestre-bar-limit {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,107,26,0.4);
      text-transform: uppercase;
      visibility: hidden;
    }
    .mestre-bar-limit.show { visibility: visible; }
    .mestre-open-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dark);
      background: var(--orange);
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: var(--glow-o);
      transition: box-shadow 0.2s, transform 0.1s;
    }
    .mestre-open-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(255,107,26,0.8), 0 0 40px rgba(255,107,26,0.4);
      transform: scale(1.03);
    }
    .mestre-open-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── NPCs inline (Modo Mestre) ── */
    .npc-section-label {
      flex: 0 0 100%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 5px;
      color: rgba(123,47,255,0.5);
      text-transform: uppercase;
      text-align: center;
      padding: 20px 0 6px;
      border-top: 1px solid rgba(123,47,255,0.14);
      user-select: none;
    }

    .char-group.npc-inline .char-panel {
      border-color: rgba(123,47,255,0.18);
    }
    .char-group.npc-inline:hover .char-panel {
      background: rgba(123,47,255,0.04);
      border-color: rgba(123,47,255,0.4);
    }
    .char-group.npc-inline .ring1 { border-color: rgba(123,47,255,0.2); }
    .char-group.npc-inline .ring2 { border-color: rgba(160,80,255,0.3); }
    .char-group.npc-inline .ring3 { border-color: rgba(100,40,200,0.3); }
    .char-group.npc-inline .char-led {
      background: #a050ff;
      box-shadow: 0 0 6px #a050ff;
    }
    .char-group.npc-inline .char-led-label { color: rgba(160,80,255,0.55); }
    .char-group.npc-inline .char-core {
      border-color: rgba(123,47,255,0.4);
      box-shadow: 0 0 10px rgba(123,47,255,0.4), 0 0 30px rgba(123,47,255,0.15),
                  inset 0 0 30px rgba(123,47,255,0.06);
    }
    .char-group.npc-inline:hover .char-core {
      box-shadow: 0 0 20px rgba(123,47,255,0.7), 0 0 55px rgba(123,47,255,0.3),
                  inset 0 0 30px rgba(123,47,255,0.14);
      border-color: rgba(123,47,255,0.7);
    }
    .char-group.npc-inline .char-beam {
      background: linear-gradient(to top, #a050ff, transparent);
      box-shadow: 0 0 8px #a050ff;
    }
    .char-group.npc-inline .char-name  { color: rgba(123,47,255,0.5); }
    .char-group.npc-inline:hover .char-name {
      color: #a050ff;
      text-shadow: 0 0 10px rgba(123,47,255,0.6);
    }

    /* seleção roxo no Modo Mestre */
    .mestre-mode .char-group.npc-inline .char-btn::after {
      border: 2px dashed rgba(123,47,255,0.35);
    }
    .mestre-mode .char-group.npc-inline:hover .char-btn::after {
      border-color: rgba(123,47,255,0.65);
      box-shadow: inset 0 0 16px rgba(123,47,255,0.06);
    }
    .mestre-mode .char-group.npc-inline.selected .char-btn::after {
      border: 2px solid #a050ff;
      box-shadow: inset 0 0 20px rgba(123,47,255,0.12), 0 0 15px rgba(123,47,255,0.35);
    }
    .mestre-mode .char-group.npc-inline .mestre-sel-badge {
      background: #a050ff;
      box-shadow: 0 0 10px rgba(160,80,255,0.7);
    }

    /* ── Modo espaço: oculta portais ── */
    .space-mode .portal-group,
    .space-mode .sp-portal-group { display: none !important; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .page {
        padding: 28px 20px 60px;
      }

      /* Header: título no topo; Voltar + Modo Mestre lado a lado abaixo */
      .page-header {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 20px 14px;
        margin-bottom: 20px;
      }
      .page-title {
        order: 0;
        flex: 0 0 100%;
        text-align: center;
        font-size: 11px;
        letter-spacing: 6px;
      }
      .header-spacer { display: none; }
      .back-btn {
        order: 1;
        color: rgba(0,255,231,0.8);
        text-shadow: 0 0 6px rgba(0,255,231,0.7), 0 0 16px rgba(0,255,231,0.35);
      }
      .back-btn:hover {
        color: var(--holo);
        text-shadow: 0 0 10px rgba(0,255,231,0.9), 0 0 24px rgba(0,255,231,0.5);
      }
      .mestre-btn { order: 2; }

      /* Roster: grid 2 colunas */
      .roster {
        display: grid;
        grid-template-columns: repeat(2, 155px);
        justify-content: center;
        gap: 20px 16px;
        align-items: start;
      }

      /* Dividers de seção ocupam linha inteira */
      .npc-section-label { grid-column: 1 / -1; }

      /* Cards menores no mobile */
      .char-btn,
      .portal-btn { width: 155px; height: 155px; }
      .sp-portal-btn { width: 155px; height: 155px; }
      .combo-card { width: 155px; height: 155px; }
      .combo-space { padding: 16px 0 0 16px; }
      .combo-char  { padding: 0 16px 16px 0; }
      .combo-mini-bh, .combo-mini-holo { width: 42px; height: 42px; }
      .combo-bh-core   { width: 16px; height: 16px; }
      .combo-holo-core { width: 24px; height: 24px; }
      .char-projection { width: 120px; height: 120px; }
    }
    </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="page">

    <div class="page-header">
      <a href="index.html" class="back-btn">
        <span class="back-arrow">←</span>
        Voltar
      </a>
      <div class="page-title">Personagens</div>
      <button class="mestre-btn" id="mestreBtn" onclick="toggleMestre()">Modo Mestre</button>
    </div>

    <div class="roster" id="roster">
      <!-- personagens carregados via JS -->

      <!-- Portal NPCs (buraco negro) -->
      <div class="portal-group">
        <a href="npcs.html" class="portal-btn">
          <div class="bh-ring bh-ring-1"></div>
          <div class="bh-ring bh-ring-2"></div>
          <div class="bh-ring bh-ring-3"></div>
          <div class="bh-ring bh-ring-4"></div>
          <div class="bh-core"></div>
          <div class="bh-particle bh-p1"></div>
          <div class="bh-particle bh-p2"></div>
          <div class="bh-particle bh-p3"></div>
        </a>
        <div class="portal-name">N P C S</div>
      </div>

      <!-- Botão combinado Espaço + Personagem (col 2, linha 1 no mobile) -->
      <div class="combo-group" id="comboGroup">
        <div class="combo-card">
          <!-- ↖ Novo Espaço -->
          <button class="combo-half combo-space" id="newSpaceBtn">
            <div class="combo-icon-wrap">
              <div class="combo-mini-bh">
                <div class="combo-bh-r1"></div>
                <div class="combo-bh-r2"></div>
                <div class="combo-bh-r3"></div>
                <div class="combo-bh-core"></div>
              </div>
              <span class="combo-sub-label">Abra um<br>Espaço</span>
            </div>
          </button>
          <!-- ↘ Novo Personagem -->
          <a class="combo-half combo-char" href="ficha.html" id="newCharBtn">
            <div class="combo-icon-wrap">
              <div class="combo-mini-holo">
                <div class="combo-holo-ring"></div>
                <div class="combo-holo-core">
                  <div class="combo-holo-icon">⬡</div>
                </div>
                <div class="combo-holo-beam"></div>
              </div>
              <span class="combo-sub-label">Novo<br>Personagem</span>
            </div>
          </a>
        </div>
      </div>

      <!-- Espaços personalizados injetados aqui via JS (antes de charAnchor) -->
      <div id="charAnchor" style="display:none"></div>

      <!-- Âncora de fim: personagens e NPCs inline inseridos antes daqui -->
      <div id="charEnd" style="display:none"></div>

    </div>

  </div>

  <!-- Menu contextual -->
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-label">Ficha</div>
    <div class="ctx-item" id="ctxDuplicate"><span class="ctx-icon">⊕</span> Duplicar</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" id="ctxMove"><span class="ctx-icon">⇄</span> Mover para N P C S</div>
    <div class="ctx-divider" id="ctxSpaceDivider" style="display:none"></div>
    <div id="ctxSpaceItems"></div>
  </div>

  <!-- Barra do Mestre -->
  <div class="mestre-bar" id="mestreBar">
    <div class="mestre-bar-info">
      <span class="mestre-bar-count" id="mestreCount">0</span> ficha(s) selecionada(s)
      <div class="mestre-bar-limit" id="mestreLimitMsg">máximo 6 atingido</div>
    </div>
    <button class="mestre-open-btn" id="mestreOpenBtn" disabled onclick="openSelectedFichas()">Abrir fichas</button>
  </div>

  <script>
    var SUPABASE_URL = 'https://mxyqqfsyybluavwlrhsa.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXFxZnN5eWJsdWF2d2xyaHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTM4MzEsImV4cCI6MjA5MzY2OTgzMX0.b0Ij7UGzbMLpqZjLYxoPEu2kGwEW52U_2NSDtpMGUPM';

    // ── Espaços (Supabase, cache em memória) ────────────────────────────
    var ESP_PARAM     = new URLSearchParams(location.search).get('esp');
    var CURRENT_SPACE = null;  // preenchido em spInit()
    var _spacesCache  = [];    // cache em memória carregado do Supabase

    function spLoad() { return _spacesCache; }  // síncrono — usa cache

    async function spInit() {
      var data = await sbFetch('/rest/v1/spaces?select=*&order=created_at.asc', 'GET');
      _spacesCache = Array.isArray(data) ? data : [];

      // Migração única: localStorage → Supabase (roda só uma vez)
      var OLD_KEY = 'ma_spaces';
      try {
        var local = JSON.parse(localStorage.getItem(OLD_KEY) || '[]');
        if (local.length && !_spacesCache.length) {
          await Promise.all(local.map(function(sp) {
            return sbFetch('/rest/v1/spaces', 'POST', sp);
          }));
          _spacesCache = local;
          localStorage.removeItem(OLD_KEY);
        }
      } catch(e) {}

      // Resolve espaço atual a partir da URL
      if (ESP_PARAM) {
        CURRENT_SPACE = _spacesCache.find(function(s) { return s.id === ESP_PARAM; }) || null;
      }
    }

    function sbFetch(path, method, body) {
      return fetch(SUPABASE_URL + path, {
        method: method || 'GET',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: body ? JSON.stringify(body) : undefined
      }).then(function(r) { return r.status === 204 ? null : r.json().catch(function() { return null; }); });
    }

    // ── Holograma reutilizável ──
    function createHoloCard(charId, name, imgSrc, ledLabel) {
      const href = 'ficha.html?id=' + charId + (ESP_PARAM ? '&esp=' + encodeURIComponent(ESP_PARAM) : '');
      const group = document.createElement('div');
      group.className = 'char-group';
      group.dataset.charId = charId;
      group.dataset.charName = name || 'Personagem';

      const btn = document.createElement('a');
      btn.href = href;
      btn.className = 'char-btn';

      btn.innerHTML = `
        <div class="char-panel"></div>
        <div class="char-led-wrap">
          <div class="char-led"></div>
          <span class="char-led-label">${ledLabel || 'Black Box'}</span>
        </div>
        <div class="char-projection">
          <div class="ring1 holo-ring"></div>
          <div class="ring2 holo-ring"></div>
          <div class="ring3 holo-ring"></div>
          <div class="char-core">
            ${imgSrc
              ? `<img src="${imgSrc}" alt="${name}">`
              : `<div class="char-icon">⬡</div>`
            }
          </div>
          <div class="char-beam"></div>
          <svg class="data-lines" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <line x1="100" y1="100" x2="18"  y2="30"  stroke="rgba(0,255,231,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1s"   repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="182" y2="30"  stroke="rgba(0,136,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.3s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="8"   y2="110" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="192" y2="110" stroke="rgba(123,47,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.5s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="40"  y2="185" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.1s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="160" y2="185" stroke="rgba(0,136,255,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.9s" repeatCount="indefinite"/></line>
            <circle cx="18"  cy="30"  r="2" fill="rgba(0,255,231,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2s"   repeatCount="indefinite"/></circle>
            <circle cx="182" cy="30"  r="2" fill="rgba(0,136,255,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
            <circle cx="8"   cy="110" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
            <circle cx="192" cy="110" r="2" fill="rgba(123,47,255,0.5)"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
            <circle cx="40"  cy="185" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="3s"   repeatCount="indefinite"/></circle>
            <circle cx="160" cy="185" r="2" fill="rgba(0,136,255,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
          </svg>
        </div>
      `;

      const label = document.createElement('div');
      label.className = 'char-name';
      label.textContent = name || 'Personagem';

      // ── Botão deletar ──
      const delBtn = document.createElement('button');
      delBtn.className = 'char-delete-btn';
      delBtn.title = 'Excluir personagem';
      delBtn.innerHTML = '✕';
      delBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!confirm('Excluir "' + (name || 'Personagem') + '"? Esta ação não pode ser desfeita.')) return;
        // Remove do Supabase
        sbFetch('/rest/v1/personagens?char_id=eq.' + charId, 'DELETE');
        // Anima saída
        group.style.transition = 'opacity 0.3s, transform 0.3s';
        group.style.opacity = '0';
        group.style.transform = 'scale(0.85)';
        setTimeout(() => group.remove(), 300);
      });

      // ── Kebab ──
      const kebabBtn = document.createElement('button');
      kebabBtn.className = 'char-kebab-btn';
      kebabBtn.title = 'Mais opções';
      kebabBtn.textContent = '⋮';
      kebabBtn.addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const r = kebabBtn.getBoundingClientRect();
        showCtxMenu(r.left, r.bottom + 6, charId, name, group);
      });

      const badge = document.createElement('div');
      badge.className = 'mestre-sel-badge';

      group.appendChild(btn);
      group.appendChild(label);
      group.appendChild(delBtn);
      group.appendChild(kebabBtn);
      group.appendChild(badge);
      return group;
    }

    // ── Carrega personagens do Supabase ──
    function loadRoster() {
      const rosterEl = document.getElementById('roster');
      const newCharGroup = document.getElementById('charEnd');

      function renderChars(chars) {
        if (!Array.isArray(chars)) return;
        chars.filter(function(c) { return !c.char_id.startsWith('npc_'); })
             .sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','pt'); })
             .forEach(function(char, i) {
          const card = createHoloCard(char.char_id, char.name, char.img_url);
          card.style.animationDelay = (i * 80) + 'ms';
          rosterEl.insertBefore(card, newCharGroup);
        });
      }

      var spFilter = CURRENT_SPACE
        ? ('&space_id=eq.' + encodeURIComponent(CURRENT_SPACE.id))
        : '&space_id=is.null';

      sbFetch('/rest/v1/personagens?select=*&order=created_at.asc' + spFilter, 'GET')
        .then(function(chars) {
          if (!Array.isArray(chars) && !CURRENT_SPACE) {
            // coluna space_id ainda não existe — busca sem filtro (fallback)
            return sbFetch('/rest/v1/personagens?select=*&order=created_at.asc', 'GET')
              .then(renderChars);
          }
          renderChars(chars);
        })
        .catch(function(e) { console.error('Erro ao carregar personagens:', e); });
    }

    // Inicializa espaços do Supabase → depois renderiza portais e roster
    spInit().then(function() {
      spRender();
      loadRoster();
      if (CURRENT_SPACE) {
        document.body.classList.add('space-mode');
        var titleEl = document.querySelector('.page-title');
        if (titleEl) {
          titleEl.textContent = CURRENT_SPACE.name;
          titleEl.style.color = 'rgba(' + CURRENT_SPACE.rgb + ',0.55)';
          titleEl.style.textShadow = '0 0 24px rgba(' + CURRENT_SPACE.rgb + ',0.2)';
        }
        var backEl = document.querySelector('.back-btn');
        if (backEl) { backEl.href = 'personagens.html'; }
        var newCharBtn2 = document.getElementById('newCharBtn');
        if (newCharBtn2) newCharBtn2.href = 'ficha.html?esp=' + encodeURIComponent(ESP_PARAM);
      }
    });

    // ── NPCs inline no Modo Mestre ──
    var npcsLoading = false;

    function loadNpcsInline() {
      if (npcsLoading) return;
      npcsLoading = true;

      var rosterEl   = document.getElementById('roster');
      var newCharGrp = document.getElementById('charEnd');
      var portal     = rosterEl.querySelector('.portal-group');
      if (portal) portal.style.display = 'none';

      var divider = document.createElement('div');
      divider.id = 'npcInlineSection';
      divider.className = 'npc-section-label';
      divider.textContent = '— N P C S —';
      rosterEl.insertBefore(divider, newCharGrp);

      sbFetch('/rest/v1/personagens?select=*&order=created_at.asc')
        .then(function(chars) {
          if (!Array.isArray(chars)) return;
          chars.filter(function(c) { return c.char_id.startsWith('npc_'); })
               .sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','pt'); })
               .forEach(function(npc, i) {
            var card = createHoloCard(npc.char_id, npc.name, npc.img_url, 'N P C');
            card.classList.add('npc-inline');
            card.style.animationDelay = (i * 80) + 'ms';
            rosterEl.insertBefore(card, newCharGrp);
          });
        });
    }

    function removeNpcsInline() {
      npcsLoading = false;
      var portal = document.querySelector('#roster .portal-group');
      if (portal) portal.style.display = '';

      var section = document.getElementById('npcInlineSection');
      if (section) section.remove();

      document.querySelectorAll('.char-group.npc-inline').forEach(function(el) {
        var idx = selectedChars.findIndex(function(c) { return c.id === el.dataset.charId; });
        if (idx >= 0) selectedChars.splice(idx, 1);
        el.remove();
      });
    }

    // ── Personagens de espaços inline no Modo Mestre ──
    var spaceCharsLoading = false;

    function loadSpaceCharsInline() {
      if (spaceCharsLoading || CURRENT_SPACE) return;
      spaceCharsLoading = true;

      var spaces = spLoad();
      if (!spaces.length) { spaceCharsLoading = false; return; }

      var roster    = document.getElementById('roster');
      var newCharGrp = document.getElementById('charEnd');

      spaces.forEach(function(sp) {
        sbFetch('/rest/v1/personagens?select=*&order=created_at.asc&space_id=eq.' + encodeURIComponent(sp.id), 'GET')
          .then(function(chars) {
            if (!Array.isArray(chars) || !chars.length) return;

            var divider = document.createElement('div');
            divider.id = 'spInline_' + sp.id;
            divider.className = 'npc-section-label';
            divider.textContent = '— ' + sp.name + ' —';
            divider.style.color = 'rgba(' + sp.rgb + ',0.6)';
            divider.style.borderTopColor = 'rgba(' + sp.rgb + ',0.14)';
            roster.insertBefore(divider, newCharGrp);

            chars.filter(function(c) { return !c.char_id.startsWith('npc_'); })
                 .forEach(function(char, i) {
              var card = createHoloCard(char.char_id, char.name, char.img_url);
              card.classList.add('sp-inline-char');
              card.style.animationDelay = (i * 80) + 'ms';
              roster.insertBefore(card, newCharGrp);
            });
          });
      });
    }

    function removeSpaceCharsInline() {
      spaceCharsLoading = false;
      document.querySelectorAll('[id^="spInline_"]').forEach(function(el) { el.remove(); });
      document.querySelectorAll('.char-group.sp-inline-char').forEach(function(el) {
        var idx = selectedChars.findIndex(function(c) { return c.id === el.dataset.charId; });
        if (idx >= 0) selectedChars.splice(idx, 1);
        el.remove();
      });
    }

    // ── Modo Mestre ──
    let mestreMode = false;
    const selectedChars = [];

    function toggleMestre() {
      mestreMode = !mestreMode;
      document.body.classList.toggle('mestre-mode', mestreMode);
      document.getElementById('mestreBtn').classList.toggle('active', mestreMode);
      if (mestreMode) {
        loadNpcsInline();
        loadSpaceCharsInline();
      } else {
        removeNpcsInline();
        removeSpaceCharsInline();
        selectedChars.length = 0;
        document.querySelectorAll('.char-group.selected').forEach(g => g.classList.remove('selected'));
        document.querySelectorAll('.mestre-sel-badge').forEach(b => b.textContent = '');
      }
      updateMestreBar();
    }

    function updateMestreBar() {
      const count = selectedChars.length;
      document.getElementById('mestreBar').classList.toggle('visible', mestreMode);
      document.getElementById('mestreCount').textContent = count;
      document.getElementById('mestreOpenBtn').disabled = count === 0;
      document.getElementById('mestreLimitMsg').classList.toggle('show', count >= 6);
    }

    function updateBadges() {
      document.querySelectorAll('.char-group').forEach(group => {
        const badge = group.querySelector('.mestre-sel-badge');
        if (!badge) return;
        const idx = selectedChars.findIndex(c => c.id === group.dataset.charId);
        badge.textContent = idx >= 0 ? (idx + 1) : '';
      });
    }

    function openSelectedFichas() {
      const ids = selectedChars.map(c => c.id).join(',');
      window.open('mestre-view.html?ids=' + ids, '_blank');
    }

    document.getElementById('roster').addEventListener('click', (e) => {
      if (!mestreMode) return;
      const btn = e.target.closest('.char-btn');
      if (!btn) return;
      e.preventDefault();
      const group = btn.closest('.char-group');
      if (!group || !group.dataset.charId) return;
      const charId = group.dataset.charId;
      const existingIdx = selectedChars.findIndex(c => c.id === charId);
      if (existingIdx >= 0) {
        selectedChars.splice(existingIdx, 1);
        group.classList.remove('selected');
      } else {
        if (selectedChars.length >= 6) {
          group.classList.add('shake');
          setTimeout(() => group.classList.remove('shake'), 400);
          return;
        }
        selectedChars.push({ id: charId, name: group.dataset.charName });
        group.classList.add('selected');
      }
      updateBadges();
      updateMestreBar();
    });

    // ── Novo personagem: gera ID único e abre ficha ──
    document.getElementById('newCharBtn').addEventListener('click', (e) => {
      e.preventDefault();
      // Limpa todos os campos do localStorage antes de abrir ficha nova
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith('idfield:') || k.startsWith('bio:') ||
            k === 'holoImg' || k === 'sheetTitle' || k === 'notes' ||
            k === 'xpTotal' || k === 'xpSpent' ||
            k.startsWith('vit:') || k.startsWith('fdv:') || k.startsWith('desp:') ||
            k.startsWith('trunfo:') || k.startsWith('quality:') ||
            k.startsWith('equip:') || k.startsWith('distinct:')) {
          localStorage.removeItem(k);
        }
      });
      const id = 'char_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      window.location.href = 'ficha.html?id=' + id + (ESP_PARAM ? '&esp=' + encodeURIComponent(ESP_PARAM) : '');
    });
    // ── Context menu ──────────────────────────────────────────
    let ctxCharId = null, ctxCharGroup = null, ctxOpenedAt = 0;
    let ctxBusy = false;
    const ctxMenu = document.getElementById('ctxMenu');

    function showCtxMenu(x, y, charId, name, group) {
      ctxCharId = charId; ctxCharGroup = group;
      ctxOpenedAt = Date.now();

      // Itens dinâmicos de mover para espaço
      var spItems = document.getElementById('ctxSpaceItems');
      var spDiv   = document.getElementById('ctxSpaceDivider');
      spItems.innerHTML = '';
      var dests = [];
      if (CURRENT_SPACE) dests.push({ label: '← Início', id: null });
      spLoad().forEach(function(sp) {
        if (!CURRENT_SPACE || sp.id !== CURRENT_SPACE.id)
          dests.push({ label: sp.name, id: sp.id });
      });
      spDiv.style.display = dests.length ? '' : 'none';
      dests.forEach(function(dest) {
        var item = document.createElement('div');
        item.className = 'ctx-item';
        item.dataset.destSpId = (dest.id === null) ? '__null__' : dest.id;
        item.innerHTML = '<span class="ctx-icon">⇢</span> ' + dest.label;
        spItems.appendChild(item);
      });

      ctxMenu.style.left = '0px'; ctxMenu.style.top = '0px';
      ctxMenu.classList.add('open');
      requestAnimationFrame(() => {
        const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
        ctxMenu.style.left = Math.max(8, Math.min(x, window.innerWidth  - mw - 8)) + 'px';
        ctxMenu.style.top  = Math.max(8, Math.min(y, window.innerHeight - mh - 8)) + 'px';
      });
    }
    function closeCtxMenu() {
      ctxMenu.classList.remove('open');
      ctxCharId = null; ctxCharGroup = null;
    }
    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'ctx-toast'; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2600);
    }

    // Fechar ao clicar fora
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#ctxMenu')) closeCtxMenu();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCtxMenu(); });

    // Right-click
    document.getElementById('roster').addEventListener('contextmenu', (e) => {
      const btn = e.target.closest('.char-btn');
      if (!btn) return;
      e.preventDefault();
      const g = btn.closest('.char-group');
      if (!g || !g.dataset.charId) return;
      showCtxMenu(e.clientX, e.clientY, g.dataset.charId, g.dataset.charName, g);
    });

    // Long press mobile
    let lpTimer = null, lpTriggered = false;
    document.getElementById('roster').addEventListener('touchstart', (e) => {
      const btn = e.target.closest('.char-btn');
      if (!btn) return;
      const g = btn.closest('.char-group');
      if (!g || !g.dataset.charId) return;
      const t = e.touches[0];
      lpTimer = setTimeout(() => {
        lpTriggered = true;
        navigator.vibrate && navigator.vibrate(50);
        showCtxMenu(t.clientX, t.clientY + 20, g.dataset.charId, g.dataset.charName, g);
      }, 400);
    }, { passive: true });
    document.getElementById('roster').addEventListener('touchmove',  () => clearTimeout(lpTimer), { passive: true });
    document.getElementById('roster').addEventListener('touchend',   () => clearTimeout(lpTimer), { passive: true });
    document.getElementById('roster').addEventListener('click', (e) => {
      if (!lpTriggered) return;
      lpTriggered = false; e.preventDefault(); e.stopPropagation();
    }, true);

    // ── Duplicar ──
    document.getElementById('ctxDuplicate').addEventListener('click', async (e) => {
      e.stopPropagation();
      // Guard: ignora se menu abriu há menos de 300ms (evita disparo acidental)
      if (Date.now() - ctxOpenedAt < 300 || !ctxCharId || ctxBusy) return;
      ctxBusy = true;
      const id = ctxCharId, grp = ctxCharGroup;
      closeCtxMenu();
      try {
        const rows = await sbFetch('/rest/v1/personagens?char_id=eq.' + id + '&select=*');
        if (!rows || !rows[0]) return;
        const src = rows[0];
        const prefix = id.startsWith('npc_') ? 'npc_' : 'char_';
        const newId   = prefix + Date.now() + '_' + Math.random().toString(36).slice(2,7);
        const newName = (src.name || 'Personagem') + ' (Cópia)';
        const newData = JSON.parse(JSON.stringify(src.sheet_data || {}));
        if (newData.fields) newData.fields.name = newName;
        await sbFetch('/rest/v1/personagens', 'POST', {
          char_id: newId, name: newName, img_url: src.img_url || null, sheet_data: newData
        });
        const card = createHoloCard(newId, newName, src.img_url);
        document.getElementById('roster').insertBefore(card, document.getElementById('charEnd'));
        requestAnimationFrame(() => card.classList.add('dupe-flash'));
        setTimeout(() => card.classList.remove('dupe-flash'), 950);
        showToast('⊕  Cópia criada');
      } finally { ctxBusy = false; }
    });

    // ── Mover para NPCs ──
    document.getElementById('ctxMove').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (Date.now() - ctxOpenedAt < 300 || !ctxCharId || ctxBusy) return;
      ctxBusy = true;
      const id = ctxCharId, grp = ctxCharGroup;
      closeCtxMenu();
      try {
        const rows = await sbFetch('/rest/v1/personagens?char_id=eq.' + id + '&select=*');
        if (!rows || !rows[0]) return;
        const src = rows[0];
        const newId = 'npc_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
        // Anima saída ANTES das operações de rede
        if (grp) grp.classList.add('transmit-out');
        await sbFetch('/rest/v1/personagens', 'POST', {
          char_id: newId, name: src.name, img_url: src.img_url || null, sheet_data: src.sheet_data
        });
        await sbFetch('/rest/v1/personagens?char_id=eq.' + id, 'DELETE');
        setTimeout(() => grp && grp.remove(), 680);
        showToast('⇄  Movido para N P C S');
      } finally { ctxBusy = false; }
    });

    // ── Mover para espaço ────────────────────────────────────────────────
    document.getElementById('ctxSpaceItems').addEventListener('click', async (e) => {
      const item = e.target.closest('[data-dest-sp-id]');
      if (!item) return;
      e.stopPropagation();
      if (Date.now() - ctxOpenedAt < 300 || !ctxCharId || ctxBusy) return;
      ctxBusy = true;
      const rawId  = item.dataset.destSpId;
      const destId = rawId === '__null__' ? null : rawId;
      const id = ctxCharId, grp = ctxCharGroup;
      closeCtxMenu();
      try {
        if (grp) grp.classList.add('transmit-out');
        const res = await sbFetch('/rest/v1/personagens?char_id=eq.' + id, 'PATCH', { space_id: destId });
        // PATCH bem-sucedido devolve 204 → null; qualquer objeto é erro do Supabase
        if (res !== null && res !== undefined) {
          grp && grp.classList.remove('transmit-out');
          const msg = (res && res.message) ? res.message : 'Erro ao mover';
          showToast('⚠ ' + msg);
          return;
        }
        setTimeout(() => grp && grp.remove(), 680);
        const destLabel = destId
          ? (spLoad().find(function(s){ return s.id === destId; }) || { name: destId }).name
          : 'Início';
        showToast('⇢  Movido para ' + destLabel);
      } catch(err) {
        grp && grp.classList.remove('transmit-out');
        showToast('Erro ao mover');
      } finally {
        ctxBusy = false;
      }
    });

    // ── Espaços personalizados ──────────────────────────────────────────
    const SP_PALETTE = [
      {hex:'#ff2d78',rgb:'255,45,120'},
      {hex:'#0088ff',rgb:'0,136,255'},
      {hex:'#00ff88',rgb:'0,255,136'},
      {hex:'#ffe700',rgb:'255,231,0'},
      {hex:'#ff4444',rgb:'255,68,68'},
      {hex:'#00ffb3',rgb:'0,255,179'},
      {hex:'#44ddff',rgb:'68,221,255'},
      {hex:'#ff9900',rgb:'255,153,0'},
    ];

    function spRandColor() { return SP_PALETTE[Math.floor(Math.random() * SP_PALETTE.length)]; }

    function spCreateCard(sp) {
      const group = document.createElement('div');
      group.className = 'sp-portal-group';
      group.dataset.spaceId = sp.id;
      group.style.setProperty('--scr', sp.rgb);
      group.innerHTML =
        '<a href="personagens.html?esp=' + encodeURIComponent(sp.id) + '" class="sp-portal-btn">' +
          '<div class="sp-ring sp-ring-1"></div>' +
          '<div class="sp-ring sp-ring-2"></div>' +
          '<div class="sp-ring sp-ring-3"></div>' +
          '<div class="sp-ring sp-ring-4"></div>' +
          '<div class="sp-core"></div>' +
        '</a>' +
        '<div class="sp-portal-name">' + sp.name + '</div>' +
        '<button class="sp-del-btn" title="Remover espaço">✕</button>';
      group.querySelector('.sp-del-btn').addEventListener('click', async function(e) {
        e.stopPropagation();
        if (!confirm('Remover espaço "' + sp.name + '"?')) return;
        // Move personagens do espaço de volta para a raiz antes de deletar
        await sbFetch('/rest/v1/personagens?space_id=eq.' + encodeURIComponent(sp.id), 'PATCH', { space_id: null });
        await sbFetch('/rest/v1/spaces?id=eq.' + encodeURIComponent(sp.id), 'DELETE');
        _spacesCache = _spacesCache.filter(function(s){ return s.id !== sp.id; });
        group.style.transition = 'opacity .3s, transform .3s';
        group.style.opacity = '0'; group.style.transform = 'scale(.85)';
        setTimeout(function(){ group.remove(); }, 300);
      });
      return group;
    }

    function spRender() {
      const roster = document.getElementById('roster');
      const anchor = document.getElementById('charAnchor');
      roster.querySelectorAll('.sp-portal-group').forEach(function(el){ el.remove(); });
      const frag = document.createDocumentFragment();
      spLoad().slice().sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','pt'); })
              .forEach(function(sp){ frag.appendChild(spCreateCard(sp)); });
      roster.insertBefore(frag, anchor);
    }

    function spShowModal() {
      if (document.querySelector('.__sp-ov')) return;
      const ov = document.createElement('div');
      ov.className = '__sp-ov';
      ov.innerHTML =
        '<div class="__sp-box">' +
          '<h2>Novo Espaço</h2>' +
          '<input class="__sp-input" id="__sp-inp" type="text" placeholder="Nome do espaço" maxlength="24" autocomplete="off">' +
          '<div class="__sp-btns">' +
            '<button class="__sp-ok" id="__sp-ok">Criar</button>' +
            '<button class="__sp-cx" id="__sp-cx">Cancelar</button>' +
          '</div>' +
        '</div>';
      document.body.appendChild(ov);
      const inp = document.getElementById('__sp-inp');
      setTimeout(function(){ inp.focus(); }, 50);
      async function spConfirm() {
        const name = inp.value.trim().toUpperCase();
        if (!name) { inp.focus(); return; }
        const color = spRandColor();
        const sp = { id:'esp_'+Date.now().toString(36), name:name, hex:color.hex, rgb:color.rgb };
        await sbFetch('/rest/v1/spaces', 'POST', sp);
        _spacesCache.push(sp);
        ov.remove(); spRender();
      }
      document.getElementById('__sp-ok').addEventListener('click', spConfirm);
      document.getElementById('__sp-cx').addEventListener('click', function(){ ov.remove(); });
      inp.addEventListener('keydown', function(e){
        if (e.key === 'Enter') spConfirm();
        if (e.key === 'Escape') ov.remove();
      });
    }

    document.getElementById('newSpaceBtn').addEventListener('click', function(e){
      e.stopPropagation(); spShowModal();
    });
  </script>

<!-- ── Duplo clique/toque para voltar ── -->
<script>
(function(){
  'use strict';
  var _esp = new URLSearchParams(location.search).get('esp');
  var DEST = _esp ? 'personagens.html' : 'index.html';
  var IA = 'button,a,input,textarea,select,[contenteditable]';
  function nav(){ window.location.href = DEST; }
  document.addEventListener('dblclick', function(e){ if(e.target.closest(IA)) return; nav(); });
  var _t = 0;
  document.addEventListener('touchend', function(e){
    var el = e.target; if(el.closest(IA)){ _t=0; return; }
    var n = Date.now(); if(n-_t<300){ _t=0; nav(); return; } _t=n;
  },{passive:true});
})();
</script>
</body>
