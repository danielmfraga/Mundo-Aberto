<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personagens · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --holo3:  #7b2fff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Cantos ── */
    .corner {
      position: fixed;
      width: 36px; height: 36px;
      pointer-events: none;
      z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--orange);
      box-shadow: var(--glow-o);
    }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* ── Layout geral ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 60px 80px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 52px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.45);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
    }
    .back-btn:hover { color: var(--holo); }
    .back-arrow {
      font-size: 18px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 8px;
      color: rgba(0,255,231,0.4);
      text-transform: uppercase;
    }

    .header-spacer { width: 120px; } /* balanceia o back-btn */

    /* ── Grid de personagens ── */
    .roster {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: flex-start;
    }

    /* ── Card de personagem ── */
    .char-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .char-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .char-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,255,231,0.18);
      border-radius: 8px;
      background: rgba(0,255,231,0.02);
      transition: background 0.3s, border-color 0.3s;
    }
    .char-btn:hover .char-panel {
      background: rgba(0,255,231,0.05);
      border-color: rgba(0,255,231,0.4);
    }

    .char-led-wrap {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 5;
      white-space: nowrap;
    }
    .char-led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      animation: ledBlink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes ledBlink {
      0%,100% { opacity: 1;   box-shadow: 0 0 8px var(--holo), 0 0 16px var(--holo); }
      50%      { opacity: 0.3; box-shadow: 0 0 4px var(--holo); }
    }
    .char-led-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.55);
      text-transform: uppercase;
    }

    .char-projection {
      position: relative;
      width: 160px; height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .holo-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.3);
      animation: ringRotate linear infinite;
    }
    .ring1 { width: 88%; height: 88%; animation-duration: 12s; border-color: rgba(0,255,231,0.2); }
    .ring2 { width: 96%; height: 50%; border-color: rgba(0,136,255,0.35); animation-duration: 8s; animation-direction: reverse; }
    .ring3 { width: 70%; height: 70%; border-style: dashed; border-color: rgba(123,47,255,0.35); animation-duration: 20s; }
    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .ring2 { animation-name: ringRotate2; }
    @keyframes ringRotate2 {
      from { transform: rotateX(75deg) rotate(0deg); }
      to   { transform: rotateX(75deg) rotate(360deg); }
    }

    .char-core {
      position: relative;
      z-index: 2;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,231,0.08);
      background: rgba(0,255,231,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .char-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    @keyframes scanMove {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }
    .char-btn:hover .char-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }

    /* Imagem do personagem dentro do holograma */
    .char-core img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: hue-rotate(180deg) saturate(1.5) brightness(0.9);
      mix-blend-mode: screen;
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .char-icon {
      font-size: 22px;
      opacity: 0.45;
      animation: iconPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes iconPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .char-beam {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 44px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 8px var(--holo);
      animation: beamPulse 3s ease-in-out infinite;
    }
    @keyframes beamPulse {
      0%,100% { opacity: 0.8; height: 44px; }
      50%      { opacity: 0.3; height: 34px; }
    }

    .data-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .char-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(0,255,231,0.45);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .char-group:hover .char-name {
      color: var(--holo);
      text-shadow: 0 0 10px #00ffe7aa;
    }

    /* ── Botão + (novo personagem) ── */
    .new-char-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .new-char-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      border: 1px dashed rgba(0,255,231,0.2);
      border-radius: 8px;
      background: transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    .new-char-btn:hover {
      border-color: rgba(0,255,231,0.5);
      background: rgba(0,255,231,0.03);
    }

    .plus-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      position: relative;
    }
    /* braço horizontal */
    .plus-icon::before {
      content: '';
      position: absolute;
      width: 100%; height: 1px;
      background: rgba(0,255,231,0.4);
      box-shadow: 0 0 8px rgba(0,255,231,0.3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    /* braço vertical */
    .plus-icon::after {
      content: '';
      position: absolute;
      width: 1px; height: 100%;
      background: rgba(0,255,231,0.4);
      box-shadow: 0 0 8px rgba(0,255,231,0.3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .new-char-btn:hover .plus-icon::before,
    .new-char-btn:hover .plus-icon::after {
      background: var(--holo);
      box-shadow: 0 0 14px rgba(0,255,231,0.6);
    }

    /* Quadradinhos nos cantos do + */
    .plus-corner {
      position: absolute;
      width: 6px; height: 6px;
      border: 1px solid rgba(0,255,231,0.35);
      transition: border-color 0.3s;
    }
    .plus-corner.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .plus-corner.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .plus-corner.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .plus-corner.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    .new-char-btn:hover .plus-corner { border-color: var(--holo); }

    .new-char-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(0,255,231,0.3);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
    }
    .new-char-btn:hover ~ .new-char-label,
    .new-char-group:hover .new-char-label {
      color: var(--holo);
    }
  
    /* ── Botão deletar personagem ── */
    .char-delete-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(255,85,102,0.4);
      color: rgba(255,85,102,0.6);
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    .char-group {
      position: relative;
    }
    .char-group:hover .char-delete-btn {
      opacity: 1;
    }
    .char-delete-btn:hover {
      color: #ff5566;
      border-color: #ff5566;
      box-shadow: 0 0 10px rgba(255,85,102,0.4);
    }
    /* ── Portal Buraco Negro (NPCs) ── */
    .portal-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }

    .portal-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      border-radius: 8px;
      border: 1px solid rgba(123,47,255,0.18);
      background: rgba(123,47,255,0.02);
      transition: border-color 0.3s, background 0.3s;
      overflow: hidden;
    }
    .portal-btn:hover {
      border-color: rgba(123,47,255,0.45);
      background: rgba(123,47,255,0.05);
    }

    /* anéis orbitais do buraco negro */
    .bh-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(123,47,255,0.35);
      animation: bhRotate linear infinite;
    }
    .bh-ring-1 { width: 140px; height: 140px; animation-duration: 18s; border-color: rgba(123,47,255,0.25); }
    .bh-ring-2 { width: 110px; height: 44px;  animation-duration: 10s; border-color: rgba(123,47,255,0.45); animation-name: bhRotateFlat; }
    .bh-ring-3 { width: 86px;  height: 86px;  animation-duration: 26s; border-style: dashed; border-color: rgba(160,80,255,0.3); animation-direction: reverse; }
    .bh-ring-4 { width: 160px; height: 60px;  animation-duration: 14s; border-color: rgba(100,40,200,0.3); animation-name: bhRotateFlat2; }

    @keyframes bhRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes bhRotateFlat {
      from { transform: rotateX(72deg) rotate(0deg); }
      to   { transform: rotateX(72deg) rotate(360deg); }
    }
    @keyframes bhRotateFlat2 {
      from { transform: rotateX(65deg) rotate(180deg); }
      to   { transform: rotateX(65deg) rotate(-180deg); }
    }

    /* núcleo escuro */
    .bh-core {
      position: relative;
      z-index: 2;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle, #000 40%, rgba(60,10,120,0.6) 70%, transparent 100%);
      box-shadow: 0 0 20px rgba(123,47,255,0.5), 0 0 50px rgba(123,47,255,0.2), inset 0 0 20px rgba(0,0,0,0.9);
      border: 1px solid rgba(123,47,255,0.4);
    }
    .portal-btn:hover .bh-core {
      box-shadow: 0 0 30px rgba(123,47,255,0.8), 0 0 70px rgba(123,47,255,0.35), inset 0 0 20px rgba(0,0,0,0.9);
    }

    /* scan interno */
    .bh-core::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(123,47,255,0.05) 3px, rgba(123,47,255,0.05) 4px
      );
      animation: scanMove 6s linear infinite;
    }

    /* partículas orbitando */
    .bh-particle {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: #a050ff;
      box-shadow: 0 0 6px #a050ff;
      left: 50%; top: 50%;
      margin: -1.5px 0 0 -1.5px;
    }
    .bh-p1 { animation: bhOrbit1 7s   linear infinite; }
    .bh-p2 { animation: bhOrbit2 4.5s linear infinite; }
    .bh-p3 { animation: bhOrbit3 11s  linear infinite; }
    @keyframes bhOrbit1 {
      from { transform: rotate(0deg)   translateX(62px); }
      to   { transform: rotate(360deg) translateX(62px); }
    }
    @keyframes bhOrbit2 {
      from { transform: rotate(120deg) translateX(46px); }
      to   { transform: rotate(480deg) translateX(46px); }
    }
    @keyframes bhOrbit3 {
      from { transform: rotate(240deg) translateX(78px); }
      to   { transform: rotate(600deg) translateX(78px); }
    }

    .portal-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 6px;
      color: rgba(123,47,255,0.55);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
    }
    .portal-btn:hover ~ .portal-name,
    .portal-group:hover .portal-name {
      color: #a050ff;
      text-shadow: 0 0 10px rgba(123,47,255,0.6);
    }

    /* ── Botão Mestre ── */
    .mestre-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--orange);
      text-transform: uppercase;
      background: rgba(255,107,26,0.08);
      border: 1px solid rgba(255,107,26,0.55);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 120px;
      text-align: center;
    }
    .mestre-btn:hover {
      background: rgba(255,107,26,0.15);
      border-color: var(--orange);
      box-shadow: 0 0 12px rgba(255,107,26,0.4);
    }
    .mestre-btn.active {
      color: var(--orange);
      border-color: var(--orange);
      background: rgba(255,107,26,0.08);
      box-shadow: var(--glow-o);
    }

    /* ── Modo Mestre ── */
    .mestre-mode .char-group .char-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 8px;
      border: 2px dashed rgba(255,107,26,0.35);
      z-index: 20;
      transition: border-color 0.2s, box-shadow 0.2s;
      pointer-events: none;
    }
    .mestre-mode .char-group:hover .char-btn::after {
      border-color: rgba(255,107,26,0.65);
      box-shadow: inset 0 0 16px rgba(255,107,26,0.08);
    }
    .mestre-mode .char-group.selected .char-btn::after {
      border: 2px solid var(--orange);
      box-shadow: inset 0 0 20px rgba(255,107,26,0.15), 0 0 15px rgba(255,107,26,0.35);
    }
    .mestre-mode .char-delete-btn { display: none; }

    .mestre-sel-badge {
      display: none;
      position: absolute;
      top: -10px;
      left: -10px;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--orange);
      color: var(--dark);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      align-items: center;
      justify-content: center;
      z-index: 30;
      box-shadow: 0 0 10px rgba(255,107,26,0.7);
    }
    .mestre-mode .char-group.selected .mestre-sel-badge { display: flex; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }

    /* ── Barra do Mestre ── */
    .mestre-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 14px 40px;
      background: linear-gradient(to top, rgba(4,8,16,0.98), rgba(4,8,16,0.88));
      border-top: 1px solid rgba(255,107,26,0.3);
      z-index: 200;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .mestre-bar.visible { display: flex; }
    .mestre-bar-info {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,107,26,0.65);
      text-transform: uppercase;
    }
    .mestre-bar-count {
      font-size: 22px;
      color: var(--orange);
      text-shadow: var(--glow-o);
      margin: 0 4px;
    }
    .mestre-bar-limit {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,107,26,0.4);
      text-transform: uppercase;
      visibility: hidden;
    }
    .mestre-bar-limit.show { visibility: visible; }
    .mestre-open-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dark);
      background: var(--orange);
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: var(--glow-o);
      transition: box-shadow 0.2s, transform 0.1s;
    }
    .mestre-open-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(255,107,26,0.8), 0 0 40px rgba(255,107,26,0.4);
      transform: scale(1.03);
    }
    .mestre-open-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .page {
        padding: 28px 20px 60px;
      }

      /* Header: voltar em cima, título centralizado abaixo */
      .page-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 36px;
      }
      .page-title {
        align-self: center;
        font-size: 11px;
        letter-spacing: 6px;
      }
      .header-spacer { display: none; }

      /* Roster: coluna centralizada */
      .roster {
        flex-direction: column;
        align-items: center;
        gap: 32px;
        width: 100%;
      }

      /* Cards menores no mobile */
      .char-btn {
        width: 180px;
        height: 180px;
      }
      .char-projection {
        width: 144px;
        height: 144px;
      }
      .new-char-btn {
        width: 180px;
        height: 180px;
      }
    }
    </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="page">

    <div class="page-header">
      <a href="index.html" class="back-btn">
        <span class="back-arrow">←</span>
        Voltar
      </a>
      <div class="page-title">Personagens</div>
      <button class="mestre-btn" id="mestreBtn" onclick="toggleMestre()">Mestre</button>
    </div>

    <div class="roster" id="roster">
      <!-- personagens carregados via JS -->

      <!-- Portal NPCs (buraco negro) -->
      <div class="portal-group">
        <a href="npcs.html" class="portal-btn">
          <div class="bh-ring bh-ring-1"></div>
          <div class="bh-ring bh-ring-2"></div>
          <div class="bh-ring bh-ring-3"></div>
          <div class="bh-ring bh-ring-4"></div>
          <div class="bh-core"></div>
          <div class="bh-particle bh-p1"></div>
          <div class="bh-particle bh-p2"></div>
          <div class="bh-particle bh-p3"></div>
        </a>
        <div class="portal-name">N P C S</div>
      </div>

      <!-- Botão novo personagem -->
      <div class="new-char-group">
        <a href="ficha.html" class="new-char-btn" id="newCharBtn">
          <div class="plus-icon">
            <span class="plus-corner tl"></span>
            <span class="plus-corner tr"></span>
            <span class="plus-corner bl"></span>
            <span class="plus-corner br"></span>
          </div>
        </a>
        <div class="new-char-label">Novo Personagem</div>
      </div>

    </div>
  </div>

  <!-- Barra do Mestre -->
  <div class="mestre-bar" id="mestreBar">
    <div class="mestre-bar-info">
      <span class="mestre-bar-count" id="mestreCount">0</span> ficha(s) selecionada(s)
      <div class="mestre-bar-limit" id="mestreLimitMsg">máximo 6 atingido</div>
    </div>
    <button class="mestre-open-btn" id="mestreOpenBtn" disabled onclick="openSelectedFichas()">Abrir fichas</button>
  </div>

  <script>
    var SUPABASE_URL = 'https://mxyqqfsyybluavwlrhsa.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXFxZnN5eWJsdWF2d2xyaHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTM4MzEsImV4cCI6MjA5MzY2OTgzMX0.b0Ij7UGzbMLpqZjLYxoPEu2kGwEW52U_2NSDtpMGUPM';

    function sbFetch(path, method, body) {
      return fetch(SUPABASE_URL + path, {
        method: method || 'GET',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: body ? JSON.stringify(body) : undefined
      }).then(function(r) { return r.json(); });
    }

    // ── Holograma reutilizável ──
    function createHoloCard(charId, name, imgSrc) {
      const href = 'ficha.html?id=' + charId;
      const group = document.createElement('div');
      group.className = 'char-group';
      group.dataset.charId = charId;
      group.dataset.charName = name || 'Personagem';

      const btn = document.createElement('a');
      btn.href = href;
      btn.className = 'char-btn';

      btn.innerHTML = `
        <div class="char-panel"></div>
        <div class="char-led-wrap">
          <div class="char-led"></div>
          <span class="char-led-label">Black Box</span>
        </div>
        <div class="char-projection">
          <div class="ring1 holo-ring"></div>
          <div class="ring2 holo-ring"></div>
          <div class="ring3 holo-ring"></div>
          <div class="char-core">
            ${imgSrc
              ? `<img src="${imgSrc}" alt="${name}">`
              : `<div class="char-icon">⬡</div>`
            }
          </div>
          <div class="char-beam"></div>
          <svg class="data-lines" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <line x1="100" y1="100" x2="18"  y2="30"  stroke="rgba(0,255,231,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1s"   repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="182" y2="30"  stroke="rgba(0,136,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.3s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="8"   y2="110" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="192" y2="110" stroke="rgba(123,47,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.5s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="40"  y2="185" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.1s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="160" y2="185" stroke="rgba(0,136,255,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.9s" repeatCount="indefinite"/></line>
            <circle cx="18"  cy="30"  r="2" fill="rgba(0,255,231,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2s"   repeatCount="indefinite"/></circle>
            <circle cx="182" cy="30"  r="2" fill="rgba(0,136,255,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
            <circle cx="8"   cy="110" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
            <circle cx="192" cy="110" r="2" fill="rgba(123,47,255,0.5)"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
            <circle cx="40"  cy="185" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="3s"   repeatCount="indefinite"/></circle>
            <circle cx="160" cy="185" r="2" fill="rgba(0,136,255,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
          </svg>
        </div>
      `;

      const label = document.createElement('div');
      label.className = 'char-name';
      label.textContent = name || 'Personagem';

      // ── Botão deletar ──
      const delBtn = document.createElement('button');
      delBtn.className = 'char-delete-btn';
      delBtn.title = 'Excluir personagem';
      delBtn.innerHTML = '✕';
      delBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (!confirm('Excluir "' + (name || 'Personagem') + '"? Esta ação não pode ser desfeita.')) return;
        // Remove do Supabase
        sbFetch('/rest/v1/personagens?char_id=eq.' + charId, 'DELETE');
        // Anima saída
        group.style.transition = 'opacity 0.3s, transform 0.3s';
        group.style.opacity = '0';
        group.style.transform = 'scale(0.85)';
        setTimeout(() => group.remove(), 300);
      });

      const badge = document.createElement('div');
      badge.className = 'mestre-sel-badge';

      group.appendChild(btn);
      group.appendChild(label);
      group.appendChild(delBtn);
      group.appendChild(badge);
      return group;
    }

    // ── Carrega personagens do Supabase ──
    function loadRoster() {
      const rosterEl = document.getElementById('roster');
      const newCharGroup = rosterEl.querySelector('.new-char-group');

      sbFetch('/rest/v1/personagens?select=*&order=created_at.asc', 'GET')
        .then(function(chars) {
          if (!Array.isArray(chars)) return;
          // exclui NPCs (char_id começa com "npc_")
          chars.filter(c => !c.char_id.startsWith('npc_')).forEach(function(char, i) {
            const card = createHoloCard(char.char_id, char.name, char.img_url);
            card.style.animationDelay = (i * 80) + 'ms';
            rosterEl.insertBefore(card, newCharGroup);
          });
        })
        .catch(function(e) { console.error('Erro ao carregar personagens:', e); });
    }

    loadRoster();

    // ── Modo Mestre ──
    let mestreMode = false;
    const selectedChars = [];

    function toggleMestre() {
      mestreMode = !mestreMode;
      document.body.classList.toggle('mestre-mode', mestreMode);
      document.getElementById('mestreBtn').classList.toggle('active', mestreMode);
      if (!mestreMode) {
        selectedChars.length = 0;
        document.querySelectorAll('.char-group.selected').forEach(g => g.classList.remove('selected'));
        document.querySelectorAll('.mestre-sel-badge').forEach(b => b.textContent = '');
      }
      updateMestreBar();
    }

    function updateMestreBar() {
      const count = selectedChars.length;
      document.getElementById('mestreBar').classList.toggle('visible', mestreMode);
      document.getElementById('mestreCount').textContent = count;
      document.getElementById('mestreOpenBtn').disabled = count === 0;
      document.getElementById('mestreLimitMsg').classList.toggle('show', count >= 6);
    }

    function updateBadges() {
      document.querySelectorAll('.char-group').forEach(group => {
        const badge = group.querySelector('.mestre-sel-badge');
        if (!badge) return;
        const idx = selectedChars.findIndex(c => c.id === group.dataset.charId);
        badge.textContent = idx >= 0 ? (idx + 1) : '';
      });
    }

    function openSelectedFichas() {
      const ids = selectedChars.map(c => c.id).join(',');
      window.open('mestre-view.html?ids=' + ids, '_blank');
    }

    document.getElementById('roster').addEventListener('click', (e) => {
      if (!mestreMode) return;
      const btn = e.target.closest('.char-btn');
      if (!btn) return;
      e.preventDefault();
      const group = btn.closest('.char-group');
      if (!group || !group.dataset.charId) return;
      const charId = group.dataset.charId;
      const existingIdx = selectedChars.findIndex(c => c.id === charId);
      if (existingIdx >= 0) {
        selectedChars.splice(existingIdx, 1);
        group.classList.remove('selected');
      } else {
        if (selectedChars.length >= 6) {
          group.classList.add('shake');
          setTimeout(() => group.classList.remove('shake'), 400);
          return;
        }
        selectedChars.push({ id: charId, name: group.dataset.charName });
        group.classList.add('selected');
      }
      updateBadges();
      updateMestreBar();
    });

    // ── Novo personagem: gera ID único e abre ficha ──
    document.getElementById('newCharBtn').addEventListener('click', (e) => {
      e.preventDefault();
      // Limpa todos os campos do localStorage antes de abrir ficha nova
      Object.keys(localStorage).forEach(k => {
        if (k.startsWith('idfield:') || k.startsWith('bio:') ||
            k === 'holoImg' || k === 'sheetTitle' || k === 'notes' ||
            k === 'xpTotal' || k === 'xpSpent' ||
            k.startsWith('vit:') || k.startsWith('fdv:') || k.startsWith('desp:') ||
            k.startsWith('trunfo:') || k.startsWith('quality:') ||
            k.startsWith('equip:') || k.startsWith('distinct:')) {
          localStorage.removeItem(k);
        }
      });
      const id = 'char_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      window.location.href = 'ficha.html?id=' + id;
    });
  </script>

</body>
</html>
