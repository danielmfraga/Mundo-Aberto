<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personagens · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --holo3:  #7b2fff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Cantos ── */
    .corner {
      position: fixed;
      width: 36px; height: 36px;
      pointer-events: none;
      z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--orange);
      box-shadow: var(--glow-o);
    }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* ── Layout geral ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 60px 80px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 52px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.45);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      cursor: pointer;
    }
    .back-btn:hover { color: var(--holo); }
    .back-arrow {
      font-size: 18px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 8px;
      color: rgba(0,255,231,0.4);
      text-transform: uppercase;
    }

    .header-spacer { width: 120px; } /* balanceia o back-btn */

    /* ── Grid de personagens ── */
    .roster {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: flex-start;
    }

    /* ── Card de personagem ── */
    .char-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .char-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .char-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,255,231,0.18);
      border-radius: 8px;
      background: rgba(0,255,231,0.02);
      transition: background 0.3s, border-color 0.3s;
    }
    .char-btn:hover .char-panel {
      background: rgba(0,255,231,0.05);
      border-color: rgba(0,255,231,0.4);
    }

    .char-led-wrap {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 5;
      white-space: nowrap;
    }
    .char-led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      animation: ledBlink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes ledBlink {
      0%,100% { opacity: 1;   box-shadow: 0 0 8px var(--holo), 0 0 16px var(--holo); }
      50%      { opacity: 0.3; box-shadow: 0 0 4px var(--holo); }
    }
    .char-led-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.55);
      text-transform: uppercase;
    }

    .char-projection {
      position: relative;
      width: 160px; height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .holo-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.3);
      animation: ringRotate linear infinite;
    }
    .ring1 { width: 88%; height: 88%; animation-duration: 12s; border-color: rgba(0,255,231,0.2); }
    .ring2 { width: 96%; height: 50%; border-color: rgba(0,136,255,0.35); animation-duration: 8s; animation-direction: reverse; }
    .ring3 { width: 70%; height: 70%; border-style: dashed; border-color: rgba(123,47,255,0.35); animation-duration: 20s; }
    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .ring2 { animation-name: ringRotate2; }
    @keyframes ringRotate2 {
      from { transform: rotateX(75deg) rotate(0deg); }
      to   { transform: rotateX(75deg) rotate(360deg); }
    }

    .char-core {
      position: relative;
      z-index: 2;
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,231,0.08);
      background: rgba(0,255,231,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .char-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    @keyframes scanMove {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }
    .char-btn:hover .char-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }

    /* Imagem do personagem dentro do holograma */
    .char-core img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: hue-rotate(180deg) saturate(1.5) brightness(0.9);
      mix-blend-mode: screen;
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .char-icon {
      font-size: 22px;
      opacity: 0.45;
      animation: iconPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes iconPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .char-beam {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 44px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 8px var(--holo);
      animation: beamPulse 3s ease-in-out infinite;
    }
    @keyframes beamPulse {
      0%,100% { opacity: 0.8; height: 44px; }
      50%      { opacity: 0.3; height: 34px; }
    }

    .data-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .char-name {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(0,255,231,0.45);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .char-group:hover .char-name {
      color: var(--holo);
      text-shadow: 0 0 10px #00ffe7aa;
    }

    /* ── Botão + (novo personagem) ── */
    .new-char-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .new-char-btn {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      border: 1px dashed rgba(0,255,231,0.2);
      border-radius: 8px;
      background: transparent;
      transition: border-color 0.3s, background 0.3s;
    }
    .new-char-btn:hover {
      border-color: rgba(0,255,231,0.5);
      background: rgba(0,255,231,0.03);
    }

    .plus-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      position: relative;
    }
    /* braço horizontal */
    .plus-icon::before {
      content: '';
      position: absolute;
      width: 100%; height: 1px;
      background: rgba(0,255,231,0.4);
      box-shadow: 0 0 8px rgba(0,255,231,0.3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    /* braço vertical */
    .plus-icon::after {
      content: '';
      position: absolute;
      width: 1px; height: 100%;
      background: rgba(0,255,231,0.4);
      box-shadow: 0 0 8px rgba(0,255,231,0.3);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .new-char-btn:hover .plus-icon::before,
    .new-char-btn:hover .plus-icon::after {
      background: var(--holo);
      box-shadow: 0 0 14px rgba(0,255,231,0.6);
    }

    /* Quadradinhos nos cantos do + */
    .plus-corner {
      position: absolute;
      width: 6px; height: 6px;
      border: 1px solid rgba(0,255,231,0.35);
      transition: border-color 0.3s;
    }
    .plus-corner.tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .plus-corner.tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .plus-corner.bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .plus-corner.br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    .new-char-btn:hover .plus-corner { border-color: var(--holo); }

    .new-char-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 4px;
      color: rgba(0,255,231,0.3);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
    }
    .new-char-btn:hover ~ .new-char-label,
    .new-char-group:hover .new-char-label {
      color: var(--holo);
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="page">

    <div class="page-header">
      <a href="index.html" class="back-btn">
        <span class="back-arrow">←</span>
        Voltar
      </a>
      <div class="page-title">Personagens</div>
      <div class="header-spacer"></div>
    </div>

    <div class="roster" id="roster">
      <!-- personagens carregados via JS -->

      <!-- Botão novo personagem -->
      <div class="new-char-group">
        <a href="ficha.html" class="new-char-btn" id="newCharBtn">
          <div class="plus-icon">
            <span class="plus-corner tl"></span>
            <span class="plus-corner tr"></span>
            <span class="plus-corner bl"></span>
            <span class="plus-corner br"></span>
          </div>
        </a>
        <div class="new-char-label">Novo Personagem</div>
      </div>

    </div>
  </div>

  <script>
    // ── Holograma reutilizável ──
    function createHoloCard(href, name, imgSrc) {
      const group = document.createElement('div');
      group.className = 'char-group';

      const btn = document.createElement('a');
      btn.href = href;
      btn.className = 'char-btn';

      btn.innerHTML = `
        <div class="char-panel"></div>
        <div class="char-led-wrap">
          <div class="char-led"></div>
          <span class="char-led-label">Black Box</span>
        </div>
        <div class="char-projection">
          <div class="ring1 holo-ring"></div>
          <div class="ring2 holo-ring"></div>
          <div class="ring3 holo-ring"></div>
          <div class="char-core">
            ${imgSrc
              ? `<img src="${imgSrc}" alt="${name}">`
              : `<div class="char-icon">⬡</div>`
            }
          </div>
          <div class="char-beam"></div>
          <svg class="data-lines" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <line x1="100" y1="100" x2="18" y2="30"  stroke="rgba(0,255,231,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1s"   repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="182" y2="30" stroke="rgba(0,136,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.3s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="8"   y2="110" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="192" y2="110" stroke="rgba(123,47,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.5s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="40"  y2="185" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.1s" repeatCount="indefinite"/></line>
            <line x1="100" y1="100" x2="160" y2="185" stroke="rgba(0,136,255,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.9s" repeatCount="indefinite"/></line>
            <circle cx="18"  cy="30"  r="2" fill="rgba(0,255,231,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2s"   repeatCount="indefinite"/></circle>
            <circle cx="182" cy="30"  r="2" fill="rgba(0,136,255,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
            <circle cx="8"   cy="110" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
            <circle cx="192" cy="110" r="2" fill="rgba(123,47,255,0.5)"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
            <circle cx="40"  cy="185" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="3s"   repeatCount="indefinite"/></circle>
            <circle cx="160" cy="185" r="2" fill="rgba(0,136,255,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
          </svg>
        </div>
      `;

      const label = document.createElement('div');
      label.className = 'char-name';
      label.textContent = name || 'Personagem';

      group.appendChild(btn);
      group.appendChild(label);
      return group;
    }

    // ── Carrega fichas salvas no localStorage ──
    // A ficha salva as chaves: idfield:name e holoImg (por aba/sessão)
    // Como cada ficha é um arquivo separado, precisamos de um registro central.
    // Aqui gerenciamos um array "roster" salvo em localStorage.
    // A ficha.html deve chamar registerCharacter() ao salvar — ou podemos detectar
    // via BroadcastChannel quando a ficha for aberta/editada.

    function loadRoster() {
      const roster = document.getElementById('roster');
      const newCharGroup = roster.querySelector('.new-char-group');

      // Lê o registro central de personagens
      let chars = [];
      try {
        chars = JSON.parse(localStorage.getItem('ma:roster') || '[]');
      } catch(e) { chars = []; }

      chars.forEach((char, i) => {
        const delay = i * 80;
        const card = createHoloCard(char.href || 'ficha.html', char.name, char.img);
        card.style.animationDelay = delay + 'ms';
        roster.insertBefore(card, newCharGroup);
      });
    }

    loadRoster();

    // ── Demo: cria personagem de exemplo se não houver nenhum ──
    // (Remova este bloco em produção)
    if (!localStorage.getItem('ma:roster')) {
      // Tenta ler do localStorage da ficha atual (caso haja uma aberta antes)
      const name = localStorage.getItem('idfield:name');
      const img  = localStorage.getItem('ma:holoImg');
      if (name || img) {
        const roster = [{ name: name || 'Personagem', img: img || null, href: 'ficha.html' }];
        localStorage.setItem('ma:roster', JSON.stringify(roster));
        location.reload();
      }
    }
  </script>

</body>
</html>
