<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backup · Mundo Aberto</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #04080f;
      color: #cfe9f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .box {
      max-width: 480px;
      width: 100%;
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 6px;
      padding: 32px;
      background: rgba(0,255,231,0.02);
    }
    h1 {
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(0,255,231,0.7);
      margin-bottom: 10px;
    }
    .sub {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(207,233,240,0.35);
      margin-bottom: 28px;
      line-height: 1.8;
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 1px solid rgba(0,255,231,0.35);
      color: rgba(0,255,231,0.7);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn:hover:not(:disabled) {
      background: rgba(0,255,231,0.06);
      color: #00ffe7;
      border-color: #00ffe7;
      box-shadow: 0 0 14px rgba(0,255,231,0.2);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-list {
      border-color: rgba(255,107,26,0.35);
      color: rgba(255,107,26,0.7);
    }
    .btn-list:hover:not(:disabled) {
      background: rgba(255,107,26,0.06);
      color: #ff6b1a;
      border-color: #ff6b1a;
      box-shadow: 0 0 14px rgba(255,107,26,0.2);
    }

    .progress-wrap {
      height: 3px;
      background: rgba(0,255,231,0.08);
      border-radius: 2px;
      overflow: hidden;
      display: none;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: #00ffe7;
      width: 0%;
      transition: width 0.3s;
      box-shadow: 0 0 8px rgba(0,255,231,0.5);
    }

    #status {
      font-size: 10px;
      letter-spacing: 1px;
      color: rgba(207,233,240,0.3);
      min-height: 18px;
      margin-bottom: 20px;
    }
    .ok   { color: rgba(0,255,231,0.7) !important; }
    .err  { color: rgba(255,85,102,0.7) !important; }

    .backups-list {
      display: none;
      margin-top: 20px;
      border-top: 1px solid rgba(0,255,231,0.08);
      padding-top: 16px;
    }
    .backups-title {
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.3);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .backup-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,255,231,0.04);
      font-size: 10px;
    }
    .backup-name { color: rgba(207,233,240,0.5); }
    .backup-dl {
      color: rgba(0,255,231,0.4);
      cursor: pointer;
      letter-spacing: 1px;
      transition: color 0.15s;
      background: none;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 10px;
    }
    .backup-dl:hover { color: #00ffe7; }
    .empty { color: rgba(207,233,240,0.2); font-size: 10px; padding: 12px 0; }
  </style>
</head>
<body>
<div class="box">
  <h1>Backup</h1>
  <p class="sub">
    Exporta todos os dados para um arquivo JSON.<br>
    Guarda com a data no nome — ex: <em>backup-2026-05-28.json</em>
  </p>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div id="status"></div>

  <button class="btn" id="backupBtn">↓ Fazer Backup Agora</button>
  <button class="btn btn-list" id="listBtn">☰ Ver Backups Salvos no Storage</button>

  <div class="backups-list" id="backupsList">
    <div class="backups-title">Backups no Storage (últimos 7)</div>
    <div id="backupsItems"></div>
  </div>
</div>

<script>
  var SB_URL = 'https://mxyqqfsyybluavwlrhsa.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXFxZnN5eWJsdWF2d2xyaHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTM4MzEsImV4cCI6MjA5MzY2OTgzMX0.b0Ij7UGzbMLpqZjLYxoPEu2kGwEW52U_2NSDtpMGUPM';
  var BUCKET = 'backups';

  function sbFetch(path, method, body) {
    return fetch(SB_URL + path, {
      method: method || 'GET',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json'
      },
      body: body ? JSON.stringify(body) : undefined
    }).then(function(r) {
      if (r.status === 204) return null;
      return r.json().catch(function() { return null; });
    });
  }

  function setStatus(msg, cls) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = cls || '';
  }

  function setProgress(pct) {
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function today() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  // Baixa arquivo JSON no browser
  function downloadJSON(data, filename) {
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Sobe backup para o Supabase Storage
  async function uploadToStorage(filename, data) {
    var blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    var res = await fetch(SB_URL + '/storage/v1/object/' + BUCKET + '/' + filename, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'x-upsert': 'true'
      },
      body: blob
    });
    if (!res.ok) throw new Error('Storage upload falhou: ' + res.status);
  }

  document.getElementById('backupBtn').addEventListener('click', async function() {
    var btn = this;
    btn.disabled = true;
    setProgress(0);
    setStatus('Coletando personagens...');

    try {
      var personagens = await sbFetch('/rest/v1/personagens?select=*&order=created_at.asc');
      setProgress(25); setStatus('Coletando tramas...');

      var tramas = await sbFetch('/rest/v1/tramas?select=*&order=created_at.asc');
      setProgress(50); setStatus('Coletando espaços...');

      var spaces = await sbFetch('/rest/v1/spaces?select=*&order=created_at.asc');
      setProgress(65); setStatus('Coletando links de tramas...');

      var trama_links = await sbFetch('/rest/v1/trama_links?select=*');
      setProgress(80); setStatus('Gerando arquivo...');

      var data = {
        exported_at: new Date().toISOString(),
        version: 1,
        tables: {
          personagens:  Array.isArray(personagens)  ? personagens  : [],
          tramas:       Array.isArray(tramas)        ? tramas       : [],
          spaces:       Array.isArray(spaces)        ? spaces       : [],
          trama_links:  Array.isArray(trama_links)   ? trama_links  : []
        },
        stats: {
          personagens: Array.isArray(personagens)  ? personagens.length  : 0,
          tramas:      Array.isArray(tramas)        ? tramas.length       : 0,
          spaces:      Array.isArray(spaces)        ? spaces.length       : 0,
          trama_links: Array.isArray(trama_links)   ? trama_links.length  : 0
        }
      };

      var filename = 'backup-' + today() + '.json';

      // Baixa no browser
      downloadJSON(data, filename);
      setProgress(90);

      // Tenta salvar no Storage também
      setStatus('Salvando no Storage...');
      try {
        await uploadToStorage(filename, data);
        setProgress(100);
        setStatus(
          '✓ ' + filename + ' baixado e salvo no Storage — ' +
          data.stats.personagens + ' personagens, ' +
          data.stats.tramas + ' tramas',
          'ok'
        );
      } catch(storageErr) {
        // Storage pode não ter o bucket ainda — baixou localmente de qualquer forma
        setProgress(100);
        setStatus('✓ ' + filename + ' baixado localmente (Storage: ' + storageErr.message + ')', 'ok');
      }

    } catch(err) {
      setStatus('✗ Erro: ' + err.message, 'err');
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('listBtn').addEventListener('click', async function() {
    var btn = this;
    btn.disabled = true;
    var listEl = document.getElementById('backupsList');
    var itemsEl = document.getElementById('backupsItems');
    listEl.style.display = 'block';
    itemsEl.innerHTML = '<div class="empty">Carregando...</div>';

    try {
      var res = await fetch(SB_URL + '/storage/v1/object/list/' + BUCKET, {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ limit: 20, sortBy: { column: 'name', order: 'desc' } })
      });
      var files = await res.json();

      if (!Array.isArray(files) || !files.length) {
        itemsEl.innerHTML = '<div class="empty">Nenhum backup no Storage ainda.</div>';
        return;
      }

      itemsEl.innerHTML = '';
      files.forEach(function(f) {
        var item = document.createElement('div');
        item.className = 'backup-item';
        var nameEl = document.createElement('span');
        nameEl.className = 'backup-name';
        nameEl.textContent = f.name;
        var dlBtn = document.createElement('button');
        dlBtn.className = 'backup-dl';
        dlBtn.textContent = '↓ Baixar';
        dlBtn.addEventListener('click', function() {
          var url = SB_URL + '/storage/v1/object/public/' + BUCKET + '/' + f.name;
          var a = document.createElement('a');
          a.href = url; a.download = f.name; a.click();
        });
        item.appendChild(nameEl);
        item.appendChild(dlBtn);
        itemsEl.appendChild(item);
      });
    } catch(err) {
      itemsEl.innerHTML = '<div class="empty">Erro ao listar: ' + err.message + '</div>';
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
