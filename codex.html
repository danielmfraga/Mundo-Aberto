<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex · Mundo Aberto</title>

  <!-- Preview de link (Open Graph / Twitter) -->
  <meta property="og:title" content="Mundo Aberto">
  <meta property="og:site_name" content="Mundo Aberto">
  <meta property="og:description" content="Codex — Bestiário de Campo dos Caçadores">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="description" content="Codex — Bestiário de Campo dos Caçadores">

  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --spec:   #7b2fff;
      --spec2:  #b98cff;
      --orange: #ff6b1a;
      --danger: #ff4466;
      --dark:   #040810;
      --line:   rgba(123,47,255,.18);
      --text:   #d8dbe6;
      --muted:  #7d7795;
      --dim:    #4b4760;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--dark); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; cursor: crosshair; }

    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(123,47,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(123,47,255,0.035) 1px, transparent 1px);
      background-size: 44px 44px; animation: gridShift 26s linear infinite;
    }
    @keyframes gridShift { from { background-position: 0 0; } to { background-position: 44px 44px; } }
    body::after { content: ''; position: fixed; inset: 0; z-index: 60; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px); }
    .fog { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 60% 50% at 80% -5%, rgba(123,47,255,.12), transparent 60%), radial-gradient(ellipse 55% 50% at -5% 110%, rgba(0,136,255,.08), transparent 55%); }

    .corner { position: fixed; width: 34px; height: 34px; pointer-events: none; z-index: 2; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--spec); box-shadow: 0 0 10px var(--spec); }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 18px; left: 18px; } .corner-tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .corner-bl { bottom: 18px; left: 18px; transform: scaleY(-1); } .corner-br { bottom: 18px; right: 18px; transform: scale(-1); }

    /* ── topbar fixa (voltar sempre disponível) ── */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 14px 26px; background: rgba(4,6,14,.82); backdrop-filter: blur(9px);
      border-bottom: 1px solid var(--line);
    }
    .back {
      display: inline-flex; align-items: center; gap: 9px;
      font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--spec2); text-decoration: none; cursor: pointer;
      border: 1px solid rgba(123,47,255,.4); border-radius: 3px; padding: 9px 16px;
      background: rgba(123,47,255,.06); transition: .2s; white-space: nowrap;
    }
    .back:hover { color: #fff; border-color: var(--spec); box-shadow: 0 0 16px rgba(123,47,255,.4); background: rgba(123,47,255,.12); }
    .topbar .brand { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: .42em; font-size: 15px; color: #f0ecff; text-shadow: 0 0 18px rgba(123,47,255,.5); padding-left: 12px; }
    .topbar .tag { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }

    .wrap { position: relative; z-index: 1; max-width: 1060px; margin: 0 auto; padding: 0 26px 90px; }

    /* ── hero ── */
    header.hero { padding: 56px 0 26px; }
    .eyebrow { font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: .34em; color: var(--orange); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
    .eyebrow::before { content: ''; width: 34px; height: 1px; background: var(--orange); box-shadow: 0 0 8px var(--orange); }
    h1.codex-title { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(44px, 9vw, 92px); line-height: .92; letter-spacing: .04em; color: #f3f0ff; text-shadow: 0 0 28px rgba(123,47,255,.5), 0 0 70px rgba(123,47,255,.25); }
    .hero .lede { max-width: 620px; color: var(--muted); font-size: 17px; line-height: 1.6; margin-top: 14px; }
    .hr { height: 1px; background: linear-gradient(90deg, var(--spec), transparent); box-shadow: 0 0 10px rgba(123,47,255,.4); margin: 26px 0 0; }

    /* ── galeria de registros ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 18px; margin-top: 34px; }
    .gcard {
      position: relative; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; cursor: pointer;
      background: linear-gradient(180deg, rgba(12,9,22,.6), rgba(6,5,12,.5)); text-decoration: none; color: inherit;
      transition: transform .18s, border-color .18s, box-shadow .18s;
    }
    .gcard:hover { transform: translateY(-4px); border-color: rgba(123,47,255,.5); box-shadow: 0 10px 34px rgba(123,47,255,.18); }
    .gthumb { position: relative; aspect-ratio: 4/5; background: #07060d; overflow: hidden; border-bottom: 1px solid var(--line); }
    .gthumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 50% 26%; filter: saturate(.65) contrast(1.05) brightness(.9); z-index: 2; }
    .gthumb .pf { position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center; color: #5a4d80; background: radial-gradient(circle at 50% 38%, rgba(123,47,255,.10), #06040c 75%); }
    .gthumb .pf svg { opacity: .55; }
    .gthumb .scan { position: absolute; left: 0; right: 0; height: 46px; z-index: 3; pointer-events: none; background: linear-gradient(180deg, transparent, rgba(123,47,255,.16), transparent); animation: portScan 6s ease-in-out infinite; }
    .gthumb .vig { position: absolute; inset: 0; z-index: 4; pointer-events: none; box-shadow: inset 0 0 50px rgba(0,0,0,.8); }
    .gthumb .num { position: absolute; top: 8px; left: 10px; z-index: 5; font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--spec2); opacity: .85; }
    @keyframes portScan { 0% { top: -46px; } 100% { top: 100%; } }
    .gbody { padding: 13px 14px 15px; }
    .gbody .gname { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 15px; color: #efeaff; letter-spacing: .01em; }
    .gbody .gclass { font-family: 'Share Tech Mono', monospace; font-size: 9.5px; letter-spacing: 1.5px; color: var(--orange); text-transform: uppercase; margin-top: 6px; }
    .gbody .gthreat { display: flex; align-items: center; gap: 7px; margin-top: 11px; }
    .gbody .gthreat .tl { font-family: 'Share Tech Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
    .pip { width: 8px; height: 8px; border-radius: 50%; border: 1px solid rgba(255,68,102,.45); }
    .pip.on { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 7px rgba(255,68,102,.8); }

    /* ── detalhe do registro ── */
    .detail-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 28px; }
    .navbtn {
      font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--spec2); background: rgba(123,47,255,.05); border: 1px solid rgba(123,47,255,.3);
      border-radius: 3px; padding: 8px 14px; cursor: pointer; transition: .18s; user-select: none;
    }
    .navbtn:hover { color: #fff; border-color: var(--spec); box-shadow: 0 0 14px rgba(123,47,255,.35); }
    .navbtn[disabled] { opacity: .3; pointer-events: none; }
    .navpos { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); }

    .codex-entry { margin-top: 18px; border: 1px solid var(--line); border-radius: 6px; background: linear-gradient(180deg, rgba(12,9,22,.7), rgba(6,5,12,.55)); overflow: hidden; position: relative; }
    .codex-entry::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--spec), transparent); opacity: .7; }
    .entry-grid { display: grid; grid-template-columns: 320px 1fr; }

    .left { border-right: 1px solid var(--line); }
    .portrait { position: relative; aspect-ratio: 4/5; width: 100%; overflow: hidden; background: #07060d; border-bottom: 1px solid var(--line); }
    .portrait img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: 50% 26%; filter: saturate(.7) contrast(1.05) brightness(.92); z-index: 2; }
    .portrait .pf { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--dim); font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; text-align: center; padding: 20px; background: radial-gradient(circle at 50% 38%, rgba(123,47,255,.08), #06040c 78%); }
    .portrait .pf svg { opacity: .5; } .portrait .pf span { color: var(--spec2); opacity: .7; }
    .portrait .scan { position: absolute; left: 0; right: 0; height: 60px; z-index: 3; pointer-events: none; background: linear-gradient(180deg, transparent, rgba(123,47,255,.14), transparent); animation: portScan 6s ease-in-out infinite; }
    .portrait .vig { position: absolute; inset: 0; z-index: 4; pointer-events: none; box-shadow: inset 0 0 70px rgba(0,0,0,.85); }

    .quick { padding: 18px 20px 22px; }
    .quick .crow { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px dashed rgba(123,47,255,.14); }
    .quick .crow:last-child { border-bottom: none; }
    .quick .k { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .quick .v { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 15px; color: #eee9ff; }
    .threat { display: inline-flex; gap: 4px; }

    .right { padding: 26px 30px 30px; min-width: 0; }
    .name-row { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    h2.cname { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(26px,4vw,40px); color: #f3f0ff; letter-spacing: .02em; text-shadow: 0 0 22px rgba(123,47,255,.4); }
    .alias { font-family: 'Rajdhani', sans-serif; font-style: italic; font-weight: 400; color: var(--spec2); font-size: 17px; }
    .classline { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--orange); text-transform: uppercase; margin-top: 8px; }

    .sec { margin-top: 26px; }
    .sec h3 { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 12.5px; letter-spacing: .22em; text-transform: uppercase; color: var(--spec2); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .sec h3::before { content: ''; width: 16px; height: 1px; background: var(--spec); box-shadow: 0 0 6px var(--spec); }
    .sec p { color: var(--text); line-height: 1.65; font-size: 16px; }
    .sec p.quote { color: #c8c2dd; font-style: italic; border-left: 2px solid rgba(123,47,255,.5); padding-left: 16px; }
    .sec ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .sec ul li { position: relative; padding-left: 20px; line-height: 1.55; color: var(--text); }
    .sec ul li::before { content: '◇'; position: absolute; left: 0; top: 0; color: var(--spec2); font-size: 12px; }

    .attrs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .attr-col h4 { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--orange); text-transform: uppercase; margin-bottom: 10px; }
    .attr-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 5px 0; }
    .attr-row .an { font-size: 14.5px; color: var(--text); }
    .dots { display: inline-flex; gap: 3px; }
    .d { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(123,47,255,.35); background: rgba(123,47,255,.05); }
    .d.f { background: var(--spec2); border-color: var(--spec2); box-shadow: 0 0 7px rgba(123,47,255,.7); }
    .stat-note { margin-top: 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 1px; color: var(--dim); display: flex; align-items: center; gap: 8px; }
    .stat-note .dot2 { width: 7px; height: 7px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 8px var(--orange); }

    footer { margin-top: 56px; text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--dim); }
    [hidden] { display: none !important; }

    @media (max-width: 760px) {
      .entry-grid { grid-template-columns: 1fr; }
      .left { border-right: none; border-bottom: 1px solid var(--line); }
      .portrait { aspect-ratio: 3/2; }
      .attrs { grid-template-columns: 1fr; gap: 22px; }
      .right { padding: 22px 18px 24px; }
      .wrap { padding: 0 16px 70px; }
      .topbar { padding: 12px 16px; }
      .topbar .brand { display: none; }
    }
  </style>
</head>
<body>
  <div class="fog"></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div><div class="corner corner-br"></div>

  <!-- topbar: voltar contextual (sempre visível) -->
  <div class="topbar">
    <a class="back" id="backBtn" href="index.html">◄ Voltar</a>
    <span class="brand">CODEX</span>
    <span class="tag" id="counter"></span>
  </div>

  <div class="wrap">

    <!-- ═══════ GALERIA ═══════ -->
    <section id="gallery">
      <header class="hero">
        <div class="eyebrow">Bestiário de Campo</div>
        <h1 class="codex-title">Codex</h1>
        <p class="lede">Registro de aberrações, espíritos e ameaças catalogadas pelos Caçadores. Cada entrada foi paga com sangue — selecione um registro para examinar.</p>
        <div class="hr"></div>
      </header>
      <div class="grid" id="grid"></div>
    </section>

    <!-- ═══════ DETALHE ═══════ -->
    <section id="detail" hidden>
      <div class="detail-nav">
        <button class="navbtn" id="prevBtn">‹ Anterior</button>
        <span class="navpos" id="navPos"></span>
        <button class="navbtn" id="nextBtn">Próximo ›</button>
      </div>
      <div id="entryHost"></div>
    </section>

    <footer>// CODEX · MUNDO ABERTO //</footer>
  </div>

  <script>
  /* ════════════ DADOS DO CODEX ════════════
     Para adicionar um registro novo, basta acrescentar um objeto aqui. */
  var GHOST_SVG = '<svg width="58" height="74" viewBox="0 0 58 74" fill="none" stroke="currentColor" stroke-width="1.2">'
    + '<path d="M29 6c-10 0-17 8-17 19v40c4-4 7-4 8.5 0 1.5-4 5-4 6 0 1.5-4 5-4 6.5 0 1.5-4 5-4 8.5 0V25C41 14 39 6 29 6Z"/>'
    + '<ellipse cx="22" cy="30" rx="2.6" ry="3.6" fill="currentColor" stroke="none"/>'
    + '<ellipse cx="36" cy="30" rx="2.6" ry="3.6" fill="currentColor" stroke="none"/>'
    + '<ellipse cx="29" cy="44" rx="3.2" ry="5"/></svg>';

  var CODEX = [
    {
      id: 'fantasma-sofredor',
      name: 'Fantasma Sofredor',
      alias: '"A Afogada da Ponte"',
      classe: 'Espírito Atado',
      classline: 'Assombração de Trauma · Atada ao local da morte',
      habitat: 'Ponte / Água',
      atividade: 'Amanhecer / Noite',
      ameaca: 0,
      vit: 0, fdv: 0, dificuldade: '—',
      img: 'assets/codex/fantasma-sofredor.jpg',
      atributos: {
        'Físico':  [['Força',0],['Destreza',0],['Vigor',0]],
        'Social':  [['Presença',0],['Manipulação',0],['Autocontrole',0]],
        'Mental':  [['Inteligência',0],['Raciocínio',0],['Percepção',0]]
      },
      relato: 'Dizem que ela ia fugir naquela noite. Um homem da igreja prometeu voltar — "amanhã, com as minhas coisas" — e o amanhã dela nunca veio. Sob o arco de pedra ele a deixou caída, a testa aberta, o rio batendo na altura do rosto; bastou um passo em falso. Depois veio a chuva e levou o corpo correnteza abaixo: não houve cova, não houve nome, não houve quem rezasse. Sobrou só a dor — e a dor tem boa memória. Quando ele voltou na noite seguinte, já não achou a moça; achou o que ela virou. Desde então ela continua sob a ponte, encharcada, o vestido pálido colado ao corpo e os cabelos escorrendo como algas, guardando o pouco que resta de cada um que passa. A boca aberta num grito que não se ouve… até que se ouve.',
      sinais: [
        "Ao amanhecer, um vulto sem cor surge sob o arco — pele, cabelo e roupa lavados de branco, os olhos fundos e escuros. O primeiro raio de sol o desfaz.",
        "Câmeras e gravações falham perto da ponte: estática, tela preta, o vulto some do quadro.",
        "Queda brusca de temperatura junto à água; o hálito vira fumaça mesmo no calor.",
        "Choro abafado subindo de baixo d'água, sem fonte visível.",
        "Poças se formam onde não há água; pegadas molhadas levam sempre de volta à margem.",
        "Cães rosnam, se eriçam e cavam o barranco sem parar — farejam o que está enterrado ali.",
        "Quem se demora perde um objeto pequeno e pessoal; nunca mais o reencontra.",
        "A assombração não cruza em direção à igreja: o chão sagrado a empurra de volta pra correnteza.",
        "Quem encara o vão da ponte sente o impulso de descer até a água."
      ]
    }
  ];

  /* ════════════ RENDER ════════════ */
  var gallery = document.getElementById('gallery');
  var detail  = document.getElementById('detail');
  var grid    = document.getElementById('grid');
  var host    = document.getElementById('entryHost');
  var backBtn = document.getElementById('backBtn');
  var counter = document.getElementById('counter');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var navPos  = document.getElementById('navPos');

  function esc(s){ return String(s).replace(/[&<>]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]; }); }
  function pad(n){ return (n<10?'0':'') + n; }
  function pips(n){ var h=''; for (var i=0;i<5;i++) h+='<span class="pip'+(i<n?' on':'')+'"></span>'; return h; }
  function dots(n){ var h=''; for (var i=0;i<5;i++) h+='<i class="d'+(i<n?' f':'')+'"></i>'; return h; }

  function thumb(e){
    return '<div class="gthumb">'
      + '<img src="'+e.img+'" alt="'+esc(e.name)+'" onerror="this.remove()">'
      + '<div class="pf">'+GHOST_SVG+'</div>'
      + '<div class="scan"></div><div class="vig"></div>'
      + '<div class="num">Nº '+pad(CODEX.indexOf(e)+1)+'</div></div>';
  }

  function renderGallery(){
    counter.textContent = CODEX.length + (CODEX.length===1?' registro':' registros');
    grid.innerHTML = CODEX.map(function(e){
      return '<a class="gcard" href="#'+e.id+'">'
        + thumb(e)
        + '<div class="gbody">'
          + '<div class="gname">'+esc(e.name)+'</div>'
          + '<div class="gclass">'+esc(e.classe)+'</div>'
          + '<div class="gthreat"><span class="tl">Ameaça</span><span class="threat">'+pips(e.ameaca)+'</span></div>'
        + '</div></a>';
    }).join('');
  }

  function renderDetail(e){
    var attrs = Object.keys(e.atributos).map(function(col){
      var rows = e.atributos[col].map(function(a){
        return '<div class="attr-row"><span class="an">'+esc(a[0])+'</span><span class="dots">'+dots(a[1])+'</span></div>';
      }).join('');
      return '<div class="attr-col"><h4>'+esc(col)+'</h4>'+rows+'</div>';
    }).join('');

    var sinais = e.sinais.map(function(s){ return '<li>'+esc(s)+'</li>'; }).join('');

    host.innerHTML =
      '<article class="codex-entry"><div class="entry-grid">'
      + '<div class="left">'
        + '<div class="portrait">'
          + '<img src="'+e.img+'" alt="'+esc(e.name)+'" onerror="this.remove()">'
          + '<div class="pf">'+GHOST_SVG+'[ RETRATO NÃO ARQUIVADO ]<span>'+e.img+'</span></div>'
          + '<div class="scan"></div><div class="vig"></div>'
        + '</div>'
        + '<div class="quick">'
          + '<div class="crow"><span class="k">Registro</span><span class="v">Nº '+pad(CODEX.indexOf(e)+1)+'</span></div>'
          + '<div class="crow"><span class="k">Classe</span><span class="v">'+esc(e.classe)+'</span></div>'
          + '<div class="crow"><span class="k">Habitat</span><span class="v">'+esc(e.habitat)+'</span></div>'
          + '<div class="crow"><span class="k">Atividade</span><span class="v">'+esc(e.atividade)+'</span></div>'
          + '<div class="crow"><span class="k">Ameaça</span><span class="threat">'+pips(e.ameaca)+'</span></div>'
          + '<div class="crow"><span class="k">Vitalidade</span><span class="v">'+e.vit+'</span></div>'
          + '<div class="crow"><span class="k">Força de Vontade</span><span class="v">'+e.fdv+'</span></div>'
          + '<div class="crow"><span class="k">Dificuldade</span><span class="v">'+esc(e.dificuldade)+'</span></div>'
        + '</div>'
      + '</div>'
      + '<div class="right">'
        + '<div class="name-row"><h2 class="cname">'+esc(e.name)+'</h2><span class="alias">'+esc(e.alias)+'</span></div>'
        + '<div class="classline">'+esc(e.classline)+'</div>'
        + '<div class="sec"><h3>Relato</h3><p class="quote">'+esc(e.relato)+'</p></div>'
        + '<div class="sec"><h3>Sinais de Manifestação</h3><ul>'+sinais+'</ul></div>'
        + '<div class="sec"><h3>Atributos</h3><div class="attrs">'+attrs+'</div>'
          + '<div class="stat-note"><span class="dot2"></span> Estatísticas zeradas — a definir.</div></div>'
      + '</div>'
      + '</div></article>';

    var i = CODEX.indexOf(e);
    navPos.textContent = pad(i+1) + ' / ' + pad(CODEX.length);
    prevBtn.disabled = (i <= 0);
    nextBtn.disabled = (i >= CODEX.length - 1);
    prevBtn.onclick = function(){ if (i>0) location.hash = CODEX[i-1].id; };
    nextBtn.onclick = function(){ if (i<CODEX.length-1) location.hash = CODEX[i+1].id; };
  }

  function findEntry(id){ for (var i=0;i<CODEX.length;i++) if (CODEX[i].id===id) return CODEX[i]; return null; }

  function route(){
    var id = (location.hash || '').replace('#','');
    var e = id ? findEntry(id) : null;
    if (e){
      gallery.hidden = true; detail.hidden = false;
      renderDetail(e);
      backBtn.textContent = '◄ Codex';
      backBtn.setAttribute('href','#');
      window.scrollTo(0,0);
    } else {
      detail.hidden = true; gallery.hidden = false;
      renderGallery();
      backBtn.textContent = '◄ Voltar';
      backBtn.setAttribute('href','index.html');
    }
  }

  // botão voltar contextual: no detalhe volta pra galeria; na galeria vai pra home
  backBtn.addEventListener('click', function(ev){
    if (!detail.hidden){ ev.preventDefault(); location.hash = ''; }
  });

  window.addEventListener('hashchange', route);
  renderGallery();
  route();
  </script>
</body>
</html>
