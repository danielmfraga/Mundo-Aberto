    body::after { content: ''; position: fixed; inset: 0; z-index: 60; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px); }
    .fog { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 60% 50% at 80% -5%, rgba(123,47,255,.12), transparent 60%), radial-gradient(ellipse 55% 50% at -5% 110%, rgba(0,136,255,.08), transparent 55%); }

    .corner { position: fixed; width: 34px; height: 34px; pointer-events: none; z-index: 2; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--spec); box-shadow: 0 0 10px var(--spec); }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 18px; left: 18px; } .corner-tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .corner-bl { bottom: 18px; left: 18px; transform: scaleY(-1); } .corner-br { bottom: 18px; right: 18px; transform: scale(-1); }

      atividade: 'Amanhecer / Noite',
      ameaca: 0, vit: 0, fdv: 0, dificuldade: '—',
      atributos: defaultAttrs(),
      relato: 'Dizem que ela ia fugir naquela noite. Um homem da igreja prometeu voltar — "amanhã, com as minhas coisas" — e o amanhã dela nunca veio. Sob o arco de pedra ele a deixou caída, a testa aberta, o rio batendo na altura do rosto; bastou um passo em falso. Depois veio a chuva e levou o corpo correnteza abaixo: não houve cova, não houve nome, não houve quem rezasse. Sobrou só a dor — e a dor tem boa memória. Quando ele voltou na noite seguinte, já não achou a moça; achou o que ela virou. Desde então ela continua sob a ponte, encharcada, o vestido pálido colado ao corpo e os cabelos escorrendo como algas, guardando o pouco que resta de cada um que passa. A boca aberta num grito que não se ouve… até que se ouve.',
      sinais: [
        "Ao amanhecer, um vulto sem cor surge sob o arco — pele, cabelo e roupa lavados de branco, os olhos fundos e escuros. O primeiro raio de sol o desfaz.",
        "Câmeras e gravações falham perto da ponte: estática, tela preta, o vulto some do quadro.",
        "Queda brusca de temperatura junto à água; o hálito vira fumaça mesmo no calor.",
        "Choro abafado subindo de baixo d'água, sem fonte visível.",
        "Poças se formam onde não há água; pegadas molhadas levam sempre de volta à margem.",
        "Cães rosnam, se eriçam e cavam o barranco sem parar — farejam o que está enterrado ali.",
        "Quem se demora perde um objeto pequeno e pessoal; nunca mais o reencontra.",
        "A assombração não cruza em direção à igreja: o chão sagrado a empurra de volta pra correnteza.",
        "Quem encara o vão da ponte sente o impulso de descer até a água."
      ]
    }
  };

  /* ════════════ ESTADO ════════════ */
  var CODEX = [];
  var editing = false;
  var draft = null;
  var pendingEdit = null;

  var gallery = document.getElementById('gallery');
  var detail  = document.getElementById('detail');
  var grid    = document.getElementById('grid');
  var host    = document.getElementById('entryHost');
  var backBtn = document.getElementById('backBtn');
  var counter = document.getElementById('counter');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var editBtn = document.getElementById('editBtn');
  var navPos  = document.getElementById('navPos');
  var detailNav = document.querySelector('.detail-nav');
  var photoInput = document.getElementById('photoInput');

  function rowToEntry(r){
    var d = r.data || {};
    return {
      id: r.id, name: r.name || '(sem nome)', img: r.img_url || '', img_url: r.img_url || '', ordem: r.ordem || 0,
      alias: d.alias || '', classe: d.classe || '', classline: d.classline || '',
      habitat: d.habitat || '—', atividade: d.atividade || '—',
      ameaca: d.ameaca || 0, vit: d.vit || 0, fdv: d.fdv || 0, dificuldade: d.dificuldade || '—',
      relato: d.relato || '', sinais: Array.isArray(d.sinais) ? d.sinais : [],
      atributos: d.atributos || defaultAttrs()
    };
  }

  /* ════════════ GALERIA ════════════ */
  function thumb(e){
    return '<div class="gthumb">'
      + (e.img ? '<img src="'+esc(e.img)+'" alt="'+esc(e.name)+'" onerror="this.remove()">' : '')
      + '<div class="pf">'+GHOST_SVG+'</div>'
      + '<div class="scan"></div><div class="vig"></div>'
      + '<div class="num">Nº '+pad(idx(e)+1)+'</div></div>';
  }

  function renderGallery(){
    counter.textContent = CODEX.length + (CODEX.length === 1 ? ' registro' : ' registros');
    var cards = CODEX.map(function(e){
      return '<a class="gcard" href="#'+e.id+'">'
        + thumb(e)
        + '<div class="gbody">'
          + '<div class="gname">'+esc(e.name)+'</div>'
          + '<div class="gclass">'+esc(e.classe)+'</div>'
          + '<div class="gthreat"><span class="tl">Ameaça</span><span class="threat">'+pips(e.ameaca)+'</span></div>'
        + '</div></a>';
    }).join('');
    var nova = '<button class="gcard new" id="novaBtn"><span class="plus"><b>+</b><span>Nova Besta</span></span></button>';
    grid.innerHTML = cards + nova;
    var nb = document.getElementById('novaBtn');
    if (nb) nb.onclick = createAndEdit;
  }

  /* ════════════ DETALHE — VISUALIZAÇÃO ════════════ */
  function renderView(e){
    var attrs = Object.keys(e.atributos).map(function(col){
      var rows = e.atributos[col].map(function(a){
        return '<div class="attr-row"><span class="an">'+esc(a.n)+'</span><span class="dots">'+dots(a.v)+'</span></div>';
      }).join('');
      return '<div class="attr-col"><h4>'+esc(col)+'</h4>'+rows+'</div>';
    }).join('');
    var sinais = e.sinais.length
      ? '<div class="sec"><h3>Sinais de Manifestação</h3><ul>'+e.sinais.map(function(s){ return '<li>'+esc(s)+'</li>'; }).join('')+'</ul></div>'
      : '';
    var relato = e.relato ? '<div class="sec"><h3>Relato</h3><p class="quote">'+esc(e.relato)+'</p></div>' : '';

    host.innerHTML =
      '<article class="codex-entry"><div class="entry-grid">'
      + '<div class="left">'
        + '<div class="portrait">'
          + (e.img ? '<img src="'+esc(e.img)+'" alt="'+esc(e.name)+'" onerror="this.remove()">' : '')
          + '<div class="pf">'+GHOST_SVG+'[ RETRATO NÃO ARQUIVADO ]<span>edite para enviar</span></div>'
          + '<div class="scan"></div><div class="vig"></div>'
        + '</div>'
        + '<div class="quick">'
          + '<div class="crow"><span class="k">Registro</span><span class="v">Nº '+pad(idx(e)+1)+'</span></div>'
          + '<div class="crow"><span class="k">Classe</span><span class="v">'+esc(e.classe || '—')+'</span></div>'
          + '<div class="crow"><span class="k">Habitat</span><span class="v">'+esc(e.habitat)+'</span></div>'
          + '<div class="crow"><span class="k">Atividade</span><span class="v">'+esc(e.atividade)+'</span></div>'
          + '<div class="crow"><span class="k">Ameaça</span><span class="threat">'+pips(e.ameaca)+'</span></div>'
          + '<div class="crow"><span class="k">Vitalidade</span><span class="v">'+e.vit+'</span></div>'
          + '<div class="crow"><span class="k">Força de Vontade</span><span class="v">'+e.fdv+'</span></div>'
          + '<div class="crow"><span class="k">Dificuldade</span><span class="v">'+esc(e.dificuldade)+'</span></div>'
        + '</div>'
      + '</div>'
      + '<div class="right">'
        + '<div class="name-row"><h2 class="cname">'+esc(e.name)+'</h2>'+(e.alias?'<span class="alias">'+esc(e.alias)+'</span>':'')+'</div>'
        + (e.classline ? '<div class="classline">'+esc(e.classline)+'</div>' : '')
        + relato
        + sinais
        + '<div class="sec"><h3>Atributos</h3><div class="attrs">'+attrs+'</div></div>'
      + '</div>'
      + '</div></article>';
  }

  /* ════════════ DETALHE — EDIÇÃO ════════════ */
  function renderEdit(e){
    draft = JSON.parse(JSON.stringify(e));
    if (!draft.atributos || !Object.keys(draft.atributos).length) draft.atributos = defaultAttrs();

    var attrs = Object.keys(draft.atributos).map(function(col){
      var rows = draft.atributos[col].map(function(a, i){
        return '<div class="attr-row"><span class="an">'+esc(a.n)+'</span><span class="dots" data-col="'+esc(col)+'" data-ai="'+i+'">'+dots(a.v)+'</span></div>';
      }).join('');
      return '<div class="attr-col"><h4>'+esc(col)+'</h4>'+rows+'</div>';
    }).join('');

    host.innerHTML =
      '<article class="codex-entry edit"><div class="entry-grid">'
      + '<div class="left">'
        + '<div class="portrait">'
          + '<img id="editImg" src="'+esc(draft.img || '')+'" alt="" '+(draft.img?'':'style="display:none"')+' onerror="this.style.display=\'none\'">'
          + '<div class="pf">'+GHOST_SVG+'[ RETRATO ]<span>JPEG/PNG · reduzido p/ 480px</span></div>'
          + '<div class="scan"></div><div class="vig"></div>'
          + '<button class="navbtn photo-btn" id="photoBtn">⬆ Enviar foto</button>'
        + '</div>'
        + '<div class="quick">'
          + crowInput('Classe', 'classe')
          + crowInput('Habitat', 'habitat')
          + crowInput('Atividade', 'atividade')
          + '<div class="crow"><span class="k">Ameaça</span><span class="threat" id="ameacaEdit">'+pips(draft.ameaca)+'</span></div>'
          + crowNum('Vitalidade', 'vit')
          + crowNum('Força de Vontade', 'fdv')
          + crowInput('Dificuldade', 'dificuldade')
        + '</div>'
      + '</div>'
      + '<div class="right">'
        + '<div class="fbox"><span class="flabel">Nome</span><input class="fld fld-name" data-f="name" value="'+esc(draft.name)+'"></div>'
        + '<div class="fbox"><span class="flabel">Epíteto / Alcunha</span><input class="fld" data-f="alias" value="'+esc(draft.alias)+'" placeholder="ex: &quot;A Afogada da Ponte&quot;"></div>'
        + '<div class="fbox"><span class="flabel">Linha de classificação</span><input class="fld" data-f="classline" value="'+esc(draft.classline)+'" placeholder="ex: Assombração de Trauma · Atada ao local da morte"></div>'
        + '<div class="sec"><h3>Relato</h3><textarea class="fld" data-f="relato" placeholder="A história da criatura…">'+esc(draft.relato)+'</textarea></div>'
        + '<div class="sec"><h3>Sinais de Manifestação</h3><div id="sinaisEdit"></div></div>'
        + '<div class="sec"><h3>Atributos</h3><div class="attrs">'+attrs+'</div></div>'
        + '<div class="edit-actions">'
          + '<button class="btn btn-save" id="saveBtn">Salvar</button>'
          + '<button class="btn btn-ghost" id="cancelBtn">Cancelar</button>'
          + '<button class="btn btn-danger" id="delBtn">Excluir</button>'
        + '</div>'
      + '</div>'
      + '</div></article>';

    wireEdit();
    renderSinaisEdit();
  }

  function crowInput(label, field){
    return '<div class="crow"><span class="k">'+label+'</span><input class="fld fld-sm" data-f="'+field+'" value="'+esc(draft[field]||'')+'"></div>';
  }
  function crowNum(label, field){
    return '<div class="crow"><span class="k">'+label+'</span><input class="fld fld-sm" type="number" min="0" max="20" data-f="'+field+'" value="'+(draft[field]||0)+'"></div>';
  }

  function renderSinaisEdit(){
    var c = document.getElementById('sinaisEdit');
    if (!c) return;
    c.innerHTML = draft.sinais.map(function(s, i){
      return '<div class="sinal-edit"><textarea class="fld" data-si="'+i+'">'+esc(s)+'</textarea><button class="sinal-del" data-si="'+i+'" title="Remover">✕</button></div>';
    }).join('') + '<button class="addbtn" id="addSinal">+ adicionar sinal</button>';
    c.querySelectorAll('textarea[data-si]').forEach(function(t){
      t.oninput = function(){ draft.sinais[+t.getAttribute('data-si')] = t.value; };
    });
    c.querySelectorAll('.sinal-del').forEach(function(b){
      b.onclick = function(){ draft.sinais.splice(+b.getAttribute('data-si'), 1); renderSinaisEdit(); };
    });
    var add = document.getElementById('addSinal');
    if (add) add.onclick = function(){ draft.sinais.push(''); renderSinaisEdit(); var ts = c.querySelectorAll('textarea'); if (ts.length) ts[ts.length-1].focus(); };
  }

  function wireEdit(){
    // campos de texto/número
    host.querySelectorAll('[data-f]').forEach(function(el){
      el.oninput = function(){
        var f = el.getAttribute('data-f');
        draft[f] = (el.type === 'number') ? (parseInt(el.value, 10) || 0) : el.value;
      };
    });
    // ameaça (pips clicáveis)
    var amEl = document.getElementById('ameacaEdit');
    if (amEl){
      var ps = amEl.querySelectorAll('.pip');
      ps.forEach(function(p, k){
        p.onclick = function(){
          var nv = (k+1 === draft.ameaca) ? k : k+1;
          draft.ameaca = nv;
          ps.forEach(function(x, j){ x.classList.toggle('on', j < nv); });
        };
      });
    }
    // atributos (dots clicáveis)
    host.querySelectorAll('.dots[data-col]').forEach(function(grp){
      var col = grp.getAttribute('data-col'), ai = +grp.getAttribute('data-ai');
      var ds = grp.querySelectorAll('.d');
      ds.forEach(function(dd, k){
        dd.onclick = function(){
          var cur = draft.atributos[col][ai].v;
          var nv = (k+1 === cur) ? k : k+1;
          draft.atributos[col][ai].v = nv;
          ds.forEach(function(x, j){ x.classList.toggle('f', j < nv); });
        };
      });
    });
    // foto
    var pBtn = document.getElementById('photoBtn');
    if (pBtn) pBtn.onclick = function(){ photoInput.click(); };
    // ações
    document.getElementById('saveBtn').onclick = doSave;
    document.getElementById('cancelBtn').onclick = function(){ editing = false; route(); };
    document.getElementById('delBtn').onclick = doDelete;
  }

  /* ════════════ FOTO (compressão 480px / JPEG 0.78 — regra padrão do projeto) ════════════ */
  photoInput.addEventListener('change', function(ev){
    var file = ev.target.files[0];
    photoInput.value = '';
    if (!file || !draft) return;
    var MAX_PX = 480, QUALITY = 0.78;
    var reader = new FileReader();
    reader.onload = function(r){
      var im = new Image();
      im.onload = function(){
        var s = Math.min(1, MAX_PX / Math.max(im.width, im.height));
        var w = Math.round(im.width * s), h = Math.round(im.height * s);
        var c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(im, 0, 0, w, h);
        var b64 = c.toDataURL('image/jpeg', QUALITY); c.width = 0; c.height = 0;
        // preview imediato
        var imgEl = document.getElementById('editImg');
        if (imgEl){ imgEl.src = b64; imgEl.style.display = 'block'; }
        // upload pro storage
        uploadBestaImg(draft.id, b64).then(function(url){ draft.img_url = url; draft.img = url; })
          .catch(function(err){ console.error('[codex] upload foto:', err); alert('Falha ao enviar a foto:\n\n' + (err && err.message ? err.message : err)); });
      };
      im.src = r.target.result;
    };
    reader.readAsDataURL(file);
  });

  function uploadBestaImg(id, b64){
    var m = b64.match(/data:([^;]+);base64,(.+)/);
    if (!m) return Promise.reject();
    var mime = m[1], bin = atob(m[2]), arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    var path = 'codex/' + id + '.jpg';
    return fetch(SB_URL + '/storage/v1/object/personagens/' + path, {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': mime, 'x-upsert': 'true' },
      body: new Blob([arr], { type: mime })
    }).then(function(r){
      if (!r.ok) return r.text().then(function(t){ throw new Error('HTTP ' + r.status + ' — ' + (t || 'sem corpo')); });
      return SB_URL + '/storage/v1/object/public/personagens/' + path + '?t=' + Date.now();
    });
  }

  /* ════════════ CRUD ════════════ */
  function createAndEdit(){
    var id = 'besta_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    var ordem = CODEX.length ? Math.max.apply(null, CODEX.map(function(c){ return c.ordem || 0; })) + 1 : 1;
    var row = { id: id, name: 'Nova Besta', img_url: null, ordem: ordem, data: {
      alias: '', classe: '', classline: '', habitat: '', atividade: '', ameaca: 0, vit: 0, fdv: 0,
      dificuldade: '—', relato: '', sinais: [], atributos: defaultAttrs()
    }};
    sbSend('/rest/v1/bestas', 'POST', row)
      .then(function(){ pendingEdit = id; return loadAndRender(); })
      .then(function(){ location.hash = id; })
      .catch(function(err){ alert('Erro ao criar besta: ' + err.message); });
  }

  function doSave(){
    if (!draft) return;
    if (!draft.name || !draft.name.trim()) draft.name = '(sem nome)';
    var saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true; saveBtn.textContent = 'Salvando…';
    var dataObj = {
      alias: draft.alias, classe: draft.classe, classline: draft.classline,
      habitat: draft.habitat, atividade: draft.atividade,
      ameaca: draft.ameaca, vit: draft.vit, fdv: draft.fdv, dificuldade: draft.dificuldade,
      relato: draft.relato, sinais: draft.sinais, atributos: draft.atributos
    };
    var savedId = draft.id;
    sbSend('/rest/v1/bestas?id=eq.' + encodeURIComponent(draft.id), 'PATCH', { name: draft.name, img_url: draft.img_url || null, data: dataObj })
      .then(function(){ editing = false; return loadAndRender(); })
      .then(function(){ if (location.hash !== '#' + savedId) location.hash = savedId; else route(); })
      .catch(function(err){
        alert('Erro ao salvar: ' + err.message);
        if (saveBtn){ saveBtn.disabled = false; saveBtn.textContent = 'Salvar'; }
      });
  }

  function doDelete(){
    if (!draft) return;
    if (!confirm('Excluir "' + draft.name + '" do Codex?\n(soft delete — pode ser recuperado depois no banco)')) return;
    sbSend('/rest/v1/bestas?id=eq.' + encodeURIComponent(draft.id), 'PATCH', { deleted_at: new Date().toISOString() })
      .then(function(){ editing = false; pendingEdit = null; location.hash = ''; return loadAndRender(); })
      .catch(function(err){ alert('Erro ao excluir: ' + err.message); });
  }

  /* ════════════ ROTEAMENTO ════════════ */
  function renderDetail(e){
    var i = idx(e);
    if (editing){
      detailNav.style.display = 'none';
      renderEdit(e);
    } else {
      detailNav.style.display = 'flex';
      renderView(e);
      navPos.textContent = pad(i+1) + ' / ' + pad(CODEX.length);
      prevBtn.disabled = (i <= 0);
      nextBtn.disabled = (i >= CODEX.length - 1);
      prevBtn.onclick = function(){ if (i > 0) location.hash = CODEX[i-1].id; };
      nextBtn.onclick = function(){ if (i < CODEX.length - 1) location.hash = CODEX[i+1].id; };
      editBtn.onclick = function(){ editing = true; renderDetail(e); };
    }
  }

  function route(){
    var id = (location.hash || '').replace('#','');
    var e = id ? findEntry(id) : null;
    if (e){
      if (pendingEdit === e.id){ editing = true; pendingEdit = null; }
      gallery.hidden = true; detail.hidden = false;
      renderDetail(e);
      backBtn.textContent = '◄ Codex';
      backBtn.setAttribute('href', '#');
      window.scrollTo(0, 0);
    } else {
      editing = false;
      detail.hidden = true; gallery.hidden = false;
      renderGallery();
      backBtn.textContent = '◄ Voltar';
      backBtn.setAttribute('href', 'index.html');
    }
  }

  // voltar contextual: no detalhe volta pra galeria (confirma se estiver editando)
  backBtn.addEventListener('click', function(ev){
    if (!detail.hidden){
      ev.preventDefault();
      if (editing && !confirm('Sair da edição? Alterações não salvas serão perdidas.')) return;
      editing = false;
      location.hash = '';
    }
  });

  window.addEventListener('hashchange', route);

  /* ════════════ INIT ════════════ */
  function loadAndRender(){
    return sbGet('/rest/v1/bestas?select=*&deleted_at=is.null&order=ordem.asc,created_at.asc')
      .then(function(rows){ CODEX = (Array.isArray(rows) ? rows : []).map(rowToEntry); route(); });
  }

  function ensureSeed(){
    return sbGet('/rest/v1/bestas?id=eq.fantasma-sofredor&select=id')
      .then(function(rows){
        if (Array.isArray(rows) && rows.length === 0) return sbSend('/rest/v1/bestas', 'POST', FANTASMA_SEED).catch(function(){});
      }).catch(function(){});
  }

  ensureSeed().then(loadAndRender).catch(function(){ grid.innerHTML = '<div class="loading">Erro ao carregar o Codex.</div>'; });
  </script>
</body>
</html>
