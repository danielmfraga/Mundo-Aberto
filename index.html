<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --holo3:  #7b2fff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .corner {
      position: fixed;
      width: 36px; height: 36px;
      pointer-events: none;
      z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--orange);
      box-shadow: var(--glow-o);
    }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      animation: containerFadeIn 1.2s ease forwards;
    }
    @keyframes containerFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(38px, 7vw, 84px);
      font-weight: 900;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: var(--holo);
      text-shadow: 0 0 20px #00ffe7bb, 0 0 60px #00ffe755, 0 0 120px #00ffe722;
      animation: titleFlicker 9s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes titleFlicker {
      0%,93%,97%,100% { opacity: 1; }
      95% { opacity: 0.82; }
    }

    .title-line {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      box-shadow: var(--glow-o);
      margin-top: -44px;
    }

    .buttons {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ── Sparkle panel button (vertical) ── */
    .holo-btn {
      position: relative;
      width: 240px;
      height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* padding-bottom empurra o ícone levemente pra cima do centro geométrico,
         alinhando com o centro visual do sparkle (que curva mais em cima e em baixo) */
      padding-bottom: 28px;
      cursor: pointer;
      text-decoration: none;

      /* Forma sparkle: 4 lados côncavos, proporcional ao tamanho */
      clip-path: url(#sparkleClip);

      /* Animação cinematográfica de abertura */
      transform-origin: center center;
      animation: sparkleOpen 2.5s cubic-bezier(0.45, 0, 0.15, 1) forwards;
    }

    /* Centro horizontal de cada slot, pra calcular o translate inicial:
       layout: 240w×4 + 40gap×3 = 1080px total
       centros: 120 / 400 / 680 / 960  →  convergem no meio (540): +420 / +140 / -140 / -420 */
    .btn-group:nth-child(1) .holo-btn { --tx-start: 420px; }
    .btn-group:nth-child(2) .holo-btn { --tx-start: 140px; }
    .btn-group:nth-child(3) .holo-btn { --tx-start: -140px; }
    .btn-group:nth-child(4) .holo-btn { --tx-start: -420px; }

    @keyframes sparkleOpen {
      /* Fase 0 (0-3%): invisível */
      0% {
        transform: translateX(var(--tx-start)) scale(0, 0);
        opacity: 0;
      }
      /* Fase 1 (3%): ponto pequeno aparece no centro */
      3% {
        transform: translateX(var(--tx-start)) scale(0.025, 0.025);
        opacity: 1;
      }
      /* Fase 2 (3-14%): ponto se estica HORIZONTAL virando linha fina (efeito scanner/slit) */
      14% {
        transform: translateX(var(--tx-start)) scale(0.32, 0.008);
        opacity: 1;
      }
      /* Fase 3 (14-22%): segura a linha um instante (cria suspense) */
      22% {
        transform: translateX(var(--tx-start)) scale(0.32, 0.008);
        opacity: 1;
      }
      /* Fase 4 (22-34%): linha ABRE verticalmente — revela o sparkle pequeno */
      34% {
        transform: translateX(var(--tx-start)) scale(0.30, 0.20);
        opacity: 1;
      }
      /* Fase 5 (34-44%): segura o sparkle pequeno */
      44% {
        transform: translateX(var(--tx-start)) scale(0.30, 0.20);
        opacity: 1;
      }
      /* Fase 6 (44-60%): sparkles viajam pras suas posições — fanout horizontal */
      60% {
        transform: translateX(0) scale(0.30, 0.20);
        opacity: 1;
      }
      /* Fase 7 (60-100%): esticam verticalmente até o tamanho final */
      100% {
        transform: translateX(0) scale(1, 1);
        opacity: 1;
      }
    }

    .holo-btn-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,255,231,0.32);
      background: rgba(0,255,231,0.05);
      transition: background 0.3s, border-color 0.3s;
    }
    .holo-btn:hover .holo-btn-panel {
      background: rgba(0,255,231,0.10);
      border-color: rgba(0,255,231,0.6);
    }

    /* Conteúdo interno só aparece quando os painéis terminam de abrir */
    .holo-btn > *:not(.holo-btn-panel) {
      opacity: 0;
      animation: panelContentFadeIn 0.5s 2.05s ease forwards;
    }
    @keyframes panelContentFadeIn {
      to { opacity: 1; }
    }

    .device-led-wrap {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 5;
    }

    .device-led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      animation: ledBlink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .device-led-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.55);
      text-transform: uppercase;
      user-select: none;
    }
    @keyframes ledBlink {
      0%,100% { opacity: 1;   box-shadow: 0 0 8px var(--holo), 0 0 16px var(--holo); }
      50%      { opacity: 0.3; box-shadow: 0 0 4px var(--holo); }
    }

    .holo-projection {
      position: relative;
      width: 170px; height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .holo-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.3);
      animation: ringRotate linear infinite;
    }
    .ring1 { width: 88%; height: 88%; animation-duration: 12s; border-color: rgba(0,255,231,0.2); }
    .ring2 { width: 96%; height: 50%; border-color: rgba(0,136,255,0.35); animation-duration: 8s; animation-direction: reverse; }
    .ring3 { width: 70%; height: 70%; border-style: dashed; border-color: rgba(123,47,255,0.35); animation-duration: 20s; }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .ring2 { animation-name: ringRotate2; }
    @keyframes ringRotate2 {
      from { transform: rotateX(75deg) rotate(0deg); }
      to   { transform: rotateX(75deg) rotate(360deg); }
    }

    .holo-core {
      position: relative;
      z-index: 2;
      width: 116px; height: 116px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,231,0.08);
      background: rgba(0,255,231,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .holo-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    @keyframes scanMove {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }
    .holo-btn:hover .holo-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }

    .holo-icon {
      font-size: 26px;
      opacity: 0.45;
      animation: iconPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes iconPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .holo-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: rgba(0,255,231,0.55);
      text-align: center;
      line-height: 1.5;
      letter-spacing: 1px;
      position: relative; z-index: 1;
    }

    .holo-beam {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 52px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 8px var(--holo);
      animation: beamPulse 3s ease-in-out infinite;
    }
    @keyframes beamPulse {
      0%,100% { opacity: 0.8; height: 52px; }
      50%      { opacity: 0.3; height: 40px; }
    }

    .data-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Label dentro do painel (no rodapé do sparkle) */
    .btn-name {
      position: absolute;
      bottom: 54px;
      left: 0; right: 0;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 5px;
      color: rgba(0,255,231,0.55);
      text-transform: uppercase;
      transition: color 0.3s, text-shadow 0.3s;
      pointer-events: none;
      z-index: 6;
    }
    .holo-btn:hover .btn-name {
      color: var(--holo);
      text-shadow: 0 0 12px #00ffe7cc;
    }

    /* ── Codex card — tom espectral roxo ── */
    #codexGroup .holo-btn-panel { border-color: rgba(123,47,255,0.32); background: rgba(123,47,255,0.05); }
    #codexGroup .holo-btn:hover .holo-btn-panel { border-color: rgba(123,47,255,0.6); background: rgba(123,47,255,0.10); }
    #codexGroup .holo-ring { border-color: rgba(123,47,255,0.25) !important; }
    #codexGroup .holo-core {
      border-color: rgba(123,47,255,0.45);
      box-shadow: 0 0 10px #7b2fffaa, 0 0 30px #7b2fff44, inset 0 0 30px rgba(123,47,255,0.1);
    }
    #codexGroup .holo-btn:hover .holo-core {
      box-shadow: 0 0 20px #7b2fffcc, 0 0 60px #7b2fff66, inset 0 0 30px rgba(123,47,255,0.2);
      border-color: rgba(123,47,255,0.75);
    }
    #codexGroup .holo-icon { color: #b98cff; }
    #codexGroup .holo-beam { background: linear-gradient(to top, #7b2fff, transparent); box-shadow: 0 0 8px #7b2fff; }
    #codexGroup .device-led { background: #b98cff; box-shadow: 0 0 6px #b98cff; }
    #codexGroup .device-led-label, #codexGroup .btn-name { color: rgba(185,140,255,0.6); }
    #codexGroup .holo-btn:hover .btn-name { color: #b98cff; text-shadow: 0 0 12px #7b2fffcc; }
    #codexGroup .btn-name { letter-spacing: 3px; }

    /* retrato espectral projetado dentro do núcleo */
    #codexGroup .holo-core::before {
      content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(circle at 50% 38%, transparent 42%, rgba(123,47,255,0.30));
    }
    #codexGroup .holo-core::after { z-index: 3; }  /* scanline por cima do retrato */
    #codexGroup .ghost-portrait {
      position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;
      object-fit: cover; object-position: 50% 26%;
      filter: saturate(0.65) contrast(1.06) brightness(0.9);
    }
    #codexGroup .ghost-fallback {
      position: absolute; inset: 0; z-index: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, rgba(123,47,255,0.10), #06040c 75%);
      color: #6a5b9a;
    }
    #codexGroup .ghost-fallback svg { opacity: 0.55; }

    /* ── Globe button ── */
    .globe-projection {
      position: relative;
      width: 170px; height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .globe-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.22);
    }
    .gring1 { width: 86%; height: 86%; border-color: rgba(0,255,231,0.18); animation: gringMerid  18s linear infinite; }
    .gring2 { width: 86%; height: 86%; border-color: rgba(0,136,255,0.28); animation: gringTilt   13s linear infinite reverse; }
    .gring3 { width: 86%; height: 86%; border-color: rgba(123,47,255,0.22); border-style: dashed; animation: gringMerid2 25s linear infinite; }
    .gring4 { width: 86%; height: 43%; border-color: rgba(0,255,231,0.15); animation: gringEq     20s linear infinite; }

    @keyframes gringMerid  { from { transform: rotateY(0deg); }              to { transform: rotateY(360deg); } }
    @keyframes gringMerid2 { from { transform: rotateX(30deg) rotateY(0deg); } to { transform: rotateX(30deg) rotateY(360deg); } }
    @keyframes gringTilt   { from { transform: rotateX(60deg) rotateY(0deg); } to { transform: rotateX(60deg) rotateY(360deg); } }
    @keyframes gringEq     { from { transform: rotateX(80deg) rotateZ(0deg); } to { transform: rotateX(80deg) rotateZ(360deg); } }

    .globe-core {
      position: relative;
      z-index: 2;
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 20px rgba(0,255,231,0.06);
      background: rgba(0,255,231,0.02);
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .globe-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    .holo-btn:hover .globe-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }

    .globe-dot {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo), 0 0 12px var(--holo);
      z-index: 3;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1;   box-shadow: 0 0 6px var(--holo), 0 0 12px var(--holo); }
      50%      { opacity: 0.3; box-shadow: 0 0 3px var(--holo); }
    }

    .globe-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Forge button (Ferramentas) ── */
    .forge-projection {
      position: relative;
      width: 170px; height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .forge-ret {
      position: absolute;
      pointer-events: none;
    }
    .fret1 {
      width: 90%; height: 90%;
      border: 1px solid rgba(255,107,26,0.22);
      transform: rotate(45deg);
      animation: forgeRetSpin 18s linear infinite;
    }
    .fret2 {
      width: 62%; height: 62%;
      border: 1px solid rgba(0,255,231,0.25);
      animation: forgeRetSpin 12s linear infinite reverse;
    }
    .fret3 {
      width: 38%; height: 38%;
      border: 1px dashed rgba(123,47,255,0.4);
      border-radius: 50%;
      animation: ringRotate 14s linear infinite;
    }
    @keyframes forgeRetSpin {
      from { transform: rotate(45deg); }
      to   { transform: rotate(405deg); }
    }
    .forge-cross-h, .forge-cross-v {
      position: absolute;
      pointer-events: none;
    }
    .forge-cross-h {
      width: 94%; height: 1px; top: 50%; left: 3%;
      background: linear-gradient(90deg, transparent, rgba(0,255,231,0.20), transparent);
    }
    .forge-cross-v {
      width: 1px; height: 94%; top: 3%; left: 50%;
      background: linear-gradient(180deg, transparent, rgba(0,255,231,0.20), transparent);
    }
    .forge-scanline {
      position: absolute;
      width: 78%; height: 1px;
      left: 11%;
      background: linear-gradient(90deg, transparent, var(--orange) 30%, var(--orange) 70%, transparent);
      box-shadow: 0 0 8px var(--orange), 0 0 18px rgba(255,107,26,0.5);
      animation: forgeScan 3.4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes forgeScan {
      0%   { top: 12%; opacity: 0; }
      8%   { opacity: 0.95; }
      92%  { opacity: 0.95; }
      100% { top: 88%; opacity: 0; }
    }
    .forge-bracket {
      position: absolute;
      width: 16px; height: 16px;
      border: 1.5px solid rgba(255,107,26,0.55);
      pointer-events: none;
    }
    .fb-tl { top: 5%;    left: 5%;    border-right: none; border-bottom: none; }
    .fb-tr { top: 5%;    right: 5%;   border-left: none;  border-bottom: none; }
    .fb-bl { bottom: 5%; left: 5%;    border-right: none; border-top: none; }
    .fb-br { bottom: 5%; right: 5%;   border-left: none;  border-top: none; }

    .forge-core {
      position: relative;
      z-index: 2;
      width: 56px; height: 56px;
      border-radius: 4px;
      border: 1.5px solid rgba(0,255,231,0.45);
      box-shadow: var(--glow), inset 0 0 20px rgba(0,255,231,0.08);
      background: rgba(0,255,231,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: rgba(0,255,231,0.6);
      text-shadow: 0 0 10px rgba(0,255,231,0.6);
      transition: box-shadow 0.3s, border-color 0.3s, color 0.3s;
    }
    .forge-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    .holo-btn:hover .forge-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.85);
      color: var(--holo);
    }
    .device-led.orange {
      background: var(--orange);
      animation-name: ledBlinkOrange;
    }
    @keyframes ledBlinkOrange {
      0%,100% { opacity: 1;   box-shadow: 0 0 8px var(--orange), 0 0 16px var(--orange); }
      50%      { opacity: 0.3; box-shadow: 0 0 4px var(--orange); }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body { overflow-y: auto; justify-content: flex-start; padding: 28px 0 32px; }
      h1 {
        font-size: clamp(28px, 10vw, 50px);
        letter-spacing: 5px;
        text-align: center;
        padding: 0 12px;
      }
      .title-line { margin-top: -16px; }
      .container { gap: 24px; padding: 0 12px; }
      .buttons { flex-direction: column; align-items: center; gap: 20px; }
      .btn-group { gap: 6px; }
      .holo-btn { width: 220px; height: 330px; padding-bottom: 22px; }
      .holo-projection { width: 150px; height: 150px; }
      .globe-projection { width: 150px; height: 150px; }
      .forge-projection { width: 150px; height: 150px; }
      .btn-name { font-size: 10px; letter-spacing: 3px; bottom: 48px; }

      /* Mobile: sem fanout horizontal (stacking vertical) — só aparecem juntos */
      .btn-group .holo-btn { --tx-start: 0 !important; }
    }
    /* ── Bloqueio Trama ── */
    @keyframes btnGlitch {
      0%,100% { transform: translate(0,0); }
      10%     { transform: translate(-2px, 1px); }

  <script>
    var lockUntil = parseInt(localStorage.getItem('ma_trama_lock') || '0');
    if (lockUntil > Date.now()) applyLock(lockUntil);

    function applyLock(until) {
      var group   = document.getElementById('tramaGroup');
      var counter = document.createElement('div');
      counter.className = 'lock-counter';
      group.appendChild(counter);
      group.classList.add('locked');

      function tick() {
        var remaining = Math.ceil((until - Date.now()) / 1000);
        if (remaining <= 0) {
          localStorage.removeItem('ma_trama_lock');
          group.classList.remove('locked');
          counter.remove();
          return;
        }
        counter.textContent = remaining + 's';
        setTimeout(tick, 1000);
      }
      tick();
    }
  </script>
