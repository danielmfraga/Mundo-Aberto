<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --holo3:  #7b2fff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .corner {
      position: fixed;
      width: 36px; height: 36px;
      pointer-events: none;
      z-index: 1;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--orange);
      box-shadow: var(--glow-o);
    }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 56px;
      animation: fadeUp 1s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(38px, 7vw, 84px);
      font-weight: 900;
      letter-spacing: 10px;
      text-transform: uppercase;
      color: var(--holo);
      text-shadow: 0 0 20px #00ffe7bb, 0 0 60px #00ffe755, 0 0 120px #00ffe722;
      animation: titleFlicker 9s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes titleFlicker {
      0%,93%,97%,100% { opacity: 1; }
      95% { opacity: 0.82; }
    }

    .title-line {
      width: 100px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      box-shadow: var(--glow-o);
      margin-top: -44px;
    }

    .buttons {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ── Hologram button ── */
    .holo-btn {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .holo-btn-panel {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0,255,231,0.18);
      border-radius: 8px;
      background: rgba(0,255,231,0.02);
      transition: background 0.3s, border-color 0.3s;
    }
    .holo-btn:hover .holo-btn-panel {
      background: rgba(0,255,231,0.05);
      border-color: rgba(0,255,231,0.4);
    }

    .device-led-wrap {
      position: absolute;
      top: 10px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 5;
    }

    .device-led {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      animation: ledBlink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .device-led-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.55);
      text-transform: uppercase;
      user-select: none;
    }
    @keyframes ledBlink {
      0%,100% { opacity: 1;   box-shadow: 0 0 8px var(--holo), 0 0 16px var(--holo); }
      50%      { opacity: 0.3; box-shadow: 0 0 4px var(--holo); }
    }

    .holo-projection {
      position: relative;
      width: 190px; height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .holo-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.3);
      animation: ringRotate linear infinite;
    }
    .ring1 { width: 88%; height: 88%; animation-duration: 12s; border-color: rgba(0,255,231,0.2); }
    .ring2 { width: 96%; height: 50%; border-color: rgba(0,136,255,0.35); animation-duration: 8s; animation-direction: reverse; }
    .ring3 { width: 70%; height: 70%; border-style: dashed; border-color: rgba(123,47,255,0.35); animation-duration: 20s; }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .ring2 { animation-name: ringRotate2; }
    @keyframes ringRotate2 {
      from { transform: rotateX(75deg) rotate(0deg); }
      to   { transform: rotateX(75deg) rotate(360deg); }
    }

    .holo-core {
      position: relative;
      z-index: 2;
      width: 116px; height: 116px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 30px rgba(0,255,231,0.08);
      background: rgba(0,255,231,0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .holo-core::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px
      );
      pointer-events: none;
      animation: scanMove 4s linear infinite;
    }
    @keyframes scanMove {
      0%   { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }
    .holo-btn:hover .holo-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }

    .holo-icon {
      font-size: 26px;
      opacity: 0.45;
      animation: iconPulse 3s ease-in-out infinite;
      position: relative; z-index: 1;
    }
    @keyframes iconPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .holo-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: rgba(0,255,231,0.55);
      text-align: center;
      line-height: 1.5;
      letter-spacing: 1px;
      position: relative; z-index: 1;
    }

    .holo-beam {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px; height: 52px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 8px var(--holo);
      animation: beamPulse 3s ease-in-out infinite;
    }
    @keyframes beamPulse {
      0%,100% { opacity: 0.8; height: 52px; }
      50%      { opacity: 0.3; height: 40px; }
    }

    .data-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .btn-name {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 5px;
      color: rgba(0,255,231,0.45);
      text-transform: uppercase;
      text-align: center;
      transition: color 0.3s;
    }
    .btn-group:hover .btn-name {
      color: var(--holo);
      text-shadow: 0 0 10px #00ffe7aa;
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">

    <h1>Mundo Aberto</h1>
    <div class="title-line"></div>

    <div class="buttons">

      <div class="btn-group">
        <a href="personagens.html" class="holo-btn">
          <div class="holo-btn-panel"></div>
          <div class="device-led-wrap">
            <div class="device-led"></div>
            <span class="device-led-label">Black Box</span>
          </div>

          <div class="holo-projection">
            <div class="ring1 holo-ring"></div>
            <div class="ring2 holo-ring"></div>
            <div class="ring3 holo-ring"></div>

            <div class="holo-core">
              <div class="holo-icon">⬡</div>
              <div class="holo-label">CLIQUE PARA<br>PROJETAR<br>PERSONAGEM</div>
            </div>

            <div class="holo-beam"></div>

            <svg class="data-lines" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
              <line x1="120" y1="120" x2="20"  y2="40"  stroke="rgba(0,255,231,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1s"   repeatCount="indefinite"/></line>
              <line x1="120" y1="120" x2="220" y2="40"  stroke="rgba(0,136,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.3s" repeatCount="indefinite"/></line>
              <line x1="120" y1="120" x2="10"  y2="130" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/></line>
              <line x1="120" y1="120" x2="230" y2="130" stroke="rgba(123,47,255,0.15)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.5s" repeatCount="indefinite"/></line>
              <line x1="120" y1="120" x2="55"  y2="220" stroke="rgba(0,255,231,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="1.1s" repeatCount="indefinite"/></line>
              <line x1="120" y1="120" x2="185" y2="220" stroke="rgba(0,136,255,0.10)" stroke-width="0.5" stroke-dasharray="4,4"><animate attributeName="stroke-dashoffset" values="0;-8" dur="0.9s" repeatCount="indefinite"/></line>

              <circle cx="20"  cy="40"  r="2" fill="rgba(0,255,231,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2s"   repeatCount="indefinite"/></circle>
              <circle cx="220" cy="40"  r="2" fill="rgba(0,136,255,0.5)"> <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/></circle>
              <circle cx="10"  cy="130" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/></circle>
              <circle cx="230" cy="130" r="2" fill="rgba(123,47,255,0.5)"><animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/></circle>
              <circle cx="55"  cy="220" r="2" fill="rgba(0,255,231,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="3s"   repeatCount="indefinite"/></circle>
              <circle cx="185" cy="220" r="2" fill="rgba(0,136,255,0.4)"> <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
            </svg>
          </div>

        </a>
        <div class="btn-name">Personagem</div>
      </div>

    </div>
  </div>

</body>
</html>
