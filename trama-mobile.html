<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Trama · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --orange: #ff6b1a;
      --dark:   #040810;
      --danger: #ff4466;
      --line:   rgba(0,255,231,0.12);
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Corners */
    .corner { position: fixed; width: 28px; height: 28px; pointer-events: none; z-index: 1000; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--orange); }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 14px; left: 14px; }
    .corner-tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .corner-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .corner-br { bottom: 14px; right: 14px; transform: scale(-1); }

    /* Toolbar */
    #toolbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(4,8,16,0.92);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 4px;
      padding: 8px 14px;
      z-index: 500;
    }

    .tb-btn {
      background: transparent;
      border: 1px solid rgba(0,255,231,0.2);
      color: rgba(0,255,231,0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tb-btn:active { background: rgba(0,255,231,0.1); color: var(--holo); }

    #back-btn {
      position: fixed;
      top: 18px;
      left: 52px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(0,255,231,0.3);
      text-decoration: none;
      text-transform: uppercase;
      z-index: 500;
    }

    /* Viewport */
    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      touch-action: none;
    }

    #world {
      position: absolute;
      width: 4000px;
      height: 3000px;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    #svg-layer {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
      filter: drop-shadow(0 0 3px rgba(0,255,231,0.25));
      touch-action: none;
    }

    /* Nodes */
    .node {
      position: absolute;
      width: 140px;
      background: rgba(4,8,16,0.95);
      border: 1px solid rgba(0,255,231,0.25);
      border-radius: 8px;
      z-index: 10;
      touch-action: none;
    }
    .node.selected { border-color: var(--holo); box-shadow: 0 0 10px rgba(0,255,231,0.4); }
    .node.connect-src { border-color: #1D9E75; box-shadow: 0 0 12px rgba(29,158,117,0.4); }

    .node-header {
      padding: 14px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0,255,231,0.08);
      position: relative;
      min-height: 52px;
    }

    .node-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      flex-shrink: 0;
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    .node-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--holo);
      outline: none;
      border: none;
      background: transparent;
      text-align: center;
      min-width: 60px;
      max-width: 100px;
      word-break: break-word;
      white-space: normal;
      line-height: 1.4;
      flex: none;
    }
    .node-title:empty::before {
      content: attr(data-ph);
      color: rgba(0,255,231,0.25);
    }

    .node-actions {
      position: absolute;
      top: -12px; right: -6px;
      display: flex; gap: 3px;
      z-index: 30;
    }
    .node-act-btn {
      background: rgba(4,8,16,0.95);
      border: 1px solid rgba(0,255,231,0.2);
      color: rgba(0,255,231,0.5);
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .node-act-btn.del { border-color: rgba(255,68,102,0.3); color: rgba(255,68,102,0.5); }

    .node-note-preview {
      padding: 6px 12px 8px;
      font-size: 11px;
      color: rgba(207,233,240,0.35);
      line-height: 1.4;
      max-height: 40px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .node-note-preview:empty { display: none; }

    /* Anchors — always visible on mobile, bigger */
    .anchor {
      position: absolute;
      width: 20px; height: 20px;
      background: var(--dark);
      border: 2px solid rgba(0,255,231,0.4);
      border-radius: 50%;
      z-index: 20;
      display: flex; align-items: center; justify-content: center;
    }
    .anchor::after {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(0,255,231,0.4);
    }
    .anchor[data-pos=top]    { top: -10px;  left: 50%; transform: translateX(-50%); }
    .anchor[data-pos=bottom] { bottom: -10px; left: 50%; transform: translateX(-50%); }
    .anchor[data-pos=left]   { left: -10px;  top: 50%; transform: translateY(-50%); }
    .anchor[data-pos=right]  { right: -10px; top: 50%; transform: translateY(-50%); }
    .anchor.active { background: var(--holo); border-color: var(--holo); }
    .anchor.active::after { background: var(--dark); }

    /* Connection labels */
    .conn-label-wrap {
      position: absolute;
      z-index: 15;
      pointer-events: all;
      touch-action: none;
    }
    .conn-del {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(255,68,102,0.4);
      color: rgba(255,68,102,0.7);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* Color menu */
    #conn-menu {
      position: fixed;
      background: rgba(4,8,16,0.97);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 8px;
      padding: 12px;
      z-index: 2000;
      display: none;
      flex-direction: column;
      gap: 6px;
      min-width: 140px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    #conn-menu.open { display: flex; }
    .cmitem {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; cursor: pointer;
      border-radius: 4px;
    }
    .cmitem:active { background: rgba(0,255,231,0.06); }
    .cmdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cmlabel {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(207,233,240,0.7);
    }

    /* Modal */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(4,8,16,0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: rgba(4,8,16,0.98);
      border: 1px solid rgba(0,255,231,0.25);
      border-radius: 6px;
      padding: 20px;
      width: 90vw; max-width: 380px;
    }
    .modal-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 3px;
      color: var(--orange); text-transform: uppercase; margin-bottom: 6px;
    }
    #modal-name {
      font-family: 'Orbitron', monospace;
      font-size: 14px; font-weight: 700;
      color: var(--holo); margin-bottom: 14px;
    }
    #modal-note {
      width: 100%; min-height: 120px;
      background: rgba(0,255,231,0.03);
      border: 1px solid rgba(0,255,231,0.15);
      border-radius: 2px; padding: 10px 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px; color: rgba(207,233,240,0.8);
      resize: vertical; outline: none; line-height: 1.6;
    }
    .modal-row { display: flex; gap: 8px; margin-top: 12px; }
    .modal-btn {
      flex: 1; background: transparent;
      border: 1px solid rgba(0,255,231,0.2);
      color: rgba(0,255,231,0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; padding: 10px;
      cursor: pointer; border-radius: 2px;
    }
    .modal-btn.save { border-color: rgba(0,255,231,0.4); color: var(--holo); }

    /* Status */
    #date-label {
      position: fixed; bottom: 18px; right: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px;
      color: rgba(0,255,231,0.25); z-index: 500;
      text-transform: uppercase; pointer-events: none;
    }
    #status { display: none; }

    /* Hint */
    #hint {
      position: fixed; bottom: 18px; left: 56px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 3px;
      color: rgba(0,255,231,0.25); z-index: 500;
      text-transform: uppercase; white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <a href="index.html" id="back-btn">← Voltar</a>

  <div id="toolbar">
    <button class="tb-btn" id="btn-save">↑ Salvar</button>
  </div>

  <div id="viewport">
    <div id="world">
      <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="rgba(0,255,231,0.5)"/></marker>
          <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00cc66"/></marker>
          <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff4466"/></marker>
          <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ffcc00"/></marker>
          <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff6b1a"/></marker>
        </defs>
      </svg>
    </div>
  </div>

  <div id="conn-menu">
    <div class="cmitem" data-color="#00ffe7"><div class="cmdot" style="background:#00ffe7"></div><span class="cmlabel">Neutro</span></div>
    <div class="cmitem" data-color="#00cc66"><div class="cmdot" style="background:#00cc66"></div><span class="cmlabel">Aliado</span></div>
    <div class="cmitem" data-color="#ff4466"><div class="cmdot" style="background:#ff4466"></div><span class="cmlabel">Inimigo</span></div>
    <div class="cmitem" data-color="#ffcc00"><div class="cmdot" style="background:#ffcc00"></div><span class="cmlabel">Suspeito</span></div>
    <div class="cmitem" data-color="#ff6b1a"><div class="cmdot" style="background:#ff6b1a"></div><span class="cmlabel">Parente</span></div>
    <div style="height:1px;background:rgba(255,68,102,0.2);margin:4px 0;"></div>
    <div class="cmitem" id="conn-delete"><div class="cmdot" style="background:#ff4466;box-shadow:0 0 4px #ff4466"></div><span class="cmlabel" style="color:rgba(255,68,102,0.8)">Deletar fio</span></div>
  </div>

  <div id="modal-overlay">
    <div id="modal-box">
      <div class="modal-label">Arquivo · NPC</div>
      <div id="modal-name">—</div>
      <textarea id="modal-note" placeholder="Histórico, motivações, segredos..."></textarea>
      <div class="modal-row">
        <button class="modal-btn" id="modal-cancel">Cancelar</button>
        <button class="modal-btn save" id="modal-save">Salvar</button>
      </div>
    </div>
  </div>

  <div id="status">Pronto</div>
  <div id="date-label">09.05.2026 · Alpha</div>
  <div id="hint">Mundo Aberto</div>

  <script>
    const SUPABASE_URL = 'https://mxyqqfsyybluavwlrhsa.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXFxZnN5eWJsdWF2d2xyaHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTM4MzEsImV4cCI6MjA5MzY2OTgzMX0.b0Ij7UGzbMLpqZjLYxoPEu2kGwEW52U_2NSDtpMGUPM';
    const TRAMA_ID = (new URLSearchParams(window.location.search)).get('id') || 'default';

    function sbFetch(path, method, body) {
      return fetch(SUPABASE_URL + path, {
        method: method || 'GET',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      }).then(function(r) {
        if (r.status === 204) return {};
        return r.json().catch(function() { return {}; });
      });
    }

    const viewport  = document.getElementById('viewport');
    const world     = document.getElementById('world');
    const svgLayer  = document.getElementById('svg-layer');
    const statusEl  = document.getElementById('status');

    var nodes       = {};
    var connections = [];
    var nodeCount   = 0;
    var scale       = 1;
    var panOffset   = { x: 0, y: 0 };

    // Touch state
    var touchState = {
      mode: 'idle', // idle | pan | drag-node | drag-conn | pinch
      nodeId: null,
      dragOffset: { x: 0, y: 0 },
      connSource: null, // { id, pos }
      activeConn: null,
      longTimer: null,
      pinchDist: 0,
      pinchScale: 1,
      lastPan: { x: 0, y: 0 },
      ghostLine: null
    };

    function setStatus(msg) { statusEl.textContent = msg; }

    function applyTransform() {
      world.style.transform = 'translate(' + panOffset.x + 'px,' + panOffset.y + 'px) scale(' + scale + ')';
    }

    function worldCoords(clientX, clientY) {
      var r = viewport.getBoundingClientRect();
      return {
        x: (clientX - r.left - panOffset.x) / scale,
        y: (clientY - r.top  - panOffset.y) / scale
      };
    }

    function getAnchorPos(nodeEl, pos) {
      var x = parseFloat(nodeEl.style.left) || 0;
      var y = parseFloat(nodeEl.style.top)  || 0;
      var w = nodeEl.offsetWidth;
      var h = nodeEl.offsetHeight;
      if (pos === 'top')    return { x: x + w/2, y: y };
      if (pos === 'bottom') return { x: x + w/2, y: y + h };
      if (pos === 'left')   return { x: x,       y: y + h/2 };
      if (pos === 'right')  return { x: x + w,   y: y + h/2 };
    }

    function updateConnections() {
      svgLayer.querySelectorAll('.conn-path').forEach(function(e) { e.remove(); });
      connections.forEach(function(conn, idx) {
        var n1 = nodes[conn.from.id], n2 = nodes[conn.to.id];
        if (!n1 || !n2) return;
        var hasPair = connections.some(function(c2, i2) {
          return i2 !== idx && c2.from.id === conn.to.id && c2.to.id === conn.from.id;
        });
        var off = hasPair ? 4 : 0;
        var p1r = getAnchorPos(n1, conn.from.pos);
        var p2r = getAnchorPos(n2, conn.to.pos);
        var ang = Math.atan2(p2r.y - p1r.y, p2r.x - p1r.x);
        var p1 = off > 0 ? { x: p1r.x + Math.sin(ang)*off, y: p1r.y - Math.cos(ang)*off } : p1r;
        var p2 = off > 0 ? { x: p2r.x + Math.sin(ang)*off, y: p2r.y - Math.cos(ang)*off } : p2r;
        var dx = Math.abs(p2.x - p1.x), dy = Math.abs(p2.y - p1.y);
        var cx1 = p1.x + (conn.from.pos === 'right' ? dx*0.5 : conn.from.pos === 'left' ? -dx*0.5 : 0);
        var cy1 = p1.y + (conn.from.pos === 'bottom' ? dy*0.5 : conn.from.pos === 'top' ? -dy*0.5 : 0);
        var cx2 = p2.x + (conn.to.pos === 'left' ? -dx*0.5 : conn.to.pos === 'right' ? dx*0.5 : 0);
        var cy2 = p2.y + (conn.to.pos === 'top' ? -dy*0.5 : conn.to.pos === 'bottom' ? dy*0.5 : 0);

        var col = conn.color || '#00ffe7';
        var strokeCol = col === '#00ffe7' ? 'rgba(0,255,231,0.4)' : col;
        var mm = { '#00cc66': 'arr-green', '#ff4466': 'arr-red', '#ffcc00': 'arr-yellow', '#ff6b1a': 'arr-orange' };

        // Visible path
        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M'+p1.x+','+p1.y+' C'+cx1+','+cy1+' '+cx2+','+cy2+' '+p2.x+','+p2.y);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', strokeCol);
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('marker-end', 'url(#' + (mm[col] || 'arr') + ')');
        path.style.pointerEvents = 'none';
        path.classList.add('conn-path');
        svgLayer.appendChild(path);

        // Hit path (fat invisible, for touch)
        var hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hit.setAttribute('d', path.getAttribute('d'));
        hit.setAttribute('fill', 'none');
        hit.setAttribute('stroke', 'transparent');
        hit.setAttribute('stroke-width', '24');
        hit.classList.add('conn-path');
        hit.style.cursor = 'pointer';
        hit.style.pointerEvents = 'visibleStroke';
        hit.style.touchAction = 'none';
        hit.dataset.connIdx = idx;
        svgLayer.appendChild(hit);

        // no label wrap in mobile version
      });
    }

    function createNode(x, y, data) {
      var id = (data && data.id) ? data.id : 'n' + (++nodeCount);
      if (data && data.id) nodeCount = Math.max(nodeCount, parseInt(id.replace('n','')) || nodeCount);

      var el = document.createElement('div');
      el.className = 'node';
      el.dataset.id = id;
      el.style.left = (data ? data.x : x) + 'px';
      el.style.top  = (data ? data.y : y) + 'px';
      if (data && data.note) el.dataset.note = data.note;

      var header = document.createElement('div');
      header.className = 'node-header';

      var dot = document.createElement('div');
      dot.className = 'node-dot';

      var title = document.createElement('div');
      title.className = 'node-title';
      title.contentEditable = true;
      title.spellcheck = false;
      title.dataset.ph = 'Nome...';
      title.textContent = (data && data.name) ? data.name : '';

      var acts = document.createElement('div');
      acts.className = 'node-actions';

      var noteBtn = document.createElement('button');
      noteBtn.className = 'node-act-btn';
      noteBtn.textContent = '✎';
      noteBtn.title = 'Notas';

      var delBtn = document.createElement('button');
      delBtn.className = 'node-act-btn del';
      delBtn.textContent = '×';

      acts.appendChild(noteBtn);
      acts.appendChild(delBtn);
      header.appendChild(dot);
      header.appendChild(title);
      header.appendChild(acts);
      el.appendChild(header);

      var preview = document.createElement('div');
      preview.className = 'node-note-preview';
      preview.textContent = (data && data.note) ? data.note.slice(0, 60) : '';
      el.appendChild(preview);

      ['top','bottom','left','right'].forEach(function(pos) {
        var a = document.createElement('div');
        a.className = 'anchor';
        a.dataset.pos = pos;
        a.dataset.nodeId = id;

        a.addEventListener('touchstart', function(e) {
          e.stopPropagation();
          e.preventDefault();
        }, { passive: false });

        a.addEventListener('touchend', function(e) {
          e.stopPropagation();
          e.preventDefault();
          if (connSource) {
            if (connSource.id !== id) {
              // Complete connection
              addConnection(connSource, { id: id, pos: pos });
              if (nodes[connSource.id]) nodes[connSource.id].classList.remove('connect-src');
              var old = nodes[connSource.id] && nodes[connSource.id].querySelector('.anchor.active');
              if (old) old.classList.remove('active');
              connSource = null;
              if (ghostLine) { ghostLine.remove(); ghostLine = null; }
            } else {
              // Tapped same node — cancel
              nodes[connSource.id].classList.remove('connect-src');
              var old2 = nodes[connSource.id].querySelector('.anchor.active');
              if (old2) old2.classList.remove('active');
              connSource = null;
              if (ghostLine) { ghostLine.remove(); ghostLine = null; }
            }
          } else {
            // Start connection
            connSource = { id: id, pos: pos };
            nodes[id].classList.add('connect-src');
            a.classList.add('active');
          }
        }, { passive: false });

        el.appendChild(a);
      });

      noteBtn.addEventListener('click', function(e) { e.stopPropagation(); openModal(id); });
      delBtn.addEventListener('click',  function(e) { e.stopPropagation(); deleteNode(id); });

      // Mobile: tap on title opens keyboard
      title.addEventListener('touchend', function(e) {
        e.stopPropagation();
        title.focus();
        // Place cursor at end
        var range = document.createRange();
        range.selectNodeContents(title);
        range.collapse(false);
        var sel = window.getSelection();
        if (sel) { sel.removeAllRanges(); sel.addRange(range); }
      });

      world.appendChild(el);
      nodes[id] = el;
      updateConnections();
      return id;
    }

    function deleteNode(id) {
      connections = connections.filter(function(c) {
        return !(c.from.id === id || c.to.id === id);
      });
      if (nodes[id]) nodes[id].remove();
      delete nodes[id];
      updateConnections();
    }

    function addConnection(from, to, savedColor) {
      var conn = { from: from, to: to, labelWrap: null, color: savedColor || '#00ffe7' };
      connections.push(conn);
      setTimeout(updateConnections, 50);
    }

    // ── Modal ──
    var currentNoteId = null;
    function openModal(id) {
      currentNoteId = id;
      var title = nodes[id] ? nodes[id].querySelector('.node-title').textContent : 'NPC';
      document.getElementById('modal-name').textContent = title || 'NPC';
      document.getElementById('modal-note').value = nodes[id] ? (nodes[id].dataset.note || '') : '';
      document.getElementById('modal-overlay').classList.add('open');
    }
    function closeModal(save) {
      if (save && currentNoteId && nodes[currentNoteId]) {
        var note = document.getElementById('modal-note').value;
        nodes[currentNoteId].dataset.note = note;
        var prev = nodes[currentNoteId].querySelector('.node-note-preview');
        if (prev) prev.textContent = note.slice(0, 60);
      }
      document.getElementById('modal-overlay').classList.remove('open');
      currentNoteId = null;
    }
    document.getElementById('modal-save').addEventListener('click', function() { closeModal(true); });
    document.getElementById('modal-cancel').addEventListener('click', function() { closeModal(false); });

    // ── Color menu ──
    var activeConn = null;
    var connMenu = document.getElementById('conn-menu');
    connMenu.querySelectorAll('.cmitem').forEach(function(item) {
      item.addEventListener('click', function() {
        if (item.id === 'conn-delete') {
          if (activeConn) {
            connections = connections.filter(function(c) { return c !== activeConn; });
            updateConnections();
          }
        } else {
          if (activeConn && item.dataset.color) { activeConn.color = item.dataset.color; updateConnections(); }
        }
        connMenu.classList.remove('open');
        activeConn = null;
      });
    });

    function openConnMenu(conn, clientX, clientY) {
      activeConn = conn;
      connMenu.style.left = Math.min(clientX, window.innerWidth - 160) + 'px';
      connMenu.style.top  = Math.min(clientY, window.innerHeight - 200) + 'px';
      connMenu.classList.add('open');
      if (navigator.vibrate) navigator.vibrate(40);
    }

    // ── Touch Handling ──
    var LONG_PRESS_MS = 500;
    var TAP_DIST = 10;

    function getTouches(e) { return Array.from(e.touches); }
    function getTouchById(e, id) {
      for (var i = 0; i < e.touches.length; i++) {
        if (e.touches[i].identifier === id) return e.touches[i];
      }
      return null;
    }

    // Double tap to create node
    var lastTapTime = 0, lastTapTarget = null;
// double tap merged into main touchend

    // Main touch handler
    var touchState   = { _anchorEl: null };
    var primaryId    = null; // touch id for main action
    var secondaryId  = null; // touch id for pinch
    var touchStartPos = { x: 0, y: 0 };
    var touchMoved   = false;
    var longTimer    = null;
    var dragNodeId   = null;
    var dragNodeOffset = { x: 0, y: 0 };
    var connSource   = null; // { id, pos }
    var ghostLine    = null;
    var isPanning    = false;
    var panStart     = { x: 0, y: 0 };
    var pinchStartDist  = 0;
    var pinchStartScale = 1;
    var pinchStartPan   = { x: 0, y: 0 };
    var pinchMidStart   = { x: 0, y: 0 };

    function clearLong() { if (longTimer) { clearTimeout(longTimer); longTimer = null; } }

    function dist(t1, t2) {
      var dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }

    function getHitConn(clientX, clientY) {
      // Try elementsFromPoint first
      var els = document.elementsFromPoint(clientX, clientY);
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        if (el.classList && el.classList.contains('conn-path') && el.dataset.connIdx !== undefined) {
          return connections[parseInt(el.dataset.connIdx)];
        }
      }
      // Fallback: find nearest connection by proximity to midpoint (for mobile)
      var wc = worldCoords(clientX, clientY);
      var best = null, bestDist = 30; // 30px threshold in world coords
      connections.forEach(function(conn) {
        var n1 = nodes[conn.from.id], n2 = nodes[conn.to.id];
        if (!n1 || !n2) return;
        var p1 = getAnchorPos(n1, conn.from.pos);
        var p2 = getAnchorPos(n2, conn.to.pos);
        // Distance from point to line segment
        var dx = p2.x - p1.x, dy = p2.y - p1.y;
        var len2 = dx*dx + dy*dy;
        var t = len2 > 0 ? Math.max(0, Math.min(1, ((wc.x-p1.x)*dx + (wc.y-p1.y)*dy) / len2)) : 0;
        var px = p1.x + t*dx - wc.x, py = p1.y + t*dy - wc.y;
        var d = Math.sqrt(px*px + py*py);
        if (d < bestDist) { bestDist = d; best = conn; }
      });
      return best;
    }

    viewport.addEventListener('touchstart', function(e) {
      // Let buttons handle themselves
      var el0 = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      if (el0 && (el0.classList.contains('node-act-btn') || el0.classList.contains('conn-del') ||
                  el0.classList.contains('cmitem') || el0.closest('.modal-box') ||
                  el0.id === 'btn-save' || el0.id === 'modal-save' || el0.id === 'modal-cancel')) {
        return; // let click events handle these
      }
      e.preventDefault();
      connMenu.classList.remove('open');

      var touches = getTouches(e);

      if (touches.length === 2 && primaryId !== null) {
        // Start pinch
        secondaryId = touches.find(function(t) { return t.identifier !== primaryId; }).identifier;
        var t1 = getTouchById(e, primaryId);
        var t2 = getTouchById(e, secondaryId);
        if (t1 && t2) {
          pinchStartDist  = dist(t1, t2);
          pinchStartScale = scale;
          pinchStartPan   = { x: panOffset.x, y: panOffset.y };
          pinchMidStart   = { x: (t1.clientX + t2.clientX)/2, y: (t1.clientY + t2.clientY)/2 };
          clearLong();
          dragNodeId = null;
          isPanning  = false;
        }
        return;
      }

      if (touches.length > 1) return;

      var t = touches[0];
      primaryId = t.identifier;
      touchStartPos = { x: t.clientX, y: t.clientY };
      touchMoved = false;
      dragNodeId = null;
      isPanning  = false;
      connSource = null;

      // What did we touch?
      var el = document.elementFromPoint(t.clientX, t.clientY);

      // Anchor handled by direct listeners on each anchor element
      touchState._anchorEl = null;
      var anchorEl = el && (el.classList.contains('anchor') ? el : el.closest && el.closest('.anchor'));
      if (anchorEl) return; // handled by anchor's own listener

      // Node body?
      var nodeEl = el && (el.classList.contains('node') ? el : el.closest && el.closest('.node'));
      if (nodeEl && !el.classList.contains('node-act-btn')) {
        var nid2 = nodeEl.dataset.id;
        // Cancel pending connection
        if (connSource) {
          nodes[connSource.id] && nodes[connSource.id].classList.remove('connect-src');
          var srcA = nodes[connSource.id] && nodes[connSource.id].querySelector('.anchor[data-pos="'+connSource.pos+'"]');
          if (srcA) srcA.classList.remove('active');
          connSource = null;
          if (ghostLine) { ghostLine.remove(); ghostLine = null; }
          return;
        }
        dragNodeId = nid2;
        var wc = worldCoords(t.clientX, t.clientY);
        dragNodeOffset = {
          x: wc.x - parseFloat(nodeEl.style.left || 0),
          y: wc.y - parseFloat(nodeEl.style.top  || 0)
        };
        return;
      }

      // Connection hit?
      var hitConn = getHitConn(t.clientX, t.clientY);
      if (hitConn) {
        // Long press on conn = color menu
        longTimer = setTimeout(function() {
          openConnMenu(hitConn, t.clientX, t.clientY);
          longTimer = null;
        }, LONG_PRESS_MS);
        return;
      }

      // Background — start pan
      if (connSource) {
        nodes[connSource.id] && nodes[connSource.id].classList.remove('connect-src');
        var srcA2 = nodes[connSource.id] && nodes[connSource.id].querySelector('.anchor[data-pos="'+connSource.pos+'"]');
        if (srcA2) srcA2.classList.remove('active');
        connSource = null;
        if (ghostLine) { ghostLine.remove(); ghostLine = null; }
        return;
      }
      isPanning = true;
      panStart = { x: t.clientX - panOffset.x, y: t.clientY - panOffset.y };

    }, { passive: false });

    viewport.addEventListener('touchmove', function(e) {
      e.preventDefault();
      var touches = getTouches(e);

      // Pinch zoom + pan
      if (secondaryId !== null) {
        var t1 = getTouchById(e, primaryId);
        var t2 = getTouchById(e, secondaryId);
        if (t1 && t2) {
          var d = dist(t1, t2);
          var newScale = Math.min(2.5, Math.max(0.2, pinchStartScale * (d / pinchStartDist)));
          var mid = { x: (t1.clientX + t2.clientX)/2, y: (t1.clientY + t2.clientY)/2 };
          panOffset.x = mid.x - (pinchMidStart.x - pinchStartPan.x) - (mid.x - pinchStartPan.x) * (newScale / pinchStartScale) + pinchStartPan.x * (newScale / pinchStartScale - 1);
          // Simpler pinch formula
          panOffset.x = pinchStartPan.x + (mid.x - pinchMidStart.x) + (pinchMidStart.x - 0) * (1 - newScale/pinchStartScale);
          panOffset.y = pinchStartPan.y + (mid.y - pinchMidStart.y) + (pinchMidStart.y - 0) * (1 - newScale/pinchStartScale);
          scale = newScale;
          applyTransform();
        }
        return;
      }

      var t = null;
      for (var i = 0; i < touches.length; i++) {
        if (touches[i].identifier === primaryId) { t = touches[i]; break; }
      }
      if (!t) return;

      var dx = t.clientX - touchStartPos.x;
      var dy = t.clientY - touchStartPos.y;
      if (Math.abs(dx) > TAP_DIST || Math.abs(dy) > TAP_DIST) {
        touchMoved = true;
        clearLong();
      }

      // Draw ghost line if connSource active
      if (connSource && !dragNodeId) {
        var wc = worldCoords(t.clientX, t.clientY);
        var srcNode = nodes[connSource.id];
        if (srcNode) {
          var p1 = getAnchorPos(srcNode, connSource.pos);
          if (ghostLine) ghostLine.remove();
          ghostLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          var ddx = Math.abs(wc.x - p1.x), ddy = Math.abs(wc.y - p1.y);
          var gcx = p1.x + (connSource.pos === 'right' ? ddx*0.5 : connSource.pos === 'left' ? -ddx*0.5 : 0);
          var gcy = p1.y + (connSource.pos === 'bottom' ? ddy*0.5 : connSource.pos === 'top' ? -ddy*0.5 : 0);
          ghostLine.setAttribute('d', 'M'+p1.x+','+p1.y+' C'+gcx+','+gcy+' '+wc.x+','+wc.y+' '+wc.x+','+wc.y);
          ghostLine.setAttribute('fill', 'none');
          ghostLine.setAttribute('stroke', 'rgba(0,255,231,0.3)');
          ghostLine.setAttribute('stroke-width', '1.5');
          ghostLine.setAttribute('stroke-dasharray', '6,4');
          ghostLine.setAttribute('pointer-events', 'none');
          svgLayer.appendChild(ghostLine);
        }
        return;
      }

      if (dragNodeId && nodes[dragNodeId]) {
        var wc2 = worldCoords(t.clientX, t.clientY);
        nodes[dragNodeId].style.left = Math.max(0, wc2.x - dragNodeOffset.x) + 'px';
        nodes[dragNodeId].style.top  = Math.max(0, wc2.y - dragNodeOffset.y) + 'px';
        updateConnections();
        return;
      }

      if (isPanning) {
        panOffset.x = t.clientX - panStart.x;
        panOffset.y = t.clientY - panStart.y;
        applyTransform();
      }

    }, { passive: false });

    viewport.addEventListener('touchend', function(e) {
      clearLong();
      secondaryId = null;

      var t = e.changedTouches[0];

      // Double tap on background = create node
      var now = Date.now();
      var target = document.elementFromPoint(t.clientX, t.clientY);
      var isBackground = !target || target === viewport || target === world || target === svgLayer || target.tagName === 'svg' || target.tagName === 'path';
      if (isBackground && !touchMoved) {
        if (now - lastTapTime < 350) {
          var wc = worldCoords(t.clientX, t.clientY);
          var newId = createNode(wc.x - 70, wc.y - 26);
          setTimeout(function() {
            var titleEl = nodes[newId] && nodes[newId].querySelector('.node-title');
            if (titleEl) titleEl.focus();
          }, 50);
          lastTapTime = 0;
        } else {
          lastTapTime = now;
          // Cancel connSource if tapping background
          if (connSource) {
            if (nodes[connSource.id]) nodes[connSource.id].classList.remove('connect-src');
            var srcAnchorEl = nodes[connSource.id] && nodes[connSource.id].querySelector('.anchor[data-pos="'+connSource.pos+'"]');
            if (srcAnchorEl) srcAnchorEl.classList.remove('active');
            connSource = null;
            if (ghostLine) { ghostLine.remove(); ghostLine = null; }
          }
          connMenu.classList.remove('open');
        }
      }

      dragNodeId  = null;
      isPanning   = false;
      if (ghostLine && !connSource) { ghostLine.remove(); ghostLine = null; }
    }, { passive: false });

    // ── Serialize / Load ──
    function serializeState() {
      var nodeData = Object.entries(nodes).map(function(entry) {
        var id = entry[0], el = entry[1];
        return { id: id, x: parseFloat(el.style.left), y: parseFloat(el.style.top),
                 name: el.querySelector('.node-title').textContent, note: el.dataset.note || '' };
      });
      var connData = connections.map(function(c) {
        return { from: c.from, to: c.to, color: c.color || '#00ffe7' };
      });
      return { nodes: nodeData, connections: connData };
    }

    function loadState(state) {
      Object.keys(nodes).forEach(deleteNode);
      connections.forEach(function(c) { if (c.labelWrap) c.labelWrap.remove(); });
      connections = [];
      svgLayer.querySelectorAll('.conn-path').forEach(function(e) { e.remove(); });
      if (state.nodes) state.nodes.forEach(function(n) { createNode(0, 0, n); });
      if (state.connections) {
        state.connections.forEach(function(c) {
          if (nodes[c.from.id] && nodes[c.to.id]) {
            addConnection(c.from, c.to, c.color);
          }
        });
      }
      setTimeout(updateConnections, 100);
    }

    // ── Save ──
    document.getElementById('btn-save').addEventListener('click', function() {
      var btn = document.getElementById('btn-save');
      btn.textContent = '...';
      var state = serializeState();
      sbFetch('/rest/v1/tramas?trama_id=eq.' + TRAMA_ID + '&select=id', 'GET')
        .then(function(rows) {
          var entry = { trama_id: TRAMA_ID, data: state };
          return (rows && rows.length)
            ? sbFetch('/rest/v1/tramas?trama_id=eq.' + TRAMA_ID, 'PATCH', entry)
            : sbFetch('/rest/v1/tramas', 'POST', entry);
        })
        .then(function() { btn.textContent = '✓ Salvo'; setTimeout(function() { btn.textContent = '↑ Salvar'; }, 2000); })
        .catch(function() { btn.textContent = 'Erro'; setTimeout(function() { btn.textContent = '↑ Salvar'; }, 2000); });
    });

    // ── Load on start (only if ?id= param present) ──
    if ((new URLSearchParams(window.location.search)).get('id')) {
      sbFetch('/rest/v1/tramas?trama_id=eq.' + TRAMA_ID + '&select=data', 'GET')
        .then(function(rows) {
          if (rows && rows.length && rows[0].data) loadState(rows[0].data);
        }).catch(function() {});
    }

    panOffset = { x: viewport.offsetWidth/2 - 500, y: viewport.offsetHeight/2 - 300 };
    applyTransform();
  </script>
</body>
</html>
