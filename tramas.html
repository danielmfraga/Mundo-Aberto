<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trama · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --holo3:  #7b2fff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      width: 100vw; height: 100vh;
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }
    body.dragging { cursor: grabbing; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
      animation: gridWave 18s ease-in-out infinite;
    }
    @keyframes gridWave {
      0%   { background-position:  0px   0px; }
      15%  { background-position:  12px  7px; }
      30%  { background-position:  5px   17px; }
      45%  { background-position: -10px  10px; }
      60%  { background-position: -14px  2px; }
      75%  { background-position: -5px  -10px; }
      90%  { background-position:  7px  -5px; }
      100% { background-position:  0px   0px; }
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 100;
    }

    /* ── Cantos ── */
    .corner { position: fixed; width: 36px; height: 36px; pointer-events: none; z-index: 200; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--orange); box-shadow: var(--glow-o); }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 20px; left: 20px; }
    .corner-tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner-br { bottom: 20px; right: 20px; transform: scale(-1); }

    /* ── HUD ── */
    .back-btn {
      position: fixed; top: 28px; left: 64px;
      display: flex; align-items: center; gap: 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(0,255,231,0.45);
      text-decoration: none; text-transform: uppercase;
      transition: color 0.2s; z-index: 150;
    }
    .back-btn:hover { color: var(--holo); }

    .page-title {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
      letter-spacing: 8px; color: rgba(0,255,231,0.4); text-transform: uppercase;
      z-index: 150; pointer-events: none;
    }

    /* ── Botão Nova Trama ── */
    .new-trama-btn {
      position: fixed; bottom: 40px; right: 44px;
      z-index: 150; display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      text-decoration: none; cursor: pointer; background: none; border: none;
    }
    .new-trama-icon {
      width: 50px; height: 50px;
      border: 1px dashed rgba(0,255,231,0.28); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(4,8,16,0.85); backdrop-filter: blur(8px);
      transition: border-color 0.3s, background 0.3s; position: relative;
    }
    .new-trama-icon::before { content: ''; position: absolute; width: 18px; height: 1px; background: rgba(0,255,231,0.45); transition: background 0.3s, box-shadow 0.3s; }
    .new-trama-icon::after  { content: ''; position: absolute; width: 1px; height: 18px; background: rgba(0,255,231,0.45); transition: background 0.3s, box-shadow 0.3s; }
    .new-trama-btn:hover .new-trama-icon { border-color: rgba(0,255,231,0.55); background: rgba(0,255,231,0.04); }
    .new-trama-btn:hover .new-trama-icon::before,
    .new-trama-btn:hover .new-trama-icon::after { background: var(--holo); box-shadow: 0 0 8px var(--holo); }
    .new-trama-label {
      font-family: 'Share Tech Mono', monospace; font-size: 8px;
      letter-spacing: 2px; color: rgba(0,255,231,0.3);
      text-transform: uppercase; transition: color 0.3s;
    }
    .new-trama-btn:hover .new-trama-label { color: var(--holo); }

    /* ── Hint ── */
    .nav-hint {
      position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace; font-size: 9px;
      letter-spacing: 2px; color: rgba(0,255,231,0.2); text-transform: uppercase;
      z-index: 150; pointer-events: all; opacity: 0;
      animation: hintFade 15s ease forwards 0.5s;
      transition: opacity 0.4s;
      white-space: nowrap;
    }
    .nav-hint:hover { opacity: 1 !important; }
    @keyframes hintFade { 0%{opacity:0} 5%{opacity:1} 80%{opacity:1} 100%{opacity:0} }

    /* ── Cena 3D ── */
    #scene { position: fixed; inset: 0; perspective: 1200px; z-index: 1; }
    #world {
      position: absolute; top: 50%; left: 50%;
      transform-style: preserve-3d;
      transform: translateX(-50%) translateY(-50%) translateZ(0px);
      will-change: transform;
    }

    /* ── Cards ── */
    .trama-card {
      position: absolute;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      text-decoration: none;
      margin-left: -80px; margin-top: -90px;
    }
    .trama-card.draggable { cursor: move; }

    .trama-float {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none;
    }
    .trama-card.draggable .trama-float { pointer-events: auto; }
    .trama-card.nexus-card   .trama-float { pointer-events: none; }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    .globe-wrap {
      position: relative; width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Nexus perolado — hue-rotate nos anéis + core multicolor */
    .nexus-card .globe-projection {
      animation: nexusHue 10s linear infinite;
    }
    @keyframes nexusHue {
      0%   { filter: hue-rotate(0deg)   brightness(1.1); }
      25%  { filter: hue-rotate(90deg)  brightness(1.2); }
      50%  { filter: hue-rotate(200deg) brightness(1.1); }
      75%  { filter: hue-rotate(290deg) brightness(1.2); }
      100% { filter: hue-rotate(360deg) brightness(1.1); }
    }
    .nexus-card .globe-core {
      animation: nexusCorePearl 10s linear infinite;
    }
    @keyframes nexusCorePearl {
      0%   { box-shadow: 0 0 18px #00ffe7cc, 0 0 45px #00ffe766, inset 0 0 28px rgba(0,255,231,0.18); border-color: rgba(0,255,231,0.75); }
      25%  { box-shadow: 0 0 18px #0088ffcc, 0 0 45px #0088ff66, inset 0 0 28px rgba(0,136,255,0.18); border-color: rgba(0,136,255,0.75); }
      50%  { box-shadow: 0 0 18px #a855f7cc, 0 0 45px #a855f766, inset 0 0 28px rgba(168,85,247,0.18); border-color: rgba(168,85,247,0.75); }
      75%  { box-shadow: 0 0 18px #ff6b1acc, 0 0 45px #ff6b1a66, inset 0 0 28px rgba(255,107,26,0.18); border-color: rgba(255,107,26,0.75); }
      100% { box-shadow: 0 0 18px #00ffe7cc, 0 0 45px #00ffe766, inset 0 0 28px rgba(0,255,231,0.18); border-color: rgba(0,255,231,0.75); }
    }

    .globe-projection {
      position: relative; width: 130px; height: 130px;
      display: flex; align-items: center; justify-content: center;
    }

    .globe-ring { position: absolute; border-radius: 50%; }
    .gring1 { width: 86%; height: 86%; border: 1px solid  rgba(0,255,231,0.18); animation: gringMerid  18s linear infinite; }
    .gring2 { width: 86%; height: 86%; border: 1px solid  rgba(0,136,255,0.28); animation: gringTilt   13s linear infinite reverse; }
    .gring3 { width: 86%; height: 86%; border: 1px dashed rgba(123,47,255,0.22); animation: gringMerid2 25s linear infinite; }
    .gring4 { width: 86%; height: 43%; border: 1px solid  rgba(0,255,231,0.15); animation: gringEq     20s linear infinite; }

    @keyframes gringMerid  { from { transform: rotateY(0deg); }               to { transform: rotateY(360deg); } }
    @keyframes gringMerid2 { from { transform: rotateX(30deg) rotateY(0deg);  } to { transform: rotateX(30deg) rotateY(360deg); } }
    @keyframes gringTilt   { from { transform: rotateX(60deg) rotateY(0deg);  } to { transform: rotateX(60deg) rotateY(360deg); } }
    @keyframes gringEq     { from { transform: rotateX(80deg) rotateZ(0deg);  } to { transform: rotateX(80deg) rotateZ(360deg); } }

    .globe-core {
      position: relative; z-index: 2;
      width: 64px; height: 64px; border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.4);
      box-shadow: var(--glow), inset 0 0 20px rgba(0,255,231,0.06);
      background: rgba(0,255,231,0.02);
      overflow: hidden; transition: box-shadow 0.3s, border-color 0.3s;
    }
    .globe-core::after {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,255,231,0.04) 3px, rgba(0,255,231,0.04) 4px);
      pointer-events: none; animation: scanMove 4s linear infinite;
    }
    @keyframes scanMove { 0%{background-position:0 0} 100%{background-position:0 100px} }

    .nexus-card:hover .globe-core,
    .trama-card.draggable:hover .globe-core {
      box-shadow: 0 0 20px #00ffe7cc, 0 0 60px #00ffe766, inset 0 0 30px rgba(0,255,231,0.2);
      border-color: rgba(0,255,231,0.7);
    }


    .globe-dot {
      position: absolute; width: 3px; height: 3px;
      border-radius: 50%; background: var(--holo); z-index: 3;
    }
    @keyframes dotPulse {
      0%,100% { opacity:1;   box-shadow: 0 0 5px var(--holo), 0 0 10px var(--holo); }
      50%      { opacity:0.3; box-shadow: 0 0 3px var(--holo); }
    }

    .globe-beam {
      position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 2px; height: 36px;
      background: linear-gradient(to top, var(--holo), transparent);
      box-shadow: 0 0 8px var(--holo);
      animation: beamPulse 3s ease-in-out infinite;
    }
    @keyframes beamPulse { 0%,100%{opacity:0.8;height:36px} 50%{opacity:0.3;height:26px} }

    .globe-svg { position: absolute; inset: 0; pointer-events: none; z-index: 2; }

    .trama-name {
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 4px; color: rgba(0,255,231,0.45); text-transform: uppercase;
      text-align: center; transition: color 0.3s;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .nexus-card .trama-name {
      font-size: 11px; letter-spacing: 6px;
      color: rgba(0,255,231,0.6);
      text-shadow: 0 0 12px rgba(0,255,231,0.4);
    }
    .trama-card:hover .trama-name { color: var(--holo); text-shadow: 0 0 10px #00ffe7aa; }

    /* ── Modal ── */
    #modal {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(4,8,16,0.88);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #modal.open { opacity: 1; pointer-events: all; }

    .modal-box {
      position: relative;
      border: 1px solid rgba(0,255,231,0.25);
      border-radius: 4px;
      background: rgba(4,8,16,0.95);
      padding: 52px 60px 44px;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      max-width: 480px; width: 90%;
      animation: modalSlide 0.3s ease;
    }
    @keyframes modalSlide { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }

    .modal-box::before {
      content: '';
      position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      box-shadow: var(--glow-o);
    }

    .modal-q {
      font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700;
      letter-spacing: 3px; color: var(--holo); text-align: center; line-height: 1.7;
      text-shadow: 0 0 16px rgba(0,255,231,0.4);
    }

    .modal-sub {
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      letter-spacing: 4px; color: rgba(0,255,231,0.45); text-transform: uppercase;
    }

    .modal-btns {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    }

    .modal-btn {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase;
      border: 1px solid rgba(0,255,231,0.25);
      background: transparent; color: rgba(0,255,231,0.55);
      padding: 10px 28px; border-radius: 2px; cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn:hover { border-color: var(--holo); color: var(--holo); box-shadow: 0 0 12px rgba(0,255,231,0.2); background: rgba(0,255,231,0.04); }
    .modal-btn.danger:hover { border-color: #ff4466; color: #ff4466; box-shadow: 0 0 12px rgba(255,68,102,0.2); background: rgba(255,68,102,0.04); }

    /* ── Botão deletar trama ── */
    .trama-delete {
      position: absolute;
      top: 4px; right: -10px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(4,8,16,0.92);
      border: 1px solid rgba(255,68,102,0.4);
      color: rgba(255,68,102,0.6);
      font-size: 9px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s, box-shadow 0.2s, color 0.2s;
      z-index: 20; pointer-events: all;
    }
    .trama-card.draggable:hover .trama-delete { opacity: 1; }
    .trama-delete:hover { color: #ff4466; border-color: #ff4466; box-shadow: 0 0 10px rgba(255,68,102,0.4); }

    /* ── Estado vazio ── */
    .empty-msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 3px; color: rgba(0,255,231,0.15);
      text-align: center; line-height: 2.2; pointer-events: none; z-index: 2;
    }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <a href="index.html" class="back-btn">← Voltar</a>
  <div class="page-title">Trama</div>

  <div id="scene">
    <div id="world"></div>
  </div>

  <button class="new-trama-btn" id="newTramaBtn">
    <div class="new-trama-icon"></div>
    <div class="new-trama-label">Nova Trama</div>
  </button>

  <div class="nav-hint">scroll · zoom &nbsp;|&nbsp; arrastar · navegar</div>

  <!-- Modal -->
  <div id="modal">
    <div class="modal-box">
      <div class="modal-q">Que maravilhas você está<br>imaginando?</div>
      <div class="modal-sub">Preparado?</div>
      <div class="modal-btns">
        <button class="modal-btn" id="btnSim">Sim</button>
        <button class="modal-btn" id="btnNaoSei">Não sei</button>
        <button class="modal-btn danger" id="btnNao">Não</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constantes ──
    var MIN_FROM_NEXUS = 340;
    var MIN_FROM_OTHER = 220;

    // ── Estado ──
    var camX = 0, camY = 0, camZ = 0;
    var isDraggingCam  = false;
    var isDraggingCard = false;
    var dragData = null;
    var moved = false;
    var lastMouse = { x: 0, y: 0 };
    var lastTouchDist = null;

    var tramas = JSON.parse(localStorage.getItem('ma_tramas') || '[]');

    var scene = document.getElementById('scene');
    var world = document.getElementById('world');
    var modal = document.getElementById('modal');

    // ── Câmera ──
    function applyCamera() {
      world.style.transform =
        'translateX(calc(-50% + ' + camX + 'px)) ' +
        'translateY(calc(-50% + ' + camY + 'px)) ' +
        'translateZ(' + camZ + 'px)';
    }

    scene.addEventListener('wheel', function(e) {
      e.preventDefault();
      camZ = Math.max(-2400, Math.min(900, camZ + e.deltaY * -1.2));
      applyCamera();
    }, { passive: false });

    // ── Drag (câmera ou card) ──
    scene.addEventListener('mousedown', function(e) {
      if (modal.classList.contains('open')) return;
      if (e.target.closest('.trama-delete')) return;
      var cardEl = e.target.closest('.trama-card.draggable');
      if (cardEl) {
        isDraggingCard = true;
        dragData = { el: cardEl, idx: parseInt(cardEl.dataset.idx) };
        e.preventDefault();
      } else if (!e.target.closest('a[href]') && !e.target.closest('button')) {
        isDraggingCam = true;
      }
      moved = false;
      lastMouse = { x: e.clientX, y: e.clientY };
      document.body.classList.add('dragging');
    });

    window.addEventListener('mousemove', function(e) {
      if (!isDraggingCam && !isDraggingCard) return;
      var dx = e.clientX - lastMouse.x;
      var dy = e.clientY - lastMouse.y;
      if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      if (isDraggingCam) { camX += dx; camY += dy; applyCamera(); }
      else if (isDraggingCard && dragData) { moveCard(dragData, dx, dy); }
      lastMouse = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', function() {
      if (isDraggingCard) saveTramas();
      isDraggingCam = isDraggingCard = false;
      dragData = null;
      document.body.classList.remove('dragging');
    });

    // Touch
    var lastTouchDist = null;
    scene.addEventListener('touchstart', function(e) {
      if (modal.classList.contains('open')) return;
      if (e.touches.length === 1) {
        var cardEl = e.target.closest('.trama-card.draggable');
        if (cardEl) {
          isDraggingCard = true;
          dragData = { el: cardEl, idx: parseInt(cardEl.dataset.idx) };
        } else { isDraggingCam = true; }
        moved = false;
        lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.touches.length === 2) {
        lastTouchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: true });

    scene.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (e.touches.length === 1) {
        var dx = e.touches[0].clientX - lastMouse.x;
        var dy = e.touches[0].clientY - lastMouse.y;
        if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
        if (isDraggingCam) { camX += dx; camY += dy; applyCamera(); }
        else if (isDraggingCard && dragData) { moveCard(dragData, dx, dy); }
        lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      if (e.touches.length === 2 && lastTouchDist !== null) {
        var dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY);
        camZ = Math.max(-2400, Math.min(900, camZ + (dist - lastTouchDist) * 3));
        lastTouchDist = dist;
        applyCamera();
      }
    }, { passive: false });

    scene.addEventListener('touchend', function() {
      if (isDraggingCard) saveTramas();
      isDraggingCam = isDraggingCard = false;
      dragData = null; lastTouchDist = null;
    });

    // ── Mover card com colisão ──
    function moveCard(dc, dx, dy) {
      var t = tramas[dc.idx];
      var nx = t.x + dx, ny = t.y + dy;
      if (Math.sqrt(nx*nx + ny*ny) < MIN_FROM_NEXUS) return;
      for (var i = 0; i < tramas.length; i++) {
        if (i === dc.idx) continue;
        var o = tramas[i];
        if (Math.sqrt((nx-o.x)*(nx-o.x) + (ny-o.y)*(ny-o.y)) < MIN_FROM_OTHER) return;
      }
      t.x = nx; t.y = ny;
      dc.el.style.transform = 'translate3d(' + t.x + 'px,' + t.y + 'px,' + t.z + 'px)';
    }

    function saveTramas() { localStorage.setItem('ma_tramas', JSON.stringify(tramas)); }

    // ── Posição válida para nova trama ──
    function findValidPos() {
      for (var i = 0; i < 120; i++) {
        var angle = Math.random() * Math.PI * 2;
        var r = 320 + Math.random() * 480;
        var x = Math.cos(angle) * r;
        var y = Math.sin(angle) * r * 0.55 + (Math.random() - 0.5) * 180;
        var z = (Math.random() - 0.5) * 700;
        if (Math.sqrt(x*x + y*y) < MIN_FROM_NEXUS) continue;
        var ok = true;
        for (var j = 0; j < tramas.length; j++) {
          if (Math.sqrt((x-tramas[j].x)*(x-tramas[j].x)+(y-tramas[j].y)*(y-tramas[j].y)) < MIN_FROM_OTHER) { ok=false; break; }
        }
        if (ok) return { x: x, y: y, z: z };
      }
      var a = Math.random() * Math.PI * 2;
      return { x: Math.cos(a)*520, y: Math.sin(a)*290, z: 0 };
    }

    // ── KB e tamanho do globo ──
    function getTramaKB(tramaId) {
      var total = 0;
      try {
        Object.keys(localStorage).forEach(function(k) {
          if (k.indexOf(tramaId) !== -1) total += (localStorage.getItem(k) || '').length;
        });
      } catch(e) {}
      return total / 1024;
    }
    function getGlobeSize(kb) {
      if (kb <= 0) return 160;
      return Math.min(Math.round(160 + Math.log2(kb + 1) * 18), 320);
    }

    // ── Deletar trama ──
    function deleteTrama(tramaId, cardEl) {
      if (!confirm('Deletar esta trama? Ação irreversível.')) return;
      tramas = tramas.filter(function(t) { return t.id !== tramaId; });
      saveTramas();
      cardEl.style.transition = 'opacity 0.3s, transform 0.3s';
      cardEl.style.opacity = '0';
      cardEl.style.transform = cardEl.style.transform + ' scale(0.7)';
      setTimeout(function() {
        cardEl.remove();
        world.querySelectorAll('.trama-card.draggable').forEach(function(c, i) {
          c.dataset.idx = i;
        });
      }, 300);
    }

    // ── Conteúdo interno do globo (anéis, pontos, core, beam, svg) ──
    function globeInnerHTML() {
      return (
          '<div class="gring1 globe-ring"></div>' +
          '<div class="gring2 globe-ring"></div>' +
          '<div class="gring3 globe-ring"></div>' +
          '<div class="gring4 globe-ring"></div>' +
          '<div class="globe-dot" style="top:22%;left:62%;animation:dotPulse 2.1s ease-in-out infinite"></div>' +
          '<div class="globe-dot" style="top:40%;left:18%;animation:dotPulse 2.8s ease-in-out infinite .4s"></div>' +
          '<div class="globe-dot" style="top:65%;left:70%;animation:dotPulse 2.3s ease-in-out infinite .8s"></div>' +
          '<div class="globe-dot" style="top:74%;left:32%;animation:dotPulse 3.1s ease-in-out infinite .2s"></div>' +
          '<div class="globe-dot" style="top:45%;left:52%;animation:dotPulse 2.5s ease-in-out infinite 1s"></div>' +
          '<div class="globe-dot" style="top:28%;left:35%;animation:dotPulse 1.9s ease-in-out infinite .6s"></div>' +
          '<div class="globe-core"></div>' +
          '<div class="globe-beam"></div>' +
          '<svg class="globe-svg" viewBox="0 0 130 130" xmlns="http://www.w3.org/2000/svg">' +
            '<line x1="44" y1="36" x2="81" y2="29" stroke="rgba(0,255,231,0.2)"  stroke-width="0.5" stroke-dasharray="3,3"><animate attributeName="stroke-dashoffset" values="0;-6" dur="1.2s" repeatCount="indefinite"/></line>' +
            '<line x1="81" y1="29" x2="68" y2="59" stroke="rgba(0,136,255,0.2)"  stroke-width="0.5" stroke-dasharray="3,3"><animate attributeName="stroke-dashoffset" values="0;-6" dur="1.5s" repeatCount="indefinite"/></line>' +
            '<line x1="68" y1="59" x2="23" y2="52" stroke="rgba(0,255,231,0.2)"  stroke-width="0.5" stroke-dasharray="3,3"><animate attributeName="stroke-dashoffset" values="0;-6" dur="1s"   repeatCount="indefinite"/></line>' +
            '<line x1="68" y1="59" x2="91" y2="85" stroke="rgba(123,47,255,0.2)" stroke-width="0.5" stroke-dasharray="3,3"><animate attributeName="stroke-dashoffset" values="0;-6" dur="1.7s" repeatCount="indefinite"/></line>' +
            '<line x1="68" y1="59" x2="42" y2="96" stroke="rgba(0,255,231,0.2)"  stroke-width="0.5" stroke-dasharray="3,3"><animate attributeName="stroke-dashoffset" values="0;-6" dur="1.3s" repeatCount="indefinite"/></line>' +
            '<line x1="91" y1="85" x2="42" y2="96" stroke="rgba(0,136,255,0.15)" stroke-width="0.5" stroke-dasharray="3,3"><animate attributeName="stroke-dashoffset" values="0;-6" dur="2s"   repeatCount="indefinite"/></line>' +
          '</svg>'
      );
    }

    // globeHTML: envolve globeInnerHTML na div de projeção
    function globeHTML() {
      return '<div class="globe-projection">' + globeInnerHTML() + '</div>';
    }

    // ── Renderizar NEXUS (fixo, centro) ──
    function renderNexus() {
      var card = document.createElement('a');
      card.className = 'trama-card nexus-card';
      card.href = 'trama.html';
      card.style.transform = 'translate3d(0px,0px,0px)';
      card.innerHTML =
        '<div class="trama-float" style="animation:cardFloat 6s ease-in-out infinite">' +
          '<div class="globe-wrap">' + globeHTML() + '</div>' +
          '<div class="trama-name">nexus</div>' +
        '</div>';
      card.addEventListener('click', function(e) { if (moved) e.preventDefault(); });
      world.appendChild(card);
    }

    // ── Renderizar trama do usuário ──
    function renderCard(t, idx) {
      var dur  = ((3.5 + (idx * 0.31) % 2) * 1.2).toFixed(1);
      var del  = ((idx * 0.67) % 4).toFixed(1);
      var kb   = getTramaKB(t.id);
      var size = getGlobeSize(kb);
      var proj = Math.round(size * 0.81);

      var card = document.createElement('div');
      card.className = 'trama-card draggable';
      card.dataset.idx = idx;
      card.dataset.tid = t.id;
      card.style.transform = 'translate3d(' + t.x + 'px,' + t.y + 'px,' + t.z + 'px)';
      card.innerHTML =
        '<div class="trama-float" style="animation:cardFloat ' + dur + 's ease-in-out infinite ' + del + 's">' +
          '<div class="globe-wrap" style="width:' + size + 'px;height:' + size + 'px">' +
            '<div class="globe-projection" style="width:' + proj + 'px;height:' + proj + 'px">' +
              globeInnerHTML() +
            '</div>' +
          '</div>' +
          '<div class="trama-name">' + (t.name || 'Trama') + '</div>' +
        '</div>';

      var delBtn = document.createElement('button');
      delBtn.className = 'trama-delete';
      delBtn.title = 'Deletar trama';
      delBtn.textContent = '✕';
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteTrama(t.id, card);
      });
      card.appendChild(delBtn);
      world.appendChild(card);
      return card;
    }

    // ── Init ──
    renderNexus();
    tramas.forEach(function(t, i) { renderCard(t, i); });

    // ── Modal ──
    document.getElementById('newTramaBtn').addEventListener('click', function() {
      modal.classList.add('open');
    });
    modal.addEventListener('click', function(e) {
      if (e.target === modal) modal.classList.remove('open');
    });

    document.getElementById('btnSim').addEventListener('click',    criarTrama);
    document.getElementById('btnNaoSei').addEventListener('click', criarTrama);

    document.getElementById('btnNao').addEventListener('click', function() {
      modal.classList.remove('open');
      localStorage.setItem('ma_trama_lock', Date.now() + 60000);
      window.location.href = 'index.html';
    });

    function criarTrama() {
      modal.classList.remove('open');
      var pos = findValidPos();
      var id  = 'trama_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
      var t   = { id: id, name: 'Trama', x: pos.x, y: pos.y, z: pos.z };
      tramas.push(t);
      saveTramas();
      window.location.href = 'trama.html?id=' + id;
    }
  </script>

</body>
</html>
