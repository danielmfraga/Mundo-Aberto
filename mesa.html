<!DOCTYPE html>
<html lang="pt-BR"><head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mesa · Mundo Aberto</title>
<meta name="description" content="Mesa virtual · Mundo Aberto">

<style>
:root {
  --bg-0:#04070d; --bg-1:#070c16; --bg-2:#0b1320;
  --line:rgba(120,200,220,0.10); --line-strong:rgba(120,200,220,0.20);
  --fg:#cfe9f0; --fg-dim:rgba(207,233,240,0.55); --fg-faint:rgba(207,233,240,0.32);
  --holo:#4ed3e8; --holo-soft:rgba(78,211,232,0.55); --accent:#ff7a3d; --danger:#ff5566;
  --fome:#e0473a; --desp:#ff9d3d;
  --font-display:'Space Grotesk',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body {
  background:var(--bg-0); color:var(--fg); font-family:var(--font-display);
  min-height:100vh; -webkit-font-smoothing:antialiased;
}
body {
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(78,211,232,0.04), transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(255,122,61,0.03), transparent 60%),
    linear-gradient(rgba(120,200,220,0.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,200,220,0.022) 1px, transparent 1px);
  background-size:auto, auto, 56px 56px, 56px 56px; background-attachment:fixed;
}

/* ── Top bar ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 22px; border-bottom:1px solid var(--line-strong);
  position:relative;
}
.topbar::after { content:''; position:absolute; bottom:-1px; left:0; width:80px; height:1px; background:var(--holo); box-shadow:0 0 6px var(--holo-soft); }
.back-link {
  display:flex; align-items:center; gap:7px; font-family:var(--font-mono); font-size:10px;
  letter-spacing:0.25em; color:var(--fg-faint); text-decoration:none; text-transform:uppercase;
  transition:color 0.2s;
}
.back-link:hover { color:var(--fg); }
.brand { font-family:var(--font-mono); font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:var(--holo); cursor:pointer; transition:color .2s; }
.brand:hover { color:var(--fg); }
.brand[contenteditable="true"] { outline:none; border-bottom:1px solid rgba(78,211,232,0.5); color:var(--fg); }
.who { display:flex; align-items:center; gap:10px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; color:var(--fg-dim); }
.conn-dot { width:7px; height:7px; border-radius:50%; background:var(--danger); box-shadow:0 0 6px var(--danger); transition:all .3s; }
.conn-dot.on { background:#3ddc84; box-shadow:0 0 6px #3ddc84; }
.who-name { color:var(--holo); cursor:pointer; }
.who-name:hover { text-decoration:underline; }

/* ── Grid ── */
.mesa-grid {
  display:grid; grid-template-columns:1fr 340px; gap:14px;
  padding:14px 18px 22px; height:calc(100vh - 56px);
  transition:grid-template-columns .32s ease, gap .32s ease;
}
.mesa-grid.rail-collapsed { grid-template-columns:1fr 0; gap:0; }
@media (max-width:920px) { .mesa-grid { grid-template-columns:1fr; height:auto; } }

.panel {
  background:rgba(11,19,32,0.45); border:1px solid var(--line);
  border-radius:6px; position:relative; display:flex; flex-direction:column; min-height:0;
}
.panel-head {
  display:flex; align-items:center; gap:9px; padding:11px 14px;
  border-bottom:1px solid var(--line); flex:0 0 auto;
}
.panel-head .led { width:6px; height:6px; border-radius:50%; background:var(--holo); box-shadow:0 0 7px var(--holo); }
.panel-title { font-family:var(--font-mono); font-size:10px; letter-spacing:0.28em; text-transform:uppercase; color:var(--fg-dim); }
/* Blindagem da transcrição: indicador de status + alarme */
.trx-badge { margin-left:auto; display:flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:var(--fg-faint); transition:color .3s; }
.trx-badge .trx-dot { width:7px; height:7px; border-radius:50%; background:var(--fg-faint); transition:all .3s; }
.trx-badge.trx-on { color:#3ddc84; }
.trx-badge.trx-on .trx-dot { background:#3ddc84; box-shadow:0 0 7px #3ddc84; }
.trx-badge.trx-down { color:var(--danger); }
.trx-badge.trx-down .trx-dot { background:var(--danger); box-shadow:0 0 9px var(--danger); }
.trx-banner {
  position:fixed; top:0; left:0; right:0; z-index:9999; display:none;
  text-align:center; padding:10px; background:var(--danger); color:#fff;
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; font-weight:600;
  box-shadow:0 2px 18px rgba(255,85,102,.65); animation:trxBlink 1.1s steps(2) infinite;
}
.trx-banner.show { display:block; }
@keyframes trxBlink { 50% { opacity:.5; } }
/* Aba lateral: recolhe o rail inteiro pro canto (amplia a câmera) */
/* overflow-x:hidden corta na horizontal (pro colapso); overflow-y:auto deixa
   rolar até o chat quando a coluna é mais alta que a tela. */
.rail { overflow-x:hidden; overflow-y:auto; min-width:0; }
.rail-toggle {
  position:fixed; top:50%; right:354px; transform:translateY(-50%); z-index:500;  /* na divisa câmera/painéis */
  width:24px; height:72px; background:rgba(11,19,32,0.92);
  border:1px solid rgba(255,157,61,0.65); border-radius:6px 0 0 6px;
  color:#ff9d3d; text-shadow:0 0 8px rgba(255,157,61,0.85);
  box-shadow:0 0 12px rgba(255,157,61,0.3);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:700;
  transition:right .32s ease, background .15s, box-shadow .15s;
}
.rail-toggle.at-edge { right:0; }   /* recolhido: desliza pro canto direito */
.rail-toggle:hover { background:#0b1320; box-shadow:0 0 20px rgba(255,157,61,0.65); }
@media (max-width:920px) { .rail-toggle { display:none; } }

/* ── Video ── */
.video-panel { overflow:hidden; }
#jitsi { flex:1; min-height:360px; background:#000; border-radius:0 0 6px 6px; }
@media (max-width:920px) { #jitsi { height:54vh; } }

/* ── Right rail ── */
.rail { display:flex; flex-direction:column; gap:14px; min-height:0; }
@media (max-width:920px) { .rail { height:auto; } }
.rail > .panel { background:rgba(11,19,32,0.92); border-color:rgba(78,211,232,0.28); }

/* ── Dice ── */
.dice-panel { flex:0 0 auto; }
.dice-body { padding:12px 8px; }
.dice-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
.die-tile {
  border:1px solid var(--line); border-radius:6px; padding:6px 7px 5px;
  background:rgba(78,211,232,0.03); transition:border-color .15s, background .15s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.die-row { display:flex; align-items:center; justify-content:center; gap:10px; }
.die-tile.has { border-color:var(--holo-soft); background:rgba(78,211,232,0.07); }
.die-tile.fome.has { border-color:rgba(224,71,58,0.6); background:rgba(224,71,58,0.08); }
.die-tile.desp.has { border-color:rgba(255,157,61,0.6); background:rgba(255,157,61,0.08); }
.die-tile.d10.has { border-color:rgba(207,233,240,0.5); background:rgba(207,233,240,0.06); }
.die-pick {
  width:32px; height:32px; flex:0 0 auto; cursor:pointer; color:var(--holo);
  transition:transform .1s; user-select:none;
}
.die-pick:hover { transform:scale(1.12); }
.die-pick:active { transform:scale(0.93); }
.die-pick svg { width:100%; height:100%; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5)); display:block; }
.die-tile.d10 .die-pick { color:#cdd6df; }
.die-tile.fome .die-pick { color:var(--fome); }
.die-tile.desp .die-pick { color:var(--desp); }
.die-name { font-family:var(--font-mono); font-size:8.5px; letter-spacing:0.03em; color:var(--fg-dim); text-transform:uppercase; line-height:1.25; text-align:center; }
.die-tile.fome .die-name { color:var(--fome); }
.die-tile.desp .die-name { color:var(--desp); }
.die-qty {
  width:40px; flex:0 0 auto; text-align:center; background:rgba(0,0,0,0.28); border:1px solid var(--line);
  border-radius:4px; color:var(--fg); font-family:var(--font-mono); font-size:13px; font-weight:600;
  padding:3px 0; outline:none;
}
.die-qty:focus { border-color:var(--holo-soft); }
.dice-actions { display:flex; gap:8px; margin-top:11px; }
.btn {
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
  padding:9px 14px; border-radius:3px; cursor:pointer; transition:all .16s; border:1px solid;
}
.btn-roll { flex:1; background:rgba(78,211,232,0.10); border-color:var(--holo-soft); color:var(--holo); }
.btn-roll:hover { background:rgba(78,211,232,0.18); border-color:var(--holo); box-shadow:0 0 14px rgba(78,211,232,0.3); }
.btn-clear { background:rgba(255,157,61,0.08); border-color:rgba(255,157,61,0.45); color:var(--desp); }
.btn-clear:hover { background:rgba(255,157,61,0.16); border-color:var(--desp); box-shadow:0 0 12px rgba(255,157,61,0.3); }

/* ── Toggle Dados 3D ── */
.toggle3d { margin-left:auto; display:flex; align-items:center; gap:7px; cursor:pointer; user-select:none; }
.toggle3d > span:first-child { font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-faint); transition:color .18s; }
.toggle3d .sw { width:30px; height:16px; border-radius:9px; background:rgba(255,255,255,0.08); border:1px solid var(--line); position:relative; transition:all .18s; }
.toggle3d .sw::after { content:''; position:absolute; top:1px; left:1px; width:12px; height:12px; border-radius:50%; background:var(--fg-faint); transition:all .18s; }
.toggle3d.on .sw { background:rgba(78,211,232,0.25); border-color:var(--holo-soft); }
.toggle3d.on .sw::after { left:15px; background:var(--holo); box-shadow:0 0 6px var(--holo); }
.toggle3d.on > span:first-child { color:var(--holo); }

/* ── Canvas dos dados 3D (dice-box) ── */
/* visibility (não display) p/ o WebGL inicializar com tamanho correto */
#dice3d { position:fixed; inset:0; z-index:8500; pointer-events:none; visibility:hidden; }
#dice3d.show { visibility:visible; }
#dice3d canvas { width:100% !important; height:100% !important; }

/* ── Roll log ── */
.rolllog { border-top:1px solid var(--line); padding:10px 13px; max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:9px; }
.rolllog:empty { display:none; }
.roll-entry { animation:popin .25s ease; }
@keyframes popin { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
.roll-meta { display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; color:var(--fg-faint); margin-bottom:5px; }
.roll-meta .who-b { color:var(--holo); }
.roll-dice { display:flex; flex-wrap:wrap; gap:4px; align-items:center; }
.chip {
  min-width:24px; height:24px; padding:0 5px; border-radius:4px; display:inline-flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:12px; font-weight:500;
  background:rgba(78,211,232,0.10); border:1px solid var(--holo-soft); color:var(--holo);
}
.chip.d10 { background:rgba(20,22,28,0.9); border-color:#52585f; color:#e8edf2; }
.chip.fome { background:var(--fome); border-color:var(--fome); color:#fff; box-shadow:0 0 7px rgba(224,71,58,0.5); }
.chip.desp { background:var(--desp); border-color:var(--desp); color:#1a1206; box-shadow:0 0 7px rgba(255,157,61,0.45); }
.chip.coin { min-width:auto; padding:0 9px; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; }
.roll-sum { font-family:var(--font-mono); font-size:10px; color:var(--fg-dim); margin-left:6px; }
.grp-sep { width:1px; align-self:stretch; background:var(--line); margin:0 2px; }

/* ── Animação de rolagem (silhuetas dos dados girando + freando) ── */
.roll-anim-ov {
  position:fixed; inset:0; z-index:9000; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; pointer-events:none;
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.58), rgba(0,0,0,0.24) 55%, transparent);
  animation:ovfade .2s ease;
}
@keyframes ovfade { from { opacity:0; } to { opacity:1; } }
.roll-anim-label {
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.3em; text-transform:uppercase;
  color:var(--holo); text-shadow:0 0 14px rgba(78,211,232,0.5);
}
.roll-anim-label b { color:#fff; }
.roll-anim-dice { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; max-width:82vw; }
.die-anim {
  width:56px; height:56px; position:relative; color:var(--holo);
  animation:spin2d 3s cubic-bezier(.12,.62,.2,1) forwards;
}
.die-anim.d10  { color:#cdd6df; }
.die-anim.fome { color:var(--fome); }
.die-anim.desp { color:var(--desp); }
.die-anim svg { position:absolute; inset:0; width:100%; height:100%; filter:drop-shadow(0 3px 4px rgba(0,0,0,0.55)) drop-shadow(0 0 5px currentColor); }
.die-anim .die-num {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:18px; font-weight:700; color:#f3fbff;
  text-shadow:0 1px 2px rgba(0,0,0,0.85), 0 0 7px rgba(0,0,0,0.6);
}
.die-anim.landed { animation:landpop .42s ease-out forwards; }
.die-anim.landed svg { filter:drop-shadow(0 3px 5px rgba(0,0,0,0.6)) drop-shadow(0 0 14px currentColor); }
.die-anim.landed .die-num { color:#fff; font-size:20px; }
@keyframes spin2d { from { transform:rotate(0deg); } to { transform:rotate(var(--spin,1080deg)); } }
@keyframes landpop { 0% { transform:rotate(0) scale(1); } 35% { transform:rotate(0) scale(1.16); } 100% { transform:rotate(0) scale(1); } }

/* Moeda: dourada, vira de canto (flip) em vez de girar flat */
.die-anim.coin { color:#f0c869; animation:coinflip 3s cubic-bezier(.12,.62,.2,1) forwards; }
.die-anim.coin .die-num { font-size:13px; font-weight:700; }
.die-anim.coin.landed { animation:coinland .42s ease-out forwards; }
.die-anim.coin.landed .die-num { font-size:14px; }
@keyframes coinflip { from { transform:rotateX(0); } to { transform:rotateX(var(--spin,1440deg)); } }
@keyframes coinland { 0% { transform:rotateX(0) scale(1); } 35% { transform:rotateX(0) scale(1.16); } 100% { transform:rotateX(0) scale(1); } }

/* ── Quadro branco ── */
.wb-btn {
  width:100%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; gap:8px;
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--holo); background:rgba(78,211,232,0.08); border:1px solid var(--holo-soft);
  border-radius:6px; padding:12px; cursor:pointer; transition:all .15s;
}
.wb-btn:hover { background:rgba(78,211,232,0.16); box-shadow:0 0 14px rgba(78,211,232,0.3); }
.wb-overlay { position:fixed; inset:0; z-index:9990; background:rgba(0,0,0,0.82); display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:18px; }
.wb-overlay.show { display:flex; }
.wb-toolbar { display:flex; align-items:center; gap:9px; background:#0b1320; border:1px solid var(--line-strong); border-radius:8px; padding:9px 14px; }
.wb-tool { width:26px; height:26px; cursor:pointer; padding:0; transition:transform .1s, border-color .15s, box-shadow .15s; }
.wb-color { border-radius:50%; border:2px solid rgba(255,255,255,0.18); display:inline-block; }
.wb-color.active { border-color:#fff; transform:scale(1.15); box-shadow:0 0 10px rgba(255,255,255,0.5); }
.wb-icon { background:rgba(255,255,255,0.06); border:1px solid var(--line); color:var(--fg-dim); display:flex; align-items:center; justify-content:center; font-size:13px; border-radius:5px; }
.wb-icon:hover { color:var(--fg); border-color:var(--holo-soft); }
.wb-icon.active { color:var(--holo); border-color:var(--holo); box-shadow:0 0 8px rgba(78,211,232,0.3); }
.wb-close-btn { margin-left:8px; color:var(--danger); border-color:rgba(255,85,102,0.4); }
.wb-close-btn:hover { color:#fff; background:var(--danger); border-color:var(--danger); }
#wbCanvas { background:#fff; border-radius:8px; max-width:92vw; max-height:78vh; box-shadow:0 0 40px rgba(0,0,0,0.6); cursor:crosshair; touch-action:none; }

/* ── Quadro + caras dos jogadores (vídeo flutua sobre o quadro) ──
   O #jitsi NUNCA é reparentado (só muda CSS) pra não reconectar a chamada. */
body.wb-on .video-panel {
  position:fixed; z-index:9995; border:1px solid var(--holo-soft);
  border-radius:8px; overflow:hidden; box-shadow:0 0 24px rgba(0,0,0,0.6), 0 0 14px rgba(78,211,232,0.18);
  transition:top .28s ease, left .28s ease, right .28s ease, bottom .28s ease, width .28s ease, height .28s ease;
}
body.wb-on .video-panel .panel-head { display:none; }      /* mais área pras caras */
body.wb-on .video-panel #jitsi { min-height:0; border-radius:8px; }

/* layout: tira no topo */
body.wb-on.wb-top   .video-panel { top:10px; left:10px; right:10px; bottom:auto; width:auto; height:132px; }
body.wb-top   .wb-overlay { padding:150px 18px 18px; }
body.wb-top   #wbCanvas { max-width:92vw; max-height:calc(100vh - 224px); }

/* layout: lado a lado (vídeo à esquerda) */
body.wb-on.wb-split .video-panel { top:10px; left:10px; right:auto; bottom:10px; width:46vw; height:auto; }
body.wb-split .wb-overlay { padding:18px 18px 18px calc(46vw + 28px); }
body.wb-split #wbCanvas { max-width:calc(54vw - 46px); max-height:82vh; }

/* layout: coluna à direita */
body.wb-on.wb-right .video-panel { top:10px; right:10px; left:auto; bottom:10px; width:252px; height:auto; }
body.wb-right .wb-overlay { padding:18px calc(252px + 28px) 18px 18px; }
body.wb-right #wbCanvas { max-width:calc(100vw - 300px); max-height:82vh; }

/* botões de layout na barra do quadro */
.wb-sep { width:1px; height:18px; background:var(--line-strong); margin:0 2px; flex:0 0 auto; }
@media (max-width:920px) {
  /* no mobile o grid empilha; mantém o quadro cheio e o vídeo como tira no topo */
  body.wb-on.wb-split .video-panel, body.wb-on.wb-right .video-panel { top:10px; left:10px; right:10px; bottom:auto; width:auto; height:120px; }
  body.wb-split .wb-overlay, body.wb-right .wb-overlay { padding:140px 12px 12px; }
  body.wb-split #wbCanvas, body.wb-right #wbCanvas { max-width:94vw; max-height:calc(100vh - 168px); }
}

/* ── Personagens ── */
.chars-panel { flex:0 0 auto; }
.chars-body { display:flex; flex-wrap:wrap; gap:9px; padding:10px 12px; }
.char-chip { position:relative; width:48px; text-align:center; }
.char-chip .av {
  width:42px; height:42px; border-radius:50%; border:1px solid var(--holo-soft);
  object-fit:cover; background:rgba(78,211,232,0.06); display:block; margin:0 auto;
  cursor:pointer; transition:box-shadow .15s, border-color .15s;
}
.char-chip:hover .av { box-shadow:0 0 11px rgba(78,211,232,0.45); border-color:var(--holo); }
.char-chip .av.placeholder { display:flex; align-items:center; justify-content:center; color:var(--holo); font-size:18px; }
.char-chip .nm { font-family:var(--font-mono); font-size:8px; letter-spacing:0.02em; color:var(--fg-dim); margin-top:3px; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
.char-x {
  position:absolute; top:-3px; right:0; width:16px; height:16px; border-radius:50%;
  background:rgba(4,8,16,0.92); border:1px solid var(--danger); color:var(--danger);
  font-size:10px; line-height:1; display:flex; align-items:center; justify-content:center;
  cursor:pointer; opacity:0; transition:opacity .15s;
}
.char-chip:hover .char-x { opacity:1; }
.char-add {
  width:42px; height:42px; border-radius:50%; border:1px dashed var(--holo-soft);
  color:var(--holo); display:flex; align-items:center; justify-content:center;
  font-size:22px; cursor:pointer; transition:all .15s; margin:0 auto;
}
.char-add:hover { background:rgba(78,211,232,0.08); box-shadow:0 0 11px rgba(78,211,232,0.35); }
/* Modal de seleção */

  // ── Dados 3D (dice-box-threejs) — experimental, com fallback p/ CSS ──
  // crypto decide o resultado; aqui a física só ENCENA cair nos valores.
  var roll3D = localStorage.getItem('mesa3d') === '1';
  var _diceBox = null, _diceBoxLoading = null;
  var dice3dEl = document.getElementById('dice3d');
  var toggle3dEl = document.getElementById('toggle3d');

  function updateToggle3d() { toggle3dEl.classList.toggle('on', roll3D); }
  toggle3dEl.addEventListener('click', function() {
    roll3D = !roll3D;
    localStorage.setItem('mesa3d', roll3D ? '1' : '0');
    updateToggle3d();
    if (roll3D) ensureDiceBox().catch(function(){ /* avisa só ao rolar */ });
  });
  updateToggle3d();

  function ensureDiceBox() {
    if (_diceBox) return Promise.resolve(_diceBox);
    if (_diceBoxLoading) return _diceBoxLoading;
    dice3dEl.classList.add('show');   // precisa ter tamanho antes de inicializar o WebGL
    _diceBoxLoading = import('https://esm.sh/@3d-dice/dice-box-threejs')
      .then(function(mod) {
        var DiceBox = mod.default || mod.DiceBox || mod;
        // Config mínima comprovada nesta versão (0.0.12). Opções de tema em
        // string (theme_surface:'none' etc.) quebram o construtor — evitar.
        // Mantida no físico padrão: queda bonita. Tentativas de acelerar a
        // queda (gravidade alta) deixam a rolagem feia e mal encurtam as ondas
        // — não compensa. Ondas sequenciais são o limite desta lib.
        var box = new DiceBox('#dice3d', { sounds: false });
        var ready = (typeof box.initialize === 'function') ? box.initialize()
                  : (typeof box.init === 'function') ? box.init() : null;
        return Promise.resolve(ready).then(function(){ _diceBox = box; return box; });
      })
      .catch(function(err) { console.warn('[mesa] dice-box falhou ao carregar/iniciar:', err); _diceBoxLoading = null; dice3dEl.classList.remove('show'); throw err; });
    return _diceBoxLoading;
  }

  // Cor de cada tipo de dado (colorset custom; texture:'none' = sem assets).
  // makeColorSet cacheia por 'name' estável, então a cor é criada uma vez só.
  function colorObjFor(cls) {
    switch (cls) {
      case 'fome': return { name:'mesaFome',  foreground:'#ffffff', background:'#e0473a', outline:'#7a120c', texture:'none', material:'plastic' };
      case 'desp': return { name:'mesaDesp',  foreground:'#241405', background:'#ff9d3d', outline:'#7a4a10', texture:'none', material:'plastic' };
      case 'd10':  return { name:'mesaPreto', foreground:'#f0f3f7', background:'#16161b', outline:'#000000', texture:'none', material:'plastic' };
      default:     return { name:'mesaStd',   foreground:'#06242c', background:'#bfe6ef', outline:'#5a8a93', texture:'none', material:'plastic' };
    }
  }

  // Rola em 3D agrupando por cor: 1º grupo via roll(), demais via add() →
  // mistura cores na mesma cena (ex: pretos + desespero). updateConfig É async
  // e precisa de await pra cor pegar antes de cada grupo spawnar.
  async function playRoll3D(p, onDone) {
    var byColor = {}, order = [];
    p.groups.forEach(function(g) {
      if (g.kind === 'coin') return;   // moeda não entra no 3D
      var sides = parseInt((g.label.match(/(\d+)/) || [])[1], 10) || 6;
      var key = g.cls || 'std';
      if (!byColor[key]) { byColor[key] = []; order.push(key); }
      byColor[key].push(g.faces.length + 'd' + sides + '@' + g.faces.join(','));
    });
    if (!order.length) return playRollAnim(p, onDone);   // só moeda → CSS

    var settled = false, timer = null;
    function toCss() {
      if (settled) return; settled = true;
      console.warn('[mesa] 3D indisponível nesta rolagem — usando animação CSS.');
      clearTimeout(timer); dice3dEl.classList.remove('show');
      playRollAnim(p, onDone);
    }
    function finish() {
      if (settled) return; settled = true;
      clearTimeout(timer);
      renderRoll(p);
      setTimeout(function(){ dice3dEl.classList.remove('show'); onDone(); }, 1400);
    }

    try {
      var box = await ensureDiceBox();
      dice3dEl.classList.add('show');
      timer = setTimeout(function(){ if (!settled) toCss(); }, 16000);   // trava de segurança
      // add() SÓ funciona depois que o grupo anterior PAROU (chamar durante a
      // queda quebra a lib). Então espera cada grupo (await). A "gravidade alta"
      // na config faz cada grupo parar rápido, deixando as ondas bem curtas.
      for (var i = 0; i < order.length; i++) {
        var notation = byColor[order[i]].join('+');
        await box.updateConfig({ theme_customColorset: colorObjFor(order[i]) });
        if (i === 0) await box.roll(notation);
        else await box.add(notation);
      }
      finish();
    } catch (e) { console.warn('[mesa] erro no 3D:', e); toCss(); }
  }

  // Silhueta volumétrica de cada tipo de dado (viewBox 100x100):
  // camada de profundidade (atrás) + gradiente de luz + facetas + brilho.
  var _gid = 0;
  function shapeSVG(sides) {
    var id = 'sg' + (++_gid);
    var grad = '<defs><linearGradient id="' + id + '" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0" stop-color="currentColor" stop-opacity="0.38"/>' +
      '<stop offset="1" stop-color="currentColor" stop-opacity="0.04"/></linearGradient></defs>';

    if (sides === 0) { // cara/coroa
      return '<svg viewBox="0 0 100 100">' + grad +
        '<circle cx="50" cy="55" r="44" fill="#000" fill-opacity="0.45"/>' +
        '<circle cx="50" cy="50" r="44" fill="url(#' + id + ')" stroke="currentColor" stroke-width="2.5"/>' +
        '<circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.35"/>' +
        '<path d="M24 38 A40 40 0 0 1 68 16" fill="none" stroke="#fff" stroke-opacity="0.32" stroke-width="1.5" stroke-linecap="round"/>' +
        '</svg>';
    }
    if (sides === 6) {
      return '<svg viewBox="0 0 100 100">' + grad +
        '<rect x="14" y="19" width="72" height="72" rx="9" fill="#000" fill-opacity="0.45"/>' +
        '<rect x="14" y="14" width="72" height="72" rx="9" fill="url(#' + id + ')" stroke="currentColor" stroke-width="2.5"/>' +
        '<line x1="24" y1="20" x2="76" y2="20" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>' +
        '</svg>';
    }

    var pts, facets = '', hl;
    switch (sides) {
      case 3:
      case 4:
        pts = '50,10 90,84 10,84';
        facets = '<line x1="50" y1="10" x2="50" y2="84" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>' +
                 '<line x1="50" y1="84" x2="30" y2="47" stroke="currentColor" stroke-width="1" opacity="0.28"/>' +
                 '<line x1="50" y1="84" x2="70" y2="47" stroke="currentColor" stroke-width="1" opacity="0.28"/>';
        hl = '28,72 50,12'; break;
      case 8:
        pts = '50,8 90,50 50,92 10,50';
        facets = '<line x1="10" y1="50" x2="90" y2="50" stroke="currentColor" stroke-width="1.3" opacity="0.45"/>' +
                 '<line x1="50" y1="8" x2="50" y2="92" stroke="currentColor" stroke-width="1" opacity="0.26"/>';
        hl = '16,46 50,10'; break;
      case 10:
      case 100:
        pts = '50,5 80,40 50,95 20,40';
        facets = '<line x1="20" y1="40" x2="80" y2="40" stroke="currentColor" stroke-width="1.3" opacity="0.42"/>' +
                 '<line x1="50" y1="5" x2="50" y2="40" stroke="currentColor" stroke-width="1" opacity="0.3"/>' +
                 '<line x1="20" y1="40" x2="50" y2="62" stroke="currentColor" stroke-width="1" opacity="0.24"/>' +
                 '<line x1="80" y1="40" x2="50" y2="62" stroke="currentColor" stroke-width="1" opacity="0.24"/>';
        hl = '24,38 50,9'; break;
      case 12:
        pts = '50,8 89,37 74,86 26,86 11,37';
        facets = '<polygon points="50,30 68,44 61,66 39,66 32,44" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.32"/>' +
                 '<line x1="50" y1="8" x2="50" y2="30" stroke="currentColor" stroke-width="1" opacity="0.26"/>';
        hl = '16,38 50,11'; break;
      case 20:
        pts = '50,6 89,28 89,72 50,94 11,72 11,28';
        facets = '<polygon points="50,22 76,38 66,68 34,68 24,38" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.34"/>' +
                 '<line x1="50" y1="6" x2="50" y2="22" stroke="currentColor" stroke-width="1" opacity="0.26"/>' +
                 '<line x1="11" y1="28" x2="24" y2="38" stroke="currentColor" stroke-width="1" opacity="0.22"/>' +
                 '<line x1="89" y1="28" x2="76" y2="38" stroke="currentColor" stroke-width="1" opacity="0.22"/>' +
                 '<line x1="11" y1="72" x2="34" y2="68" stroke="currentColor" stroke-width="1" opacity="0.22"/>' +
                 '<line x1="89" y1="72" x2="66" y2="68" stroke="currentColor" stroke-width="1" opacity="0.22"/>' +
                 '<line x1="50" y1="94" x2="50" y2="68" stroke="currentColor" stroke-width="1" opacity="0.22"/>';
        hl = '18,30 50,8'; break;
      default:
        pts = '50,8 89,37 74,86 26,86 11,37'; hl = '16,38 50,11';
    }
    return '<svg viewBox="0 0 100 100">' + grad +
      '<g transform="translate(0,5)"><polygon points="' + pts + '" fill="#000" fill-opacity="0.45"/></g>' +
      '<polygon points="' + pts + '" fill="url(#' + id + ')" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>' +
      facets +
      '<polyline points="' + hl + '" fill="none" stroke="#fff" stroke-opacity="0.32" stroke-width="1.5" stroke-linecap="round"/>' +
      '</svg>';
  }

  function playRollAnim(p, onDone) {
    var DURATION = 3000, SPINS = [720, 1080, 1440];
    var dice = [];
    p.groups.forEach(function(g) {
      var sides = (g.kind === 'coin') ? 0 : (parseInt((g.label.match(/(\d+)/) || [])[1], 10) || 6);
      g.faces.forEach(function(f){ dice.push({ cls:g.cls, kind:g.kind, sides:sides, final:f }); });
    });
    var shown = dice.slice(0, 12);
    var total = dice.length;

    var ov = document.createElement('div');
    ov.className = 'roll-anim-ov';
    ov.innerHTML = '<div class="roll-anim-label"><b>' + esc(p.autor||'?') + '</b> rolando ' + total + ' dado' + (total>1?'s':'') + '…</div>';
    var tray = document.createElement('div');
    tray.className = 'roll-anim-dice';
    shown.forEach(function(c) {
      var d = document.createElement('div');
      d.className = 'die-anim ' + (c.cls || 'std') + (c.kind === 'coin' ? ' coin' : '');
      d.style.setProperty('--spin', SPINS[Math.floor(Math.random()*SPINS.length)] + 'deg');
      d.innerHTML = shapeSVG(c.sides) + '<div class="die-num">?</div>';
      tray.appendChild(d);
    });
    ov.appendChild(tray);
    document.body.appendChild(ov);

    function rnd(c){ return c.kind==='coin' ? (Math.random()<0.5?'CA':'CO') : (1 + Math.floor(Math.random()*(c.sides||6))); }
    function finalText(c){ return c.kind==='coin' ? (c.final==='Cara'?'CA':'CO') : c.final; }
    function setNums(fn) {
      for (var i=0;i<tray.children.length;i++) {
        var num = tray.children[i].querySelector('.die-num');
        if (num) num.textContent = fn(shown[i]);
      }
    }

    var startT = Date.now();
    function tick() {
      var t = (Date.now() - startT) / DURATION;
      if (t >= 1) { settle(); return; }
      setNums(rnd);
      setTimeout(tick, 45 + 430 * (t*t));   // troca de número desacelera: ~45ms → ~475ms
    }
    function settle() {
      setNums(finalText);                                   // trava no valor real
      for (var i=0;i<tray.children.length;i++) tray.children[i].classList.add('landed');
      setTimeout(function() {
        renderRoll(p);                                      // resultado por escrito
        ov.style.animation = 'ovfade .3s ease reverse';
        setTimeout(function(){ ov.remove(); onDone(); }, 300);
      }, 600);
    }
    tick();
  }

  // ── Lightbox: duplo clique numa imagem do chat → abre com zoom ─────
  var imgLightbox = document.getElementById('imgLightbox');
  var imgLbImg = document.getElementById('imgLbImg');
  var lbScale = 1, lbX = 0, lbY = 0, lbDragging = false, lbStart = null;
  function lbApply() { imgLbImg.style.transform = 'translate(' + lbX + 'px,' + lbY + 'px) scale(' + lbScale + ')'; }
  function lbReset() { lbScale = 1; lbX = 0; lbY = 0; lbApply(); }
  function openLightbox(src) { imgLbImg.src = src; lbReset(); imgLightbox.classList.add('show'); }
  function closeLightbox() { imgLightbox.classList.remove('show'); imgLbImg.src = ''; }

  chatMsgs.addEventListener('click', function(e) {
    var img = e.target.closest('.msg-img');
    if (img && img.src) { e.preventDefault(); openLightbox(img.src); }
  });
  document.getElementById('imgLbClose').addEventListener('click', closeLightbox);
  imgLightbox.addEventListener('click', function(e){ if (e.target === imgLightbox) closeLightbox(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape' && imgLightbox.classList.contains('show')) closeLightbox(); });
  imgLbImg.addEventListener('wheel', function(e){
    e.preventDefault();
    lbScale = Math.min(6, Math.max(1, lbScale * (e.deltaY < 0 ? 1.15 : 1/1.15)));
    if (lbScale === 1) { lbX = 0; lbY = 0; }
    lbApply();
  }, { passive:false });
  imgLbImg.addEventListener('pointerdown', function(e){
    if (lbScale <= 1) return;
    lbDragging = true; lbStart = { x:e.clientX - lbX, y:e.clientY - lbY };
    imgLbImg.classList.add('grabbing'); try { imgLbImg.setPointerCapture(e.pointerId); } catch (_) {}
  });
  imgLbImg.addEventListener('pointermove', function(e){ if (!lbDragging) return; lbX = e.clientX - lbStart.x; lbY = e.clientY - lbStart.y; lbApply(); });
  function lbEnd(){ lbDragging = false; imgLbImg.classList.remove('grabbing'); }
  imgLbImg.addEventListener('pointerup', lbEnd);
  imgLbImg.addEventListener('pointercancel', lbEnd);
  imgLbImg.addEventListener('dblclick', lbReset);

  function sendChat() {
    var t = chatInput.value.trim();

    send('chat', { autor:nome, ts:Date.now(), text:t });

      method:'POST',
      headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY, 'Content-Type':file.type, 'x-upsert':'true' },
      body:file
    }).then(function(r){
      if (!r.ok) throw new Error('upload '+r.status);

          it.innerHTML = '<div class="ti-nm">'+esc(r.name||'Trama')+'</div>';
          it.addEventListener('click', function() {
            tramasSessao.push({ id:r.trama_id, name:r.name||'Trama' });
            saveTramasSessao(); renderTramas();
            tramaPicker.classList.remove('show');
          });
          tramaPickList.appendChild(it);
        });
      }).catch(function() {
        tramaPickList.innerHTML = '<div style="text-align:center;color:var(--danger);font-family:var(--font-mono);font-size:11px;padding:14px;">Erro ao carregar tramas.</div>';
      });
  }

  function openTramaViewer(t) {
    tramaViewerTitle.textContent = t.name;
    tramaFrame.src = 'trama.html?id=' + encodeURIComponent(t.id);
    tramaViewer.classList.add('show');
  }
  function closeTramaViewer() { tramaViewer.classList.remove('show'); tramaFrame.src = ''; }

  document.getElementById('tramaAddBtn').addEventListener('click', openTramaPicker);
  tramaPicker.addEventListener('click', function(e){ if (e.target === tramaPicker) tramaPicker.classList.remove('show'); });

  document.getElementById('tramaViewerClose').addEventListener('click', closeTramaViewer);
  tramaViewer.addEventListener('click', function(e){ if (e.target === tramaViewer) closeTramaViewer(); });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && tramaViewer.classList.contains('show')) closeTramaViewer();
  });

  loadTramasSessao(); renderTramas();

  // ── Quadro branco (compartilhado) ─────────────────────────────────
  var wbOverlay = document.getElementById('wbOverlay');
  var wbCanvas = document.getElementById('wbCanvas');
  var wbCtx = wbCanvas.getContext('2d');
  var WB_W = 1280, WB_H = 720;
  var wbColor = '#111111', wbErase = false, wbDrawing = false, wbLast = null;

  function wbClearLocal() { wbCtx.fillStyle = '#ffffff'; wbCtx.fillRect(0, 0, WB_W, WB_H); }
  wbClearLocal();   // fundo branco inicial

  function wbDrawSeg(s) {
    if (!s) return;
    wbCtx.strokeStyle = s.erase ? '#ffffff' : (s.color || '#111');
    wbCtx.lineWidth = s.erase ? 28 : 3;
    wbCtx.lineCap = 'round'; wbCtx.lineJoin = 'round';
    wbCtx.beginPath();
    wbCtx.moveTo(s.x0 * WB_W, s.y0 * WB_H);
    wbCtx.lineTo(s.x1 * WB_W, s.y1 * WB_H);
    wbCtx.stroke();
  }
  function wbPoint(e) {
    var r = wbCanvas.getBoundingClientRect();
    return { x:(e.clientX - r.left) / r.width, y:(e.clientY - r.top) / r.height };
  }
  wbCanvas.addEventListener('pointerdown', function(e){ wbDrawing = true; wbLast = wbPoint(e); try { wbCanvas.setPointerCapture(e.pointerId); } catch (_) {} });
  wbCanvas.addEventListener('pointermove', function(e){
    if (!wbDrawing) return;
    var p = wbPoint(e);
    var seg = { x0:wbLast.x, y0:wbLast.y, x1:p.x, y1:p.y, color:wbColor, erase:wbErase };
    wbDrawSeg(seg); send('wb-draw', seg); wbLast = p;
  });
  function wbEnd(){ wbDrawing = false; }
  wbCanvas.addEventListener('pointerup', wbEnd);
  wbCanvas.addEventListener('pointercancel', wbEnd);

  document.querySelectorAll('.wb-color').forEach(function(sw){
    sw.addEventListener('click', function(){
      wbColor = sw.dataset.color; wbErase = false;
      document.querySelectorAll('.wb-color').forEach(function(t){ t.classList.remove('active'); });
      document.getElementById('wbEraser').classList.remove('active');
      sw.classList.add('active');
    });
  });
  document.getElementById('wbEraser').addEventListener('click', function(){
    wbErase = true;
    document.querySelectorAll('.wb-color').forEach(function(t){ t.classList.remove('active'); });
    this.classList.add('active');
  });
  document.getElementById('wbClear').addEventListener('click', function(){ wbClearLocal(); send('wb-clear', {}); });
  document.getElementById('wbClose').addEventListener('click', function(){ closeWhiteboardView(); send('wb-close', {}); });
  document.getElementById('wbBtn').addEventListener('click', function(){ openWhiteboardView(); send('wb-open', {}); });

  // ── Layout do quadro: caras dos jogadores junto do quadro (individual) ──
  // O quadro continua compartilhado (wb-open/wb-close por broadcast), mas ONDE
  // cada um vê as caras é preferência local, salva por jogador.
  var WB_LAYOUT_KEY = 'mesaWbLayout';
  var wbLayout = localStorage.getItem(WB_LAYOUT_KEY) || 'top';
  if (['top','split','right'].indexOf(wbLayout) < 0) wbLayout = 'top';

  function wbIsOpen() { return wbOverlay.classList.contains('show'); }
  function jitsiTile(on) { if (jitsiApi) { try { jitsiApi.executeCommand('setTileView', !!on); } catch (_) {} } }

  function applyWbLayout(l) {
    if (['top','split','right'].indexOf(l) < 0) l = 'top';
    wbLayout = l;
    localStorage.setItem(WB_LAYOUT_KEY, l);
    document.body.classList.remove('wb-top','wb-split','wb-right');
    document.body.classList.add('wb-' + l);
    document.querySelectorAll('.wb-layout-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.layout === l);
    });
  }
  function openWhiteboardView() {
    wbOverlay.classList.add('show');
    document.body.classList.add('wb-on');
    applyWbLayout(wbLayout);
    jitsiTile(true);   // mostra todas as caras na grade
  }
  function closeWhiteboardView() {
    wbOverlay.classList.remove('show');
    document.body.classList.remove('wb-on','wb-top','wb-split','wb-right');
    jitsiTile(false);  // volta o vídeo ao normal
  }
  document.querySelectorAll('.wb-layout-btn').forEach(function(b){
    b.addEventListener('click', function(){ applyWbLayout(b.dataset.layout); });
  });

  // ── Realtime (Supabase broadcast) ─────────────────────────────────
  var channel = null;
  var jitsiApi = null;
  function send(event, payload) {
    if (channel) channel.send({ type:'broadcast', event:event, payload:payload });
    else dispatch(event, payload);   // offline: mostra local
  }
  function dispatch(event, payload) {
    if (event === 'roll') enqueueRoll(payload);
    else if (event === 'chat') renderChat(payload);
    else if (event === 'chars') applyChars(payload);
    else if (event === 'chars-req') { if (mesaChars.length) send('chars', mesaChars); }
    else if (event === 'wb-draw') wbDrawSeg(payload);
    else if (event === 'wb-clear') wbClearLocal();
    else if (event === 'wb-open') openWhiteboardView();
    else if (event === 'wb-close') closeWhiteboardView();
    else if (event === 'mesa-ctx') { applyContexto(payload.text); }
    else if (event === 'mesa-ctx-req') { var ctx = localStorage.getItem(CONTEXTO_KEY); if (ctx) send('mesa-ctx', { text:ctx }); }
  }
  function initRealtime() {
    if (!window.supabase || !window.supabase.createClient) return;
    var client = window.supabase.createClient(SB_URL, SB_KEY);
    channel = client.channel('mesa:' + SALA, { config:{ broadcast:{ self:true } } });
    channel.on('broadcast', { event:'roll' }, function(m){ dispatch('roll', m.payload); });
    channel.on('broadcast', { event:'chat' }, function(m){ dispatch('chat', m.payload); });
    channel.on('broadcast', { event:'chars' }, function(m){ dispatch('chars', m.payload); });
    channel.on('broadcast', { event:'chars-req' }, function(m){ dispatch('chars-req', m.payload); });
    ['wb-draw','wb-clear','wb-open','wb-close'].forEach(function(ev){
      channel.on('broadcast', { event:ev }, function(m){ dispatch(ev, m.payload); });
    });
    channel.on('broadcast', { event:'mesa-ctx' }, function(m){ dispatch('mesa-ctx', m.payload); });
    channel.on('broadcast', { event:'mesa-ctx-req' }, function(m){ dispatch('mesa-ctx-req', m.payload); });
    channel.subscribe(function(status){
      document.getElementById('connDot').classList.toggle('on', status === 'SUBSCRIBED');
      if (status === 'SUBSCRIBED') { send('chars-req', {}); send('mesa-ctx-req', {}); }
    });
  }

  // ── Jitsi ─────────────────────────────────────────────────────────
  function jitsiMsg(html) {
    var el = document.getElementById('jitsi');
    if (el) el.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:var(--fg-dim);line-height:1.9;">' + html + '</div>';
  }
  // ── Blindagem da transcrição: avisa se o transcritor cair ──────────
  // O Jitsi emite 'transcriptionChunkReceived' a cada pedaço transcrito.
  // É o "batimento": se parar de chegar com a transcrição ativa, o bot caiu.
  var _trxLastChunk = 0, _trxEverOn = false, _trxWatch = null;
  var TRX_TIMEOUT_MS = 90000; // 90s sem chunk (já tendo ligado) = caiu
  function _trxSet(state) { // 'off' | 'on' | 'down'
    var b = document.getElementById('trxBadge'); if (b) b.className = 'trx-badge trx-' + state;
    var lbl = document.getElementById('trxLabel');
    if (lbl) lbl.textContent = state === 'on' ? 'Transcrevendo' : (state === 'down' ? 'Transcrição caiu' : 'Transcrição off');
    var ban = document.getElementById('trxBanner'); if (ban) ban.classList.toggle('show', state === 'down');
  }
  function setupTrxWatchdog() {
    if (!jitsiApi) return;
    jitsiApi.addListener('transcriptionChunkReceived', function() {
      _trxLastChunk = Date.now(); _trxEverOn = true; _trxSet('on');
    });
    if (_trxWatch) return;
    _trxWatch = setInterval(function() {
      if (!_trxEverOn) return;                                   // nunca ligou → ignora
      if (Date.now() - _trxLastChunk > TRX_TIMEOUT_MS) _trxSet('down');
    }, 5000);
  }

  async function initJitsi() {
    if (!window.JitsiMeetExternalAPI) { jitsiMsg('Vídeo indisponível<br><span style="color:var(--fg-faint);font-size:10px;">API do JaaS não carregou</span>'); return; }
    try {
      var resp = await fetch('/api/jaas-token?name=' + encodeURIComponent(nome || 'Jogador'));
      var data = await resp.json();
      if (!resp.ok || !data.token) {
        jitsiMsg('Vídeo ainda não configurado<br><span style="color:var(--fg-faint);font-size:10px;">' + esc((data && data.error) || 'token não gerado') + '</span>');
        return;
      }
      jitsiApi = new window.JitsiMeetExternalAPI('8x8.vc', {
        roomName: JAAS_APP_ID + '/' + ROOM,
        jwt: data.token,
        parentNode: document.getElementById('jitsi'),
        width:'100%', height:'100%',
        configOverwrite: {
          prejoinPageEnabled:false, disableDeepLinking:true,
          transcription: { useAppLanguage:false, preferredLanguage:'pt-BR' }
        },
        interfaceConfigOverwrite: { MOBILE_APP_PROMO:false, SHOW_JITSI_WATERMARK:false, SHOW_WATERMARK_FOR_GUESTS:false }
      });
      setupTrxWatchdog();
      // se o quadro já estiver aberto quando o vídeo terminar de carregar, alinha o tile view
      if (wbIsOpen()) jitsiTile(true);
    } catch (e) {
      jitsiMsg('Vídeo indisponível<br><span style="color:var(--fg-faint);font-size:10px;">' + esc(String(e && e.message || e)) + '</span>');
    }
  }

  // ── Contexto da mesa (data/situação atual do jogo) ───────────────
  var CONTEXTO_KEY = 'mesaContexto_' + SALA;
  var DEFAULT_CONTEXTO = 'Mesa · Mundo Aberto';
  var mesaBrand = document.getElementById('mesaBrand');
  var _contextoAntes = '';

  function applyContexto(text) {
    mesaBrand.textContent = text || DEFAULT_CONTEXTO;
    localStorage.setItem(CONTEXTO_KEY, mesaBrand.textContent);
  }
  (function loadContexto() {
    var v = localStorage.getItem(CONTEXTO_KEY);
    if (v) mesaBrand.textContent = v;
  })();

  mesaBrand.addEventListener('click', function() {
    if (mesaBrand.contentEditable === 'true') return;
    _contextoAntes = mesaBrand.textContent;
    mesaBrand.contentEditable = 'true';
    mesaBrand.focus();
    var range = document.createRange();
    range.selectNodeContents(mesaBrand);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
  mesaBrand.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); mesaBrand.blur(); }
    if (e.key === 'Escape') { mesaBrand.textContent = _contextoAntes; mesaBrand.blur(); }
  });
  mesaBrand.addEventListener('blur', function() {
    mesaBrand.contentEditable = 'false';
    var v = mesaBrand.textContent.trim() || DEFAULT_CONTEXTO;
    applyContexto(v);
    send('mesa-ctx', { text:v });
  });

  // ── Nome / boot ───────────────────────────────────────────────────
  var nameOv = document.getElementById('nameOv');
  var nameInput = document.getElementById('nameInput');
  function setName(n) {
    nome = n.trim().slice(0,32);
    if (!nome) return;
    localStorage.setItem('mesaNome', nome);
    document.getElementById('whoName').textContent = nome;
    nameOv.classList.add('hidden');
    if (!channel) { initRealtime(); initJitsi(); }
  }
  document.getElementById('nameBtn').addEventListener('click', function(){ setName(nameInput.value); });
  nameInput.addEventListener('keydown', function(e){ if (e.key==='Enter') setName(nameInput.value); });
  document.getElementById('whoName').addEventListener('click', function(){
    nameInput.value = nome; nameOv.classList.remove('hidden'); nameInput.focus();
  });

  // Aba lateral: recolhe a coluna de painéis pro canto (amplia a câmera).
  var railToggle = document.getElementById('railToggle');
  var mesaGrid = document.querySelector('.mesa-grid');
  railToggle.addEventListener('click', function() {
    var collapsed = mesaGrid.classList.toggle('rail-collapsed');
    railToggle.classList.toggle('at-edge', collapsed);          // desliza pro canto quando recolhe
    railToggle.innerHTML = collapsed ? '&#8249;' : '&#8250;';   // ‹ abrir  /  › esconder
    railToggle.title = collapsed ? 'Mostrar painéis' : 'Esconder painéis (ampliar câmera)';
  });

  renderTray();
  renderChars();
  if (nome) { document.getElementById('whoName').textContent = nome; nameOv.classList.add('hidden'); initRealtime(); initJitsi(); }
  else { nameInput.focus(); }
})();
</script>
</body></html>
