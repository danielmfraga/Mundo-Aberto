<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trama · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --holo2:  #0088ff;
      --orange: #ff6b1a;
      --dark:   #040810;
      --dark2:  #080f1e;
      --line:   rgba(0,255,231,0.12);
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa;
      --danger: #ff4466;
    }

    body {
      background: var(--dark);
      color: var(--holo);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Corners */
    .corner { position: fixed; width: 32px; height: 32px; pointer-events: none; z-index: 1000; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--orange); box-shadow: var(--glow-o); }
    .corner::before { width: 100%; height: 1px; top: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; }
    .corner-tl { top: 16px; left: 16px; }
    .corner-tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .corner-bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .corner-br { bottom: 16px; right: 16px; transform: scale(-1); }

    /* Toolbar */
    #toolbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 4px;
      padding: 8px 14px;
      z-index: 500;
      backdrop-filter: blur(8px);
    }

    .tb-btn {
      background: transparent;
      border: 1px solid rgba(0,255,231,0.2);
      color: rgba(0,255,231,0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tb-btn:hover { color: var(--holo); border-color: var(--holo); box-shadow: 0 0 10px rgba(0,255,231,0.2); }
    .tb-btn.active { color: #00ffe7; border-color: #00ffe7; background: rgba(0,255,231,0.08); box-shadow: 0 0 12px rgba(0,255,231,0.3); }
    .tb-btn.danger { border-color: rgba(255,68,102,0.3); color: rgba(255,68,102,0.6); }
    .tb-btn.danger:hover { color: var(--danger); border-color: var(--danger); box-shadow: 0 0 10px rgba(255,68,102,0.2); }
    .tb-sep { width: 1px; height: 20px; background: rgba(0,255,231,0.1); }

    /* Back button */
    #back-btn {
      position: fixed;
      top: 20px;
      left: 56px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.3);
      text-decoration: none;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 500;
      transition: color 0.2s;
    }
    #back-btn:hover { color: rgba(0,255,231,0.7); }

    /* Canvas wrapper */
    #viewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    #world {
      position: absolute;
      width: 4000px;
      height: 3000px;
      top: 0;
      left: 0;
      transform-origin: 0 0;
    }

    /* SVG connections */
    #svg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      filter: drop-shadow(0 0 3px rgba(0,255,231,0.25));
    }

    /* Nodes */
    .node {
      position: absolute;
      min-width: 160px;
      max-width: 160px;
      background: rgba(4,8,16,0.95);
      border: 1px solid rgba(0,255,231,0.25);
      border-radius: 8px;
      cursor: grab;
      z-index: 10;
      transition: border-color 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    .node:hover { border-color: rgba(0,255,231,0.5); }
    .node.selected { border-color: var(--holo); box-shadow: var(--glow); }
    .node.connect-src { border-color: #1D9E75; box-shadow: 0 0 12px rgba(29,158,117,0.4); }

    .node-header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-bottom: 1px solid rgba(0,255,231,0.08);
      position: relative;
      min-height: 48px;
    }

    .node-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--holo);
      box-shadow: 0 0 6px var(--holo);
      flex-shrink: 0;
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    .node-title {
      flex: 1;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--holo);
      outline: none;
      border: none;
      background: transparent;
      cursor: text;
      min-width: 60px;
      max-width: 110px;
      line-height: 1.4;
      text-align: center;
      flex: none;
      word-break: break-word;
      white-space: normal;
    }
    .node-title:empty::before {
      content: attr(data-ph);
      color: rgba(0,255,231,0.25);
    }

    .node-actions {
      position: absolute;
      top: -10px;
      right: -6px;
      display: flex;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 30;
    }
    .node:hover .node-actions { opacity: 1; }

    .node-act-btn {
      background: rgba(4,8,16,0.95);
      border: 1px solid rgba(0,255,231,0.2);
      color: rgba(0,255,231,0.5);
      cursor: pointer;
      font-size: 11px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      border-radius: 50%;
      transition: all 0.15s;
    }
    .node-act-btn:hover { color: var(--holo); border-color: var(--holo); }
    .node-act-btn.del:hover { color: var(--danger); border-color: var(--danger); }

    .node-body {
      display: none;
    }

    .node-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,255,231,0.3);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .node-note-preview {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      color: rgba(207,233,240,0.4);
      line-height: 1.4;
      max-height: 36px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .node-note-preview:empty { display: none; }

    /* Anchors */
    .anchor {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--dark);
      border: 1.5px solid rgba(0,255,231,0.3);
      border-radius: 50%;
      cursor: crosshair;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .node:hover .anchor, .node.selected .anchor { opacity: 1; }
    .anchor:hover { background: var(--holo); border-color: var(--holo); }
    .anchor[data-pos=top]    { top: -5px;  left: 50%; transform: translateX(-50%); }
    .anchor[data-pos=bottom] { bottom: -5px; left: 50%; transform: translateX(-50%); }
    .anchor[data-pos=left]   { left: -5px;  top: 50%; transform: translateY(-50%); }
    .anchor[data-pos=right]  { right: -5px; top: 50%; transform: translateY(-50%); }

    /* Connection labels */
    .conn-label-wrap {
      position: absolute;
      z-index: 15;
      pointer-events: all;
    }
    .conn-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(0,255,231,0.5);
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(0,255,231,0.15);
      border-radius: 2px;
      padding: 2px 6px;
      outline: none;
      text-transform: uppercase;
      cursor: text;
      min-width: 16px;
      text-align: center;
      white-space: nowrap;
    }
    .conn-label:empty::before { content: 'label'; color: rgba(0,255,231,0.2); }
    .conn-del {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(4,8,16,0.9);
      border: 1px solid rgba(255,68,102,0.3);
      color: rgba(255,68,102,0.5);
      font-size: 9px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .conn-label-wrap:hover .conn-del { display: flex; }
    .conn-del:hover { color: var(--danger); border-color: var(--danger); }

    /* Modal */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,8,16,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    #modal-box {
      background: rgba(4,8,16,0.98);
      border: 1px solid rgba(0,255,231,0.25);
      border-radius: 4px;
      padding: 24px;
      width: 380px;
      max-width: 90vw;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    #modal-name {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--holo);
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(0,255,231,0.4);
    }

    #modal-note {
      width: 100%;
      min-height: 140px;
      background: rgba(0,255,231,0.03);
      border: 1px solid rgba(0,255,231,0.15);
      border-radius: 2px;
      padding: 10px 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(207,233,240,0.8);
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }
    #modal-note:focus { border-color: rgba(0,255,231,0.3); }
    #modal-note::placeholder { color: rgba(207,233,240,0.2); }

    .modal-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-btn {
      flex: 1;
      background: transparent;
      border: 1px solid rgba(0,255,231,0.2);
      color: rgba(0,255,231,0.6);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }
    .modal-btn:hover { color: var(--holo); border-color: var(--holo); }
    .modal-btn.save { border-color: rgba(0,255,231,0.4); color: var(--holo); }
    .modal-btn.save:hover { background: rgba(0,255,231,0.08); box-shadow: 0 0 10px rgba(0,255,231,0.2); }

    /* Status */
    #status {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,255,231,0.3);
      z-index: 500;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    /* Minimap */
    #minimap {
      position: fixed;
      bottom: 24px;
      left: 56px;
      width: 120px;
      height: 80px;
      background: rgba(4,8,16,0.8);
      border: 1px solid rgba(0,255,231,0.1);
      border-radius: 2px;
      z-index: 500;
      overflow: hidden;
    }
    #minimap-viewport {
      position: absolute;
      border: 1px solid rgba(0,255,231,0.4);
      background: rgba(0,255,231,0.05);
      pointer-events: none;
    }
    .minimap-node {
      position: absolute;
      width: 4px;
      height: 3px;
      background: rgba(0,255,231,0.5);
      border-radius: 1px;
    }

    /* Hint */
    #hint {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,255,231,0.18);
      z-index: 500;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #conn-menu {
      position: fixed;
      background: rgba(4,8,16,0.97);
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 6px;
      padding: 8px;
      z-index: 2000;
      display: none;
      flex-direction: column;
      gap: 4px;
      min-width: 120px;
      box-shadow: 0 0 20px rgba(0,255,231,0.1);
    }
    #conn-menu.open { display: flex; }
    .cmitem { display:flex; align-items:center; gap:8px; padding:5px 8px; cursor:pointer; border-radius:4px; transition:background 0.15s; }
    .cmitem:hover { background: rgba(0,255,231,0.06); }
    .cmdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .cmlabel { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(207,233,240,0.6); }
  </style>
</head>
<body>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <a href="index.html" id="back-btn">← Voltar</a>

  <div id="toolbar">
    <button class="tb-btn" id="btn-save">↑ Salvar trama</button>
  </div>

  <div id="viewport">
    <div id="world">
      <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00cc66"/></marker>
          <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff4466"/></marker>
          <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ffcc00"/></marker>
          <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff6b1a"/></marker>
          <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="rgba(0,255,231,0.4)"/>
          </marker>
          <marker id="arr-hover" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="rgba(0,255,231,0.8)"/>
          </marker>
        </defs>
      </svg>
    </div>
  </div>

  <!-- Modal notas -->
  <div id="modal-overlay">
    <div id="modal-box">
      <div class="modal-label">Arquivo · NPC</div>
      <div id="modal-name">—</div>
      <textarea id="modal-note" placeholder="Histórico, motivações, segredos..."></textarea>
      <div class="modal-row">
        <button class="modal-btn" id="modal-cancel">Cancelar</button>
        <button class="modal-btn save" id="modal-save">Salvar notas</button>
      </div>
    </div>
  </div>

  <div id="conn-menu">
    <div class="cmitem" data-color="#00ffe7"><div class="cmdot" style="background:#00ffe7;box-shadow:0 0 4px #00ffe7"></div><span class="cmlabel">Neutro</span></div>
    <div class="cmitem" data-color="#00cc66"><div class="cmdot" style="background:#00cc66;box-shadow:0 0 4px #00cc66"></div><span class="cmlabel">Aliado</span></div>
    <div class="cmitem" data-color="#ff4466"><div class="cmdot" style="background:#ff4466;box-shadow:0 0 4px #ff4466"></div><span class="cmlabel">Inimigo</span></div>
    <div class="cmitem" data-color="#ffcc00"><div class="cmdot" style="background:#ffcc00;box-shadow:0 0 4px #ffcc00"></div><span class="cmlabel">Suspeito</span></div>
    <div class="cmitem" data-color="#ff6b1a"><div class="cmdot" style="background:#ff6b1a;box-shadow:0 0 4px #ff6b1a"></div><span class="cmlabel">Parente</span></div>
  </div>
  <div id="minimap">
    <div id="minimap-viewport"></div>
  </div>

  <div id="hint">Duplo clique no mapa para criar NPC · Arraste pelos nós · Puxe pelas âncoras para conectar</div>
  <div id="status">Pronto</div>

  <script>
    const SUPABASE_URL = 'https://mxyqqfsyybluavwlrhsa.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXFxZnN5eWJsdWF2d2xyaHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTM4MzEsImV4cCI6MjA5MzY2OTgzMX0.b0Ij7UGzbMLpqZjLYxoPEu2kGwEW52U_2NSDtpMGUPM';
    const TRAMA_ID = window.location.search ? (new URLSearchParams(window.location.search)).get('id') || 'default' : 'default';

    function sbFetch(path, method, body) {
      return fetch(SUPABASE_URL + path, {
        method: method || 'GET',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined
      }).then(function(r) {
        if (r.status === 204 || r.headers.get('content-length') === '0') return {};
        return r.json().catch(function() { return {}; });
      });
    }

    const viewport = document.getElementById('viewport');
    const world    = document.getElementById('world');
    const svgLayer = document.getElementById('svg-layer');
    const status   = document.getElementById('status');

    let nodes = {};
    let connections = [];
    let nodeCount = 0;
    let connCount = 0;
    let selectedNode = null;
    let connectMode = false;
    let connectSource = null;
    let dragging = null;
    let dragOffset = { x: 0, y: 0 };
    let panning = false;
    let panStart = { x: 0, y: 0 };
    let panOffset = { x: 0, y: 0 };
    let scale = 1;
    let currentNoteNodeId = null;
    let dragConn = null;
    let ghostLine = null;

    function setStatus(msg, ok) {
      status.textContent = msg;
      status.style.color = ok === false ? 'rgba(255,68,102,0.6)' : ok === true ? 'rgba(0,255,231,0.6)' : 'rgba(0,255,231,0.3)';
    }

    // ── Pan & Zoom ──
    function applyTransform() {
      world.style.transform = `translate(${panOffset.x}px, ${panOffset.y}px) scale(${scale})`;
      updateMinimap();
    }

    viewport.addEventListener('wheel', function(e) {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      const newScale = Math.min(2, Math.max(0.3, scale * delta));
      const rect = viewport.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      panOffset.x = mx - (mx - panOffset.x) * (newScale / scale);
      panOffset.y = my - (my - panOffset.y) * (newScale / scale);
      scale = newScale;
      applyTransform();
    }, { passive: false });

    viewport.addEventListener('mousedown', function(e) {
      if (e.target === viewport || e.target === world || e.target === svgLayer) {
        if (connectSource) {
          if (nodes[connectSource.id]) nodes[connectSource.id].classList.remove('connect-src');
          connectSource = null;
          return;
        }
        panning = true;
        panStart = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
        viewport.style.cursor = 'grabbing';
      }
    });

    document.addEventListener('mousemove', function(e) {
      if (panning) {
        panOffset.x = e.clientX - panStart.x;
        panOffset.y = e.clientY - panStart.y;
        applyTransform();
      }
      if (dragging) {
        const rect = viewport.getBoundingClientRect();
        const wx = (e.clientX - rect.left - panOffset.x) / scale;
        const wy = (e.clientY - rect.top  - panOffset.y) / scale;
        dragging.style.left = Math.max(0, wx - dragOffset.x) + 'px';
        dragging.style.top  = Math.max(0, wy - dragOffset.y) + 'px';
        updateConnections();
      }
      if (dragConn) {
        const rect = viewport.getBoundingClientRect();
        const mx = (e.clientX - rect.left - panOffset.x) / scale;
        const my = (e.clientY - rect.top  - panOffset.y) / scale;
        const srcNode = nodes[dragConn.id];
        if (!srcNode) return;
        const p1 = getAnchorPos(srcNode, dragConn.pos);
        if (ghostLine) ghostLine.remove();
        ghostLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const ddx = Math.abs(mx - p1.x), ddy = Math.abs(my - p1.y);
        const gcx = p1.x + (dragConn.pos === 'right' ? ddx*0.5 : dragConn.pos === 'left' ? -ddx*0.5 : 0);
        const gcy = p1.y + (dragConn.pos === 'bottom' ? ddy*0.5 : dragConn.pos === 'top' ? -ddy*0.5 : 0);
        ghostLine.setAttribute('d', 'M'+p1.x+','+p1.y+' C'+gcx+','+gcy+' '+mx+','+my+' '+mx+','+my);
        ghostLine.setAttribute('fill', 'none');
        ghostLine.setAttribute('stroke', 'rgba(0,255,231,0.3)');
        ghostLine.setAttribute('stroke-width', '1');
        ghostLine.setAttribute('stroke-dasharray', '5,4');
        ghostLine.setAttribute('pointer-events', 'none');
        svgLayer.appendChild(ghostLine);
      }
    });

    document.addEventListener('mouseup', function() {
      panning = false;
      dragging = null;
      viewport.style.cursor = '';
      if (ghostLine) { ghostLine.remove(); ghostLine = null; }
      setTimeout(function() {
        if (dragConn) {
          if (nodes[dragConn.id]) nodes[dragConn.id].classList.remove('connect-src');
          dragConn = null;
          connectSource = null;
        }
      }, 30);
    });

    // ── Anchor positions ──
    function getAnchorPos(nodeEl, pos) {
      const x = parseFloat(nodeEl.style.left) || 0;
      const y = parseFloat(nodeEl.style.top) || 0;
      const w = nodeEl.offsetWidth;
      const h = nodeEl.offsetHeight;
      if (pos === 'top')    return { x: x + w/2, y: y };
      if (pos === 'bottom') return { x: x + w/2, y: y + h };
      if (pos === 'left')   return { x: x,       y: y + h/2 };
      if (pos === 'right')  return { x: x + w,   y: y + h/2 };
    }

    // ── Connections ──
    function updateConnections() {
      svgLayer.querySelectorAll('.conn-path').forEach(e => e.remove());
      connections.forEach(function(conn, connIdx) {
        const n1 = nodes[conn.from.id], n2 = nodes[conn.to.id];
        if (!n1 || !n2) return;
        var hasPair = connections.some(function(c2, i2) {
          return i2 !== connIdx && c2.from.id === conn.to.id && c2.to.id === conn.from.id;
        });
        var off = hasPair ? 4 : 0;
        const p1r = getAnchorPos(n1, conn.from.pos);
        const p2r = getAnchorPos(n2, conn.to.pos);
        var ang = Math.atan2(p2r.y - p1r.y, p2r.x - p1r.x);
        var p1 = off > 0 ? {x: p1r.x + Math.sin(ang)*off, y: p1r.y - Math.cos(ang)*off} : {x: p1r.x, y: p1r.y};
        var p2 = off > 0 ? {x: p2r.x + Math.sin(ang)*off, y: p2r.y - Math.cos(ang)*off} : {x: p2r.x, y: p2r.y};
        const dx = Math.abs(p2.x - p1.x), dy = Math.abs(p2.y - p1.y);
        const cx1 = p1.x + (conn.from.pos === 'right' ? dx*0.5 : conn.from.pos === 'left' ? -dx*0.5 : 0);
        const cy1 = p1.y + (conn.from.pos === 'bottom' ? dy*0.5 : conn.from.pos === 'top' ? -dy*0.5 : 0);
        const cx2 = p2.x + (conn.to.pos === 'left' ? -dx*0.5 : conn.to.pos === 'right' ? dx*0.5 : 0);
        const cy2 = p2.y + (conn.to.pos === 'top' ? -dy*0.5 : conn.to.pos === 'bottom' ? dy*0.5 : 0);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M${p1.x},${p1.y} C${cx1},${cy1} ${cx2},${cy2} ${p2.x},${p2.y}`);
        path.setAttribute('fill', 'none');
        var col = conn.color || '#00ffe7';
        var strokeCol = col === '#00ffe7' ? 'rgba(0,255,231,0.4)' : col;
        path.setAttribute('stroke', strokeCol);
        path.setAttribute('stroke-width', '1');
        var mm = {'#00cc66':'arr-green','#ff4466':'arr-red','#ffcc00':'arr-yellow','#ff6b1a':'arr-orange'};
        path.setAttribute('marker-end', 'url(#' + (mm[col] || 'arr') + ')');
        path.classList.add('conn-path');
        path.style.pointerEvents = 'none';
        svgLayer.appendChild(path);
        var hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hit.setAttribute('d', path.getAttribute('d'));
        hit.setAttribute('fill', 'none');
        hit.setAttribute('stroke', 'transparent');
        hit.setAttribute('stroke-width', '14');
        hit.classList.add('conn-path');
        hit.style.pointerEvents = 'visibleStroke';
        hit.style.cursor = 'context-menu';
        hit.addEventListener('contextmenu', function(e) {
          e.preventDefault(); e.stopPropagation();
          window._activeConn = conn;
          var m = document.getElementById('conn-menu');
          m.style.left = e.clientX + 'px'; m.style.top = e.clientY + 'px';
          m.classList.add('open');
        });
        svgLayer.appendChild(hit);
        if (conn.labelWrap) {
          const mx = (p1.x + p2.x) / 2;
          const my = (p1.y + p2.y) / 2;
          const lw = conn.labelWrap.offsetWidth;
          const lh = conn.labelWrap.offsetHeight;
          conn.labelWrap.style.left = (mx - lw/2) + 'px';
          conn.labelWrap.style.top  = (my - lh/2) + 'px';
        }
      });
      updateMinimap();
    }

    function addConnection(from, to, savedColor) {
      var wrap = document.createElement('div');
      wrap.className = 'conn-label-wrap';
      var del = document.createElement('div');
      del.className = 'conn-del';
      del.textContent = 'x';
      wrap.appendChild(del);
      world.appendChild(wrap);
      var conn = { from: from, to: to, labelWrap: wrap, color: savedColor || '#00ffe7' };
      connections.push(conn);
      del.addEventListener('click', function(e) {
        e.stopPropagation();
        connections = connections.filter(function(c2) { return c2 !== conn; });
        wrap.remove();
        updateConnections();
      });
      wrap.addEventListener('contextmenu', function(e) {
        e.preventDefault(); e.stopPropagation();
        window._activeConn = conn;
        var m = document.getElementById('conn-menu');
        m.style.left = e.clientX + 'px'; m.style.top = e.clientY + 'px';
        m.classList.add('open');
      });
      setTimeout(updateConnections, 50);
    }

    // ── Nodes ──
    function createNode(x, y, data) {
      const id = data && data.id ? data.id : 'n' + (++nodeCount);
      if (data && data.id) nodeCount = Math.max(nodeCount, parseInt(id.replace('n','')) || nodeCount);

      const el = document.createElement('div');
      el.className = 'node';
      el.dataset.id = id;
      el.style.left = (data ? data.x : x) + 'px';
      el.style.top  = (data ? data.y : y) + 'px';
      if (data && data.note) el.dataset.note = data.note;

      const header = document.createElement('div');
      header.className = 'node-header';

      const dot = document.createElement('div');
      dot.className = 'node-dot';

      const title = document.createElement('div');
      title.className = 'node-title';
      title.contentEditable = true;
      title.spellcheck = false;
      title.dataset.ph = 'Nome...';
      title.textContent = (data && data.name) ? data.name : '';

      const acts = document.createElement('div');
      acts.className = 'node-actions';

      const noteBtn = document.createElement('button');
      noteBtn.className = 'node-act-btn';
      noteBtn.textContent = '✎';
      noteBtn.title = 'Notas';

      const delBtn = document.createElement('button');
      delBtn.className = 'node-act-btn del';
      delBtn.textContent = '×';
      delBtn.title = 'Apagar';

      acts.appendChild(noteBtn);
      acts.appendChild(delBtn);
      header.appendChild(dot);
      header.appendChild(title);
      header.appendChild(acts);

      const body = document.createElement('div');
      body.className = 'node-body';

      const preview = document.createElement('div');
      preview.className = 'node-note-preview';
      preview.textContent = (data && data.note) ? data.note.slice(0, 60) : '';
      body.appendChild(preview);
      el.appendChild(header);
      el.appendChild(body);

      ['top','bottom','left','right'].forEach(function(pos) {
        const a = document.createElement('div');
        a.className = 'anchor';
        a.dataset.pos = pos;
        a.addEventListener('mousedown', function(e) {
          e.stopPropagation();
          e.preventDefault();
          if (!connectSource) {
            connectSource = { id, pos };
            el.classList.add('connect-src');
            dragConn = { id, pos };
          } else if (connectSource.id !== id) {
            addConnection(connectSource, { id, pos });
            if (nodes[connectSource.id]) nodes[connectSource.id].classList.remove('connect-src');
            connectSource = null;
            dragConn = null;
          }
        });
        a.addEventListener('mouseup', function(e) {
          if (dragConn && dragConn.id !== id) {
            e.stopPropagation();
            addConnection(dragConn, { id, pos });
            if (nodes[dragConn.id]) nodes[dragConn.id].classList.remove('connect-src');
            connectSource = null;
            dragConn = null;
            if (ghostLine) { ghostLine.remove(); ghostLine = null; }
          }
        });
        el.appendChild(a);
      });

      el.addEventListener('mousedown', function(e) {
        if (e.target.classList.contains('anchor') || e.target === noteBtn || e.target === delBtn || e.target === title) return;
        e.stopPropagation();
        e.preventDefault();
        if (connectSource) {
          if (nodes[connectSource.id]) nodes[connectSource.id].classList.remove('connect-src');
          connectSource = null; dragConn = null;
          if (ghostLine) { ghostLine.remove(); ghostLine = null; }
          return;
        }
        dragging = el;
        panning = false;
        const rect = viewport.getBoundingClientRect();
        const wx = (e.clientX - rect.left - panOffset.x) / scale;
        const wy = (e.clientY - rect.top  - panOffset.y) / scale;
        dragOffset = {
          x: wx - parseFloat(el.style.left || 0),
          y: wy - parseFloat(el.style.top  || 0)
        };
        selectNode(id);
      });

      noteBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        openModal(id);
      });

      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteNode(id);
      });

      title.addEventListener('input', updateConnections);

      world.appendChild(el);
      nodes[id] = el;
      updateConnections();
      return id;
    }

    function deleteNode(id) {
      connections = connections.filter(function(c) {
        if (c.from.id === id || c.to.id === id) {
          if (c.labelWrap) c.labelWrap.remove();
          return false;
        }
        return true;
      });
      nodes[id].remove();
      delete nodes[id];
      if (selectedNode === id) selectedNode = null;
      updateConnections();
    }

    function selectNode(id) {
      if (selectedNode && nodes[selectedNode]) nodes[selectedNode].classList.remove('selected');
      selectedNode = id;
      if (id && nodes[id]) nodes[id].classList.add('selected');
    }

    // ── Modal ──
    function openModal(id) {
      currentNoteNodeId = id;
      const title = nodes[id].querySelector('.node-title').textContent || 'NPC';
      document.getElementById('modal-name').textContent = title;
      document.getElementById('modal-note').value = nodes[id].dataset.note || '';
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('modal-note').focus();
    }

    function closeModal(save) {
      if (save && currentNoteNodeId && nodes[currentNoteNodeId]) {
        const note = document.getElementById('modal-note').value;
        nodes[currentNoteNodeId].dataset.note = note;
        const prev = nodes[currentNoteNodeId].querySelector('.node-note-preview');
        if (prev) prev.textContent = note.slice(0, 60);
      }
      document.getElementById('modal-overlay').classList.remove('open');
      currentNoteNodeId = null;
    }

    document.getElementById('modal-save').addEventListener('click', function() { closeModal(true); });
    document.getElementById('modal-cancel').addEventListener('click', function() { closeModal(false); });
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal(false);
    });

    // ── Connect mode ──




    // ── Add NPC ──



    window._activeConn = null;
    document.getElementById('conn-menu').querySelectorAll('.cmitem').forEach(function(item) {
      item.addEventListener('click', function(e) {
        e.stopPropagation();
        if (window._activeConn) { window._activeConn.color = item.dataset.color; updateConnections(); }
        document.getElementById('conn-menu').classList.remove('open');
        window._activeConn = null;
      });
    });
    document.addEventListener('click', function() {
      document.getElementById('conn-menu').classList.remove('open');
    });

    // Double click on world to add
    viewport.addEventListener('dblclick', function(e) {
      if (e.target !== viewport && e.target !== world && !e.target.closest('#svg-layer')) return;
      const rect = viewport.getBoundingClientRect();
      const wx = (e.clientX - rect.left - panOffset.x) / scale;
      const wy = (e.clientY - rect.top  - panOffset.y) / scale;
      const id = createNode(wx - 70, wy - 20);
      selectNode(id);
      setTimeout(function() {
        const t = nodes[id].querySelector('.node-title');
        if (t) { t.focus(); }
      }, 50);
    });

    // ── Minimap ──
    function updateMinimap() {
      const mm = document.getElementById('minimap');
      const mv = document.getElementById('minimap-viewport');
      mm.querySelectorAll('.minimap-node').forEach(e => e.remove());
      const scaleX = mm.offsetWidth  / 4000;
      const scaleY = mm.offsetHeight / 3000;
      Object.values(nodes).forEach(function(el) {
        const dot = document.createElement('div');
        dot.className = 'minimap-node';
        dot.style.left = (parseFloat(el.style.left) * scaleX) + 'px';
        dot.style.top  = (parseFloat(el.style.top)  * scaleY) + 'px';
        mm.appendChild(dot);
      });
      const vw = viewport.offsetWidth  / scale * scaleX;
      const vh = viewport.offsetHeight / scale * scaleY;
      const vx = -panOffset.x / scale * scaleX;
      const vy = -panOffset.y / scale * scaleY;
      mv.style.width  = vw + 'px';
      mv.style.height = vh + 'px';
      mv.style.left   = Math.max(0, vx) + 'px';
      mv.style.top    = Math.max(0, vy) + 'px';
    }

    // ── Save / Load ──
    function serializeState() {
      const nodeData = Object.entries(nodes).map(function([id, el]) {
        return {
          id,
          x: parseFloat(el.style.left),
          y: parseFloat(el.style.top),
          name: el.querySelector('.node-title').textContent,
          note: el.dataset.note || ''
        };
      });
      const connData = connections.map(function(c) {
        return {
          from: c.from,
          to: c.to,
          color: c.color || '#00ffe7'
        };
      });
      return { nodes: nodeData, connections: connData };
    }

    function loadState(state) {
      Object.keys(nodes).forEach(deleteNode);
      connections.forEach(function(c) { if(c.labelWrap) c.labelWrap.remove(); });
      connections = [];
      svgLayer.querySelectorAll('.conn-path').forEach(e => e.remove());
      if (state.nodes) state.nodes.forEach(function(n) { createNode(0, 0, n); });
      if (state.connections) {
        state.connections.forEach(function(c) {
          if (nodes[c.from.id] && nodes[c.to.id]) {
            addConnection(c.from, c.to);
            const conn = connections[connections.length-1];
            if (conn && c.color) conn.color = c.color;
          }
        });
      }
      setTimeout(updateConnections, 100);
    }

    document.getElementById('btn-save').addEventListener('click', function() {
      setStatus('Salvando...');
      const state = serializeState();
      sbFetch('/rest/v1/tramas?trama_id=eq.' + TRAMA_ID + '&select=id', 'GET')
        .then(function(rows) {
          const entry = { trama_id: TRAMA_ID, data: state };
          return (rows && rows.length)
            ? sbFetch('/rest/v1/tramas?trama_id=eq.' + TRAMA_ID, 'PATCH', entry)
            : sbFetch('/rest/v1/tramas', 'POST', entry);
        })
        .then(function() { setStatus('Salvo ✓', true); setTimeout(function(){setStatus('Pronto');},2000); })
        .catch(function() { setStatus('Erro ao salvar', false); });
    });



    // ── Keyboard ──
    document.addEventListener('keydown', function(e) {
      if (document.getElementById('modal-overlay').classList.contains('open')) return;
      if (e.key === 'Escape') {
        if (connectSource) {
          if (nodes[connectSource.id]) nodes[connectSource.id].classList.remove('connect-src');
          connectSource = null;
          dragConn = null;
          if (ghostLine) { ghostLine.remove(); ghostLine = null; }
          return;
        }
        selectNode(null);
      }
      if ((e.key === 'Delete' || e.key === 'Backspace') && selectedNode && document.activeElement === document.body) {
        deleteNode(selectedNode);
      }
    });

    // ── Load on start ──
    setStatus('Carregando...');
    sbFetch('/rest/v1/tramas?trama_id=eq.' + TRAMA_ID + '&select=data', 'GET')
      .then(function(rows) {
        if (rows && rows.length && rows[0].data) {
          loadState(rows[0].data);
          setStatus('Trama carregada ✓', true);
        } else {
          setStatus('Nova trama');
        }
        setTimeout(function(){ setStatus('Pronto'); }, 2000);
      })
      .catch(function() { setStatus('Pronto'); });

    // Initial pan to center
    panOffset = { x: viewport.offsetWidth/2 - 500, y: viewport.offsetHeight/2 - 300 };
    applyTransform();
  </script>
</body>
</html>
