<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mestre · Mundo Aberto</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --holo:   #00ffe7;
      --orange: #ff6b1a;
      --dark:   #040810;
      --card:   #070d18;
      --line:   rgba(0,255,231,0.1);
      --glow:   0 0 10px #00ffe7aa, 0 0 30px #00ffe744;
      --glow-o: 0 0 10px #ff6b1aaa, 0 0 30px #ff6b1a44;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      overflow: hidden;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .mestre-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 44px;
      flex-shrink: 0;
      background: rgba(4,8,16,0.97);
      border-bottom: 1px solid rgba(255,107,26,0.35);
      z-index: 10;
    }
    .back-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.5);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-btn:hover { color: var(--holo); }
    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 6px;
      color: var(--orange);
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,107,26,0.5);
    }
    .header-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,107,26,0.55);
      text-transform: uppercase;
      min-width: 80px;
      text-align: right;
    }

    /* ── Grid de cards ── */
    .cards-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      gap: 1px;
      background: rgba(255,107,26,0.1);
      overflow: hidden;
      padding: 1px;
    }
    .cards-grid.count-1 { grid-template-columns: minmax(0, 500px); justify-content: center; background: var(--dark); }
    .cards-grid.count-2 { grid-template-columns: repeat(2, 1fr); }
    .cards-grid.count-4 { grid-template-columns: repeat(2, 1fr); }

    /* ── Card ── */
    .pj-card {
      background: var(--card);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      animation: cardIn 0.4s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Card Header ── */
    .card-head {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .card-head-link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px 10px 14px;
      flex: 1; min-width: 0;
      text-decoration: none; color: inherit;
      transition: background 0.2s;
    }
    .card-head-link:hover { background: rgba(0,255,231,0.04); }
    .card-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.3);
      object-fit: cover;
      flex-shrink: 0;
      filter: hue-rotate(180deg) saturate(1.4) brightness(0.9);
      mix-blend-mode: screen;
      background: rgba(0,255,231,0.05);
    }
    .card-avatar-placeholder {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,255,231,0.2);
      background: rgba(0,255,231,0.03);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      color: rgba(0,255,231,0.3);
    }
    .card-identity { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--holo);
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 8px rgba(0,255,231,0.4);
    }
    .card-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0,255,231,0.35);
      text-transform: uppercase;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .open-ficha-hint {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(0,255,231,0.4);
      border-left: 1px solid var(--line);
      padding: 0 10px;
      display: flex; align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
      text-decoration: none;
      transition: color 0.2s, background 0.2s, text-shadow 0.2s;
    }
    .open-ficha-hint:hover {
      color: var(--holo);
      background: rgba(0,255,231,0.04);
      text-shadow: 0 0 8px rgba(0,255,231,0.7);
    }
    .card-extract-btn {
      background: transparent;
      border: none;
      border-left: 1px solid var(--line);
      color: rgba(255,85,102,0.3);
      font-size: 13px; line-height: 1;
      padding: 0 10px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center;
      transition: color 0.2s, background 0.2s;
    }
    .card-extract-btn:hover { color: #ff5566; background: rgba(255,85,102,0.08); }

    /* ── Add card ── */
    .add-card {
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .add-card:hover { background: rgba(0,255,231,0.025); }
    .add-card-inner {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: none;
    }
    .add-plus {
      font-size: 30px; line-height: 1;
      color: rgba(0,255,231,0.15);
      font-family: 'Share Tech Mono', monospace;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .add-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 4px;
      color: rgba(0,255,231,0.15); text-transform: uppercase;
      transition: color 0.2s;
    }
    .add-card:hover .add-plus { color: rgba(0,255,231,0.5); text-shadow: 0 0 14px rgba(0,255,231,0.3); }
    .add-card:hover .add-label { color: rgba(0,255,231,0.4); }

    /* ── Picker modal ── */
    .picker-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
    }
    .picker-box {
      background: #040810; border: 1px solid rgba(0,255,231,0.2);
      border-radius: 4px; max-width: 300px; width: 90%;
      max-height: 60vh; display: flex; flex-direction: column;
      box-shadow: 0 0 40px rgba(0,255,231,0.06); overflow: hidden;
    }
    .picker-head {
      font-family: 'Share Tech Mono', monospace; font-size: 9px;
      letter-spacing: 4px; color: rgba(0,255,231,0.4);
      text-transform: uppercase; padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(0,255,231,0.08); flex-shrink: 0;
    }
    .picker-list { overflow-y: auto; flex: 1; }
    .picker-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; cursor: pointer;
      border-bottom: 1px solid rgba(0,255,231,0.04);
      transition: background 0.1s;
    }
    .picker-item:hover { background: rgba(0,255,231,0.05); }
    .picker-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.2); object-fit: cover; flex-shrink: 0;
      filter: hue-rotate(180deg) saturate(1.4) brightness(0.9); mix-blend-mode: screen;
      background: rgba(0,255,231,0.04);
    }
    .picker-name {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      letter-spacing: 1px; color: rgba(0,255,231,0.65); text-transform: uppercase;
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .picker-tag {
      font-family: 'Share Tech Mono', monospace; font-size: 7px; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,107,26,0.5);
      border: 1px solid rgba(255,107,26,0.25); border-radius: 2px;
      padding: 1px 4px; flex-shrink: 0; margin-left: 6px;
    }
    .picker-search {
      display: block; width: 100%; padding: 9px 16px;
      background: rgba(0,255,231,0.02); border: none;
      border-bottom: 1px solid rgba(0,255,231,0.08);
      color: rgba(0,255,231,0.7); font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 1px; outline: none;
    }
    .picker-search::placeholder { color: rgba(0,255,231,0.2); }
    .picker-search:focus { background: rgba(0,255,231,0.04); border-bottom-color: rgba(0,255,231,0.2); }
    .picker-cancel {
      padding: 10px 16px; font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px; color: rgba(207,233,240,0.25);
      text-transform: uppercase; cursor: pointer; text-align: center;
      border-top: 1px solid rgba(0,255,231,0.06); transition: color 0.15s; flex-shrink: 0;
    }
    .picker-cancel:hover { color: rgba(207,233,240,0.5); }

    /* ── Card Body ── */
    .card-body {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,255,231,0.15) transparent;
    }
    .card-body::-webkit-scrollbar { width: 3px; }
    .card-body::-webkit-scrollbar-thumb { background: rgba(0,255,231,0.15); border-radius: 3px; }

    /* ── Seção ── */
    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      color: rgba(255,107,26,0.6);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    /* ── Vitais ── */
    .vitals-block { display: flex; flex-direction: column; gap: 4px; }
    .vital-row { display: flex; align-items: center; gap: 8px; }
    .vital-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(0,255,231,0.4);
      text-transform: uppercase;
      width: 72px;
      flex-shrink: 0;
    }
    .vital-boxes { display: flex; gap: 2px; flex-wrap: wrap; }
    .vbox {
      width: 10px; height: 10px;
      border: 1px solid rgba(0,255,231,0.2);
      border-radius: 2px;
      background: rgba(0,255,231,0.03);
    }
    .vbox.marked   { background: var(--holo); border-color: var(--holo); box-shadow: 0 0 4px var(--holo); }
    .vbox.aggravated { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 4px var(--orange); }

    /* Desespero como número destacado */
    .desp-val {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--orange);
      text-shadow: var(--glow-o);
      line-height: 1;
    }
    .desp-zero { color: rgba(0,255,231,0.2); text-shadow: none; font-size: 14px; }

    /* ── Stats: 3 blocos lado a lado ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .stats-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .stats-block-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      letter-spacing: 3px;
      color: rgba(255,107,26,0.55);
      text-transform: uppercase;
      margin-bottom: 4px;
      padding-bottom: 3px;
      border-bottom: 1px solid rgba(255,107,26,0.15);
    }
    .dot-row { display: flex; align-items: center; gap: 4px; min-width: 0; }
    .dot-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.5px;
      color: rgba(0,255,231,0.45);
      text-transform: uppercase;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .dot-name.cosmo { color: rgba(123,47,255,0.7); }
    .dots-row { display: flex; gap: 2px; flex-wrap: nowrap; flex-shrink: 0; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      border: 1px solid rgba(0,255,231,0.2);
      background: rgba(0,255,231,0.03);
      flex-shrink: 0;
    }
    .dot.filled { background: var(--holo); border-color: var(--holo); box-shadow: 0 0 3px rgba(0,255,231,0.6); }
    .dot.cosmo-dot { border-color: rgba(123,47,255,0.35); }
    .dot.cosmo-dot.filled { background: #7b2fff; border-color: #7b2fff; box-shadow: 0 0 3px rgba(123,47,255,0.6); }

    /* ── Trunfos ── */
    .trunfos-block { display: flex; flex-direction: column; gap: 4px; }
    .trunfo-item { display: flex; flex-direction: column; gap: 1px; }
    .trunfo-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(0,255,231,0.75);
      text-transform: uppercase;
    }
    .trunfo-distincts { display: flex; flex-direction: column; gap: 1px; padding-left: 8px; }
    .trunfo-dist {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px;
      color: rgba(0,255,231,0.35);
    }
    .trunfo-dist::before { content: '› '; }

    /* ── Notas ── */
    .notes-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      color: rgba(0,255,231,0.4);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Loading / Error ── */
    .card-loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(0,255,231,0.2);
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; } 50% { opacity: 0.8; }
    }

    /* ── Divider ── */
    .card-divider {
      height: 1px;
      background: var(--line);
      flex-shrink: 0;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      html, body { overflow: auto; }

      .layout { overflow: auto; height: auto; min-height: 100vh; }

      /* Grid: 1 coluna, carrega verticalmente */
      .cards-grid,
      .cards-grid.count-1,
      .cards-grid.count-2,
      .cards-grid.count-4 {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        overflow: visible;
        height: auto;
        background: var(--dark);
        gap: 2px;
      }

      /* Cards sem altura fixa */
      .pj-card { height: auto; min-height: 0; }

      /* Body do card não rola separado — rola a página inteira */
      .card-body { overflow: visible; max-height: none; }

      /* Add-card tem altura mínima clicável */
      .add-card { min-height: 80px; }

      /* ── Stats: 2 colunas (Atributos | Habilidades) ── */
      .stats-row {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }

      /* Atributos: coluna esquerda, ocupa as 2 linhas do grid */
      .stats-block:first-child { grid-row: span 2; }

      /* Atributos em laranja */
      .stats-block:first-child .stats-block-title {
        color: rgba(255,107,26,0.9);
        border-bottom-color: rgba(255,107,26,0.3);
      }
      .stats-block:first-child .dot-name {
        color: rgba(255,107,26,0.65);
      }
      .stats-block:first-child .dot.filled {
        background: var(--orange);
        border-color: var(--orange);
        box-shadow: 0 0 3px rgba(255,107,26,0.6);
      }

      /* Fontes e dots ligeiramente maiores */
      .dot      { width: 7px; height: 7px; }
      .dot-name { font-size: 8px; letter-spacing: 0; }
      .vbox     { width: 11px; height: 11px; }
    }
  </style>
</head>
<body>

<div class="layout">

  <div class="mestre-header">
    <a href="personagens.html" class="back-btn">← Personagens</a>
    <div class="header-title">Modo Mestre</div>
    <div class="header-count" id="headerCount"></div>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sheet-sync.js?v=2026053001"></script>
<script>
  var SB_URL = 'https://mxyqqfsyybluavwlrhsa.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14eXFxZnN5eWJsdWF2d2xyaHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTM4MzEsImV4cCI6MjA5MzY2OTgzMX0.b0Ij7UGzbMLpqZjLYxoPEu2kGwEW52U_2NSDtpMGUPM';

  function sbGet(path) {
    return fetch(SB_URL + path, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).then(function(r) { return r.json(); });
  }

  var params = new URLSearchParams(location.search);
  var ids = (params.get('ids') || '').split(',').filter(Boolean).slice(0, 6);
  var grid = document.getElementById('cardsGrid');
  var countEl = document.getElementById('headerCount');

  if (ids.length === 0) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:rgba(0,255,231,0.3);letter-spacing:4px;text-transform:uppercase">Nenhuma ficha selecionada</div>';
  } else {
    // Cria placeholder pra cada card
    var placeholders = ids.map(function(id, i) {
      var card = document.createElement('div');
      card.className = 'pj-card';
      card.style.animationDelay = (i * 80) + 'ms';
      card.innerHTML = '<div class="card-loading">Carregando...</div>';
      grid.appendChild(card);
      return card;
    });

    // Busca dados de todos os personagens
    sbGet('/rest/v1/personagens?char_id=in.(' + ids.join(',') + ')&select=char_id,name,img_url,sheet_data')
      .then(function(rows) {
        // Reordena para manter a ordem de seleção
        ids.forEach(function(id, i) {
          var row = (rows || []).find(function(r) { return r.char_id === id; });
          if (row) renderCard(placeholders[i], row);
          else placeholders[i].innerHTML = '<div class="card-loading">Não encontrado</div>';
        });
        createAddCard();
        updateGridLayout();
      })
      .catch(function() {
        placeholders.forEach(function(p) { p.innerHTML = '<div class="card-loading">Erro ao carregar</div>'; });
        createAddCard();
        updateGridLayout();
      });
  }

  function renderCard(card, row) {
    var d = {};
    if (row.sheet_data && typeof row.sheet_data === 'object') {
      d = row.sheet_data;
    } else if (typeof row.sheet_data === 'string') {
      try { d = JSON.parse(row.sheet_data); } catch(e) {}
    }
    // Cache da row inteira p/ edições locais (vital/dot/desp click)
    card.__row = { char_id: row.char_id, name: row.name, img_url: row.img_url, space_id: row.space_id, sheet_data: d };
    // Realtime: subscribe uma vez por card
    if (!card.__subscribed && window.SheetSync && window.SheetSync.subscribeFor) {
      card.__subscribed = true;
      window.SheetSync.subscribeFor(row.char_id, function(remote) {
        var fresh = Object.assign({}, remote);
        if (typeof fresh.sheet_data === 'string') {
          try { fresh.sheet_data = JSON.parse(fresh.sheet_data); } catch(e) { fresh.sheet_data = {}; }
        }
        renderCard(card, fresh);
      });
    }

    var name = row.name || (d.fields && d.fields.name) || 'Personagem';
    var principio = (d.fields && d.fields.principle) || '';
    var pilar     = (d.fields && d.fields.pilar) || '';
    var sub = [principio, pilar].filter(Boolean).join(' · ');

    // Vitais
    var vit = (d.vitals && d.vitals['vit-boxes']) || {};
    var fdv = (d.vitals && d.vitals['fdv-boxes']) || {};
    var desp = (d.vitals && d.vitals['desp-boxes'] && d.vitals['desp-boxes'].desp) || 0;

    // Separa dots em cosmologia / atributos / habilidades
    var ATTR_NAMES = ['Força','Destreza','Vigor','Carisma','Manipulação','Autocontrole','Inteligência','Raciocínio','Determinação'];
    var allDots  = d.dots || [];
    var cosmoDot = allDots.find(function(x) { return x.name && x.name.toLowerCase() === 'cosmologia'; });
    var attrDots = allDots.filter(function(x) { return ATTR_NAMES.indexOf(x.name) !== -1 && x.filled > 0; });
    var skillDots = allDots.filter(function(x) { return ATTR_NAMES.indexOf(x.name) === -1 && x.name && x.name.toLowerCase() !== 'cosmologia' && x.filled > 0; });
    var skillsA = skillDots.slice(0, Math.ceil(skillDots.length / 2));
    var skillsB = skillDots.slice(Math.ceil(skillDots.length / 2));

    // Trunfos
    var trunfos = (d.trunfos || []).slice(0, 4);

    // Notas
    var notes = d.notes || '';

    // ── Monta o HTML ──
    var html = '';

    // Head
    var returnTo = encodeURIComponent('mestre-view.html?' + location.search.slice(1));
    var fichaUrl = 'ficha.html?id=' + row.char_id + '&returnTo=' + returnTo;
    html += '<div class="card-head">';
    html += '<a class="card-head-link" href="' + fichaUrl + '">';
    if (row.img_url) {
      html += '<img class="card-avatar" src="' + row.img_url + '" alt="' + name + '">';
    } else {
      html += '<div class="card-avatar-placeholder">⬡</div>';
    }
    html += '<div class="card-identity">';
    html += '<div class="card-name">' + name + '</div>';
    if (sub) html += '<div class="card-sub">' + sub + '</div>';
    html += '</div>';
    html += '</a>';
    html += '<a class="open-ficha-hint" href="' + fichaUrl + '">Ficha ↗</a>';
    html += '</div>';

    html += '<div class="card-body">';

    // Vitais
    html += '<div>';
    html += '<div class="section-label">Vitais</div>';
    html += '<div class="vitals-block">';
    if (vit.total) {
      html += '<div class="vital-row">';
      html += '<span class="vital-name">Vitalidade</span>';
      html += '<div class="vital-boxes">' + renderVboxes(vit) + '</div>';
      html += '</div>';
    }
    if (fdv.total) {
      html += '<div class="vital-row">';
      html += '<span class="vital-name">F. Vontade</span>';
      html += '<div class="vital-boxes">' + renderVboxes(fdv) + '</div>';
      html += '</div>';
    }
    html += '<div class="vital-row">';
    html += '<span class="vital-name">Desespero</span>';
    html += '<span class="desp-val' + (desp === 0 ? ' desp-zero' : '') + '">' + desp + '</span>';
    html += '</div>';
    html += '</div></div>';

    // Cosmologia
    if (cosmoDot) {
      html += '<div class="card-divider"></div><div>';
      html += '<div class="section-label">Cosmologia</div>';
      html += '<div class="dot-row">';
      html += '<div class="dots-row">' + renderDots(cosmoDot.filled, cosmoDot.max, 'cosmo-dot') + '</div>';
      html += '<span style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:rgba(123,47,255,0.6);margin-left:4px">' + cosmoDot.filled + '/' + cosmoDot.max + '</span>';
      html += '</div></div>';
    }

    // Atributos + Habilidades em 3 blocos
    if (attrDots.length || skillDots.length) {
      html += '<div class="card-divider"></div>';
      html += '<div class="stats-row">';

      // Bloco 1: Atributos
      html += '<div class="stats-block">';
      html += '<div class="stats-block-title">Atributos</div>';
      attrDots.forEach(function(a) {
        html += '<div class="dot-row"><span class="dot-name" title="' + a.name + '">' + a.name + '</span>';
        html += '<div class="dots-row">' + renderDots(a.filled, a.max, '') + '</div></div>';
      });
      if (!attrDots.length) html += '<span style="font-family:\'Share Tech Mono\',monospace;font-size:7px;color:rgba(0,255,231,0.15)">—</span>';
      html += '</div>';

      // Bloco 2: Habilidades A
      html += '<div class="stats-block">';
      html += '<div class="stats-block-title">Habilidades</div>';
      skillsA.forEach(function(s) {
        html += '<div class="dot-row"><span class="dot-name" title="' + s.name + '">' + s.name + '</span>';
        html += '<div class="dots-row">' + renderDots(s.filled, s.max, '') + '</div></div>';
      });
      if (!skillsA.length) html += '<span style="font-family:\'Share Tech Mono\',monospace;font-size:7px;color:rgba(0,255,231,0.15)">—</span>';
      html += '</div>';

      // Bloco 3: Habilidades B
      html += '<div class="stats-block">';
      html += '<div class="stats-block-title">&nbsp;</div>';
      skillsB.forEach(function(s) {
        html += '<div class="dot-row"><span class="dot-name" title="' + s.name + '">' + s.name + '</span>';
        html += '<div class="dots-row">' + renderDots(s.filled, s.max, '') + '</div></div>';
      });
      html += '</div>';

      html += '</div>'; // stats-row
    }

    // Trunfos
    if (trunfos.length) {
      html += '<div class="card-divider"></div><div>';
      html += '<div class="section-label">Trunfos</div>';
      html += '<div class="trunfos-block">';
      trunfos.forEach(function(t) {
        if (!t.key) return;
        html += '<div class="trunfo-item">';
        html += '<span class="trunfo-key">' + t.key + '</span>';
        if (t.distincts && t.distincts.length) {
          html += '<div class="trunfo-distincts">';
          t.distincts.slice(0, 3).forEach(function(d) {
            if (d) html += '<span class="trunfo-dist">' + d + '</span>';
          });
          html += '</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';
    }

    // Notas
    if (notes.trim()) {
      html += '<div class="card-divider"></div><div>';
      html += '<div class="section-label">Notas</div>';
      html += '<div class="notes-text">' + notes.replace(/</g,'&lt;') + '</div>';
      html += '</div>';
    }

    html += '</div>'; // card-body

    card.innerHTML = html;

    // Inject extract button via DOM so event closure captures correct card reference
    card.dataset.charId = row.char_id;
    var extractBtn = document.createElement('button');
    extractBtn.className = 'card-extract-btn';
    extractBtn.title = 'Extrair da view';
    extractBtn.textContent = '✕';
    (function(c) {
      extractBtn.addEventListener('click', function(e) {
        e.preventDefault();
        c.style.transition = 'opacity 0.3s, transform 0.3s';
        c.style.opacity = '0';
        c.style.transform = 'scale(0.92)';
        setTimeout(function() { c.remove(); updateGridLayout(); }, 300);
      });
    })(card);
    card.querySelector('.card-head').appendChild(extractBtn);
  }

  function renderVboxes(vital) {
    var html = '';
    var total = vital.total || 0;
    var aggr  = vital.aggravated || 0;
    var mark  = vital.filled || 0;
    for (var i = 0; i < total; i++) {
      var cls = 'vbox';
      if (i < aggr)  cls += ' aggravated';
      else if (i < mark) cls += ' marked';
      html += '<div class="' + cls + '"></div>';
    }
    return html;
  }

  function renderDots(filled, max, extraClass) {
    var html = '';
    for (var i = 0; i < max; i++) {
      var cls = 'dot' + (extraClass ? ' ' + extraClass : '') + (i < filled ? ' filled' : '');
      html += '<div class="' + cls + '"></div>';
    }
    return html;
  }

  // ── Layout helper ──────────────────────────────────────────────
  function updateGridLayout() {
    var cards = grid.querySelectorAll('.pj-card');
    var n = cards.length;
    grid.classList.remove('count-1', 'count-2', 'count-4');
    // total cells = n pj-cards + 1 add-card
    if (n === 0) grid.classList.add('count-1');
    else if (n === 1) grid.classList.add('count-2');
    else if (n === 3) grid.classList.add('count-4');
    // 2 or 5+ → 3-col default; 4 → 3-col (add-card wraps to next row)
    countEl.textContent = n + ' personage' + (n !== 1 ? 'ns' : 'm');
  }

  // ── Add card ───────────────────────────────────────────────────
  function createAddCard() {
    var existing = grid.querySelector('.add-card');
    if (existing) existing.remove();
    var add = document.createElement('div');
    add.className = 'add-card';
    add.innerHTML = '<div class="add-card-inner"><span class="add-plus">+</span><span class="add-label">Adicionar</span></div>';
    add.addEventListener('click', openPicker);
    grid.appendChild(add);
  }

  // ── Picker ─────────────────────────────────────────────────────
  function openPicker() {
    var currentIds = Array.from(grid.querySelectorAll('.pj-card'))
      .map(function(c) { return c.dataset.charId; }).filter(Boolean);
    sbGet('/rest/v1/personagens?select=char_id,name,img_url&order=name.asc')
      .then(function(rows) {
        var available = (rows || []).filter(function(r) {
          return currentIds.indexOf(r.char_id) === -1;
        });
        showPickerModal(available);
      });
  }

  function showPickerModal(rows) {
    var existing = document.querySelector('.picker-overlay');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.className = 'picker-overlay';

    var box = document.createElement('div');
    box.className = 'picker-box';

    var head = document.createElement('div');
    head.className = 'picker-head';
    head.textContent = 'Adicionar à view';
    box.appendChild(head);

    // ── Search input ──
    var search = document.createElement('input');
    search.className = 'picker-search';
    search.type = 'text';
    search.placeholder = 'Buscar...';
    search.autocomplete = 'off';
    box.appendChild(search);

    var list = document.createElement('div');
    list.className = 'picker-list';

    if (!rows.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'padding:20px;text-align:center;font-family:\'Share Tech Mono\',monospace;font-size:9px;letter-spacing:2px;color:rgba(0,255,231,0.2);text-transform:uppercase';
      empty.textContent = 'Nenhum disponível';
      list.appendChild(empty);
    } else {
      rows.forEach(function(row) {
        var item = document.createElement('div');
        item.className = 'picker-item';
        var isNpc = !!(row.char_id && row.char_id.startsWith('npc_'));
        // data-name para filtro ao vivo
        item.dataset.name = (row.name || row.char_id || '').toLowerCase();

        if (row.img_url) {
          var img = document.createElement('img');
          img.className = 'picker-avatar';
          img.src = row.img_url;
          img.alt = row.name || '';
          item.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.className = 'picker-avatar';
          ph.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(0,255,231,0.3)';
          ph.textContent = '⬡';
          item.appendChild(ph);
        }

        var nameEl = document.createElement('span');
        nameEl.className = 'picker-name';
        nameEl.textContent = row.name || row.char_id;
        item.appendChild(nameEl);

        if (isNpc) {
          var tag = document.createElement('span');
          tag.className = 'picker-tag';
          tag.textContent = 'NPC';
          item.appendChild(tag);
        }

        item.addEventListener('click', (function(r) { return function() {
          overlay.remove();
          addCharToView(r);
        }; })(row));
        list.appendChild(item);
      });

      // Filtro ao vivo
      search.addEventListener('input', function() {
        var q = search.value.toLowerCase().trim();
        list.querySelectorAll('.picker-item').forEach(function(el) {
          el.style.display = (!q || el.dataset.name.indexOf(q) !== -1) ? '' : 'none';
        });
      });
    }

    box.appendChild(list);

    var cancel = document.createElement('div');
    cancel.className = 'picker-cancel';
    cancel.textContent = 'Cancelar';
    cancel.addEventListener('click', function() { overlay.remove(); });
    box.appendChild(cancel);

    overlay.appendChild(box);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);

    // Foca o campo de busca automaticamente
    setTimeout(function() { search.focus(); }, 60);
  }

  // ── Add char to view ───────────────────────────────────────────
  function addCharToView(row) {
    var card = document.createElement('div');
    card.className = 'pj-card';
    card.innerHTML = '<div class="card-loading">Carregando...</div>';
    var addCard = grid.querySelector('.add-card');
    if (addCard) grid.insertBefore(card, addCard);
    else grid.appendChild(card);
    updateGridLayout();
    sbGet('/rest/v1/personagens?char_id=eq.' + encodeURIComponent(row.char_id) + '&select=char_id,name,img_url,sheet_data')
      .then(function(rows) {
        var data = rows && rows[0];
        if (data) renderCard(card, data);
        else card.innerHTML = '<div class="card-loading">Não encontrado</div>';
      })
      .catch(function() { card.innerHTML = '<div class="card-loading">Erro</div>'; });
  }

  // ─── Edição direta no Modo Mestre ────────────────────────────────
  // Cliques em vitais, dots e desespero modificam o sheet_data em memória,
  // atualizam o DOM visualmente e disparam saveFor (immediate).
  // Reusa a MESMA regra da ficha (buildVital / buildDots) pra consistência.

  function persistCard(card) {
    if (!card.__row || !window.SheetSync || !SheetSync.saveFor) return;
    var r = card.__row;
    SheetSync.saveFor(r.char_id, {
      sheet_data: r.sheet_data,
      name: r.name || '',
      img_url: r.img_url || null,
      space_id: r.space_id || null
    });
  }

  function vitalIdFromName(nameTxt) {
    var t = (nameTxt || '').toLowerCase();
    if (t.indexOf('vit') === 0) return 'vit-boxes';
    if (t.indexOf('vontade') !== -1 || t.indexOf('vont') === 0) return 'fdv-boxes';
    return null;
  }

  function handleVboxClick(card, vbox) {
    var vitalRow = vbox.closest('.vital-row');
    if (!vitalRow) return;
    var nameEl = vitalRow.querySelector('.vital-name');
    var vitalId = nameEl && vitalIdFromName(nameEl.textContent);
    if (!vitalId) return;
    var boxes = Array.from(vitalRow.querySelectorAll('.vbox'));
    var idx = boxes.indexOf(vbox);

    // Mesma regra do buildVital() em ficha.html
    if (vbox.classList.contains('aggravated')) {
      vbox.classList.remove('aggravated');
    } else if (vbox.classList.contains('marked')) {
      vbox.classList.remove('marked');
      vbox.classList.add('aggravated');
    } else {
      boxes.forEach(function(bb, ii) {
        if (ii <= idx && !bb.classList.contains('aggravated')) bb.classList.add('marked');
      });
    }

    var total = boxes.length;
    var aggr  = boxes.filter(function(b){ return b.classList.contains('aggravated'); }).length;
    var fill  = boxes.filter(function(b){ return b.classList.contains('marked') || b.classList.contains('aggravated'); }).length;
    if (!card.__row.sheet_data) card.__row.sheet_data = {};
    if (!card.__row.sheet_data.vitals) card.__row.sheet_data.vitals = {};
    card.__row.sheet_data.vitals[vitalId] = { total: total, filled: fill, aggravated: aggr };
    persistCard(card);
  }

  function handleDotClick(card, dot) {
    var row = dot.closest('.dot-row');
    if (!row) return;
    var dotsRow = dot.closest('.dots-row');
    if (!dotsRow) return;
    var nameEl = row.querySelector('.dot-name');
    var statName = nameEl ? nameEl.textContent.trim() : (dot.classList.contains('cosmo-dot') ? 'Cosmologia' : null);
    if (!statName) return;
    var dots = Array.from(dotsRow.querySelectorAll('.dot'));
    var idx = dots.indexOf(dot);
    var currentlyFilled = dot.classList.contains('filled');
    var allFilledUpTo = dots.every(function(dd, ii) { return ii > idx || dd.classList.contains('filled'); });

    // Mesma regra do buildDots() em ficha.html
    if (currentlyFilled && allFilledUpTo) {
      dots.forEach(function(dd, ii) { dd.classList.toggle('filled', ii < idx); });
    } else {
      dots.forEach(function(dd, ii) { dd.classList.toggle('filled', ii <= idx); });
    }

    var newFilled = dots.filter(function(d){ return d.classList.contains('filled'); }).length;
    if (!card.__row.sheet_data) card.__row.sheet_data = {};
    if (!Array.isArray(card.__row.sheet_data.dots)) card.__row.sheet_data.dots = [];
    var arr = card.__row.sheet_data.dots;
    var lcStat = statName.toLowerCase();
    var existing = arr.find(function(x) { return x.name && x.name.toLowerCase() === lcStat; });
    if (existing) {
      existing.filled = newFilled;
    } else {
      arr.push({ name: statName, filled: newFilled, max: dots.length });
    }
    persistCard(card);
  }

  function handleDespClick(card, despEl) {
    var cur = parseInt(despEl.textContent, 10) || 0;
    var next = (cur + 1) % 6;
    despEl.textContent = next;
    despEl.classList.toggle('desp-zero', next === 0);
    if (!card.__row.sheet_data) card.__row.sheet_data = {};
    if (!card.__row.sheet_data.vitals) card.__row.sheet_data.vitals = {};
    card.__row.sheet_data.vitals['desp-boxes'] = { desp: next };
    persistCard(card);
  }

  // Delegation no container — funciona mesmo após renderCard recriar o innerHTML
  if (grid) {
    grid.addEventListener('click', function(e) {
      var card = e.target.closest('.pj-card');
      if (!card || !card.__row) return;
      // ignora cliques em links/botões (Ficha ↗, extract ✕)
      if (e.target.closest('a, button')) return;
      var vbox = e.target.closest('.vbox');
      if (vbox) { handleVboxClick(card, vbox); return; }
      var dot = e.target.closest('.dot');
      if (dot) { handleDotClick(card, dot); return; }
      var desp = e.target.closest('.desp-val');
      if (desp) { handleDespClick(card, desp); return; }
    });

    // Estilo: cursor pointer pra deixar claro que é clicável
    var st = document.createElement('style');
    st.textContent = '.pj-card .vbox, .pj-card .dot, .pj-card .desp-val { cursor: pointer; }';
    document.head.appendChild(st);
  }
</script>

<!-- ── Duplo clique/toque para voltar ── -->
<script>
(function(){
  'use strict';
  var DEST = 'personagens.html';
  var IA = 'button,a,input,textarea,select,[contenteditable]';
  function nav(){ window.location.href = DEST; }
  document.addEventListener('dblclick', function(e){ if(e.target.closest(IA)) return; nav(); });
  var _t = 0, _multi = false;
  document.addEventListener('touchstart', function(e){
    if(e.touches.length > 1){ _multi = true; }
  },{passive:true});
  document.addEventListener('touchend', function(e){
    if(e.touches.length > 0){ _t=0; _multi=true; return; }
    if(_multi){ _t=0; _multi=false; return; }
    var el = e.target; if(el.closest(IA)){ _t=0; return; }
    var n = Date.now(); if(n-_t<300){ _t=0; nav(); return; } _t=n;
  },{passive:true});
})();
</script>
</body>
</html>
